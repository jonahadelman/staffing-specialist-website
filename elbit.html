<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elbit Systems Resume Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root{
    --bg:#0e1a2b; --panel:#14233a; --panel2:#1a2e4a; --line:#28406a;
    --ink:#e9f0fa; --muted:#9db2d2; --gold:#c8a96a; --gold-dim:#9c8350;
    --blue:#4d8df0; --cyan:#3fb6c9; --teal:#2bb39a; --yellow:#e3b341;
    --orange:#e08a3c; --purple:#9b7be0; --gray:#6f7f97; --red:#e0564f; --green:#3fae6b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45}
  h1,h2,h3{font-family:Georgia,"Times New Roman",serif;font-weight:600;margin:0}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .wrap{max-width:1380px;margin:0 auto;padding:0 18px}
  header{border-bottom:1px solid var(--line);background:linear-gradient(180deg,#11203580,#0e1a2b)}
  .topbar{display:flex;align-items:center;gap:16px;padding:16px 0;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{font-size:22px;letter-spacing:.3px}
  .brand .dot{color:var(--gold)}
  .brand .sub{color:var(--muted);font-size:12px;letter-spacing:1.5px;text-transform:uppercase}
  .vobadge{background:#2a1f0d;color:var(--gold);border:1px solid var(--gold-dim);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .grow{flex:1}
  .userbox{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
  .search{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 12px;min-width:240px}
  .search input{background:transparent;border:0;color:var(--ink);width:100%;outline:none}
  .search svg{flex:0 0 auto;opacity:.6}
  .btn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;transition:.15s}
  .btn:hover{border-color:var(--gold-dim)}
  .btn.gold{background:var(--gold);color:#1a1208;border-color:var(--gold)}
  .btn.gold:hover{filter:brightness(1.06)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger:hover{border-color:var(--red);color:var(--red)}
  .btn.block{width:100%;padding:11px;font-size:14px}
  .layout{display:grid;grid-template-columns:236px 1fr;gap:20px;padding:18px 0 60px}
  .side{position:sticky;top:14px;align-self:start}
  .side h3{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;font-family:inherit;font-weight:700}
  .side h3:first-child{margin-top:0}
  .vtab{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;background:transparent;border:0;color:var(--muted);padding:7px 10px;border-radius:7px;font-size:13px;font-weight:600}
  .vtab:hover{background:var(--panel)}
  .vtab.active{background:var(--panel2);color:var(--ink)}
  .vtab .count{background:#0e1a2b;border:1px solid var(--line);border-radius:20px;padding:0 7px;font-size:11px;color:var(--muted)}
  .vtab.active .count{color:var(--gold);border-color:var(--gold-dim)}
  .filterbox{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:6px}
  .filterbox label{display:block;font-size:11px;color:var(--muted);margin:8px 0 4px;text-transform:uppercase;letter-spacing:.5px}
  .filterbox label:first-child{margin-top:0}
  select.fil{width:100%;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px 8px}
  .main{min-width:0}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar .title{font-family:Georgia,serif;font-size:19px}
  .toolbar .meta{color:var(--muted);font-size:12px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  thead th{text-align:left;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:11px 12px;border-bottom:1px solid var(--line);font-weight:700;background:#11203a}
  tbody td{padding:11px 12px;border-bottom:1px solid #1d3252;font-size:13px;vertical-align:top}
  thead th{text-align:left;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:11px 12px;border-bottom:1px solid var(--line);font-weight:700;background:#11203a;vertical-align:bottom;white-space:nowrap}
  tbody tr:last-child td{border-bottom:0}
  tbody tr.click{cursor:pointer;transition:background .12s}
  tbody tr.click:hover{background:var(--panel2)}
  .nm{font-weight:600;color:var(--ink)}
  .sub2{color:var(--muted);font-size:12px}
  .grouphdr td{background:#0f1e34;color:var(--gold);font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-size:11px}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid transparent;white-space:nowrap}
  .due{font-size:12px;font-weight:700}
  .empty{padding:50px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-family:Georgia,serif;font-size:18px;color:var(--ink);margin-bottom:6px}
  .scrim{position:fixed;inset:0;background:#05080dcc;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
  .scrim.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:760px;box-shadow:0 30px 80px #000a}
  .modal.wide{max-width:620px}
  .mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
  .mhead h2{font-size:19px}
  .mbody{padding:20px 22px}
  .x{background:transparent;border:0;color:var(--muted);font-size:22px;line-height:1}
  .x:hover{color:var(--ink)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
  .fld{display:flex;flex-direction:column;gap:5px;margin-bottom:2px}
  .fld.full{grid-column:1 / -1}
  .fld label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .fld input,.fld select,.fld textarea{background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:8px 10px;outline:none}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold-dim)}
  .fld textarea{resize:vertical;min-height:64px}
  .reqgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px}
  .reqck{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--ink)}
  .reqck input{margin-top:2px}
  .roval{background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:8px 10px;color:var(--ink);min-height:18px}
  .mfoot{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:16px 22px;border-top:1px solid var(--line)}
  .mfoot .right{display:flex;gap:10px}
  .drop{border:2px dashed var(--line);border-radius:10px;padding:26px;text-align:center;color:var(--muted);background:var(--bg);transition:.15s}
  .drop.hot{border-color:var(--gold);color:var(--ink);background:#13243d}
  .hint{color:var(--muted);font-size:12px;margin:10px 0 0;line-height:1.5}
  .act{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;background:var(--bg)}
  .act .top{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
  .act .top b{color:var(--gold)}
  .act .nt{margin-top:4px}
  .tag{display:inline-block;background:#10203a;border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:11px;color:var(--muted);margin:2px 4px 2px 0}
  .tag.gold{color:var(--gold);border-color:var(--gold-dim)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--gold);color:#1a1208;padding:10px 18px;border-radius:8px;font-weight:700;font-size:13px;box-shadow:0 10px 30px #0008;opacity:0;pointer-events:none;transition:.25s;z-index:120}
  .toast.show{opacity:1}
  /* login */
  .gate{position:fixed;inset:0;background:radial-gradient(1200px 600px at 50% -10%, #16294480, #0e1a2b);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
  .gate .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:30px;width:100%;max-width:380px;box-shadow:0 30px 80px #000a}
  .gate h1{font-size:24px}
  .gate .dot{color:var(--gold)}
  .gate .sub{color:var(--muted);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin:4px 0 22px}
  .gate label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin:14px 0 5px}
  .gate input{width:100%;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:11px;outline:none}
  .gate input:focus{border-color:var(--gold-dim)}
  .gate .msg{margin-top:14px;font-size:13px;min-height:18px}
  .gate .msg.err{color:var(--red)}
  .gate .msg.ok{color:var(--green)}
  #app{display:none}
  @media(max-width:880px){.layout{grid-template-columns:1fr}.side{position:static}.grid2,.reqgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="card">
    <h1>Elbit Systems<span class="dot">.</span></h1>
    <div class="sub">Resume Tracker</div>
    <div id="gateForm">
      <label>Email</label>
      <input id="loginEmail" type="email" autocomplete="username" placeholder="you@company.com">
      <label>Password</label>
      <input id="loginPass" type="password" autocomplete="current-password" placeholder="Your password">
      <div style="margin-top:18px"><button class="btn gold block" id="loginBtn">Sign In</button></div>
      <div class="msg" id="loginMsg"></div>
    </div>
  </div>
</div>

<div id="app">
<header>
  <div class="wrap topbar">
    <div class="brand">
      <h1>Elbit Systems<span class="dot">.</span> Resume Tracker</h1>
      <span class="sub">Talent Pipeline</span>
      <span class="vobadge" id="voBadge" style="display:none">View Only</span>
    </div>
    <div class="grow"></div>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
      <input id="q" type="text" placeholder="Search name, title, skills...">
    </div>
    <button class="btn ghost sm" id="importBtn">Import CSV</button>
    <button class="btn ghost sm" id="exportBtn">Export</button>
    <button class="btn ghost sm" id="dayforceBtn">Dayforce CSV</button>
    <button class="btn ghost sm" id="bulkBtn">Bulk Add</button>
    <button class="btn gold" id="addBtn">+ Candidate</button>
    <div class="userbox"><span id="whoami"></span><button class="btn ghost sm" id="signoutBtn">Sign Out</button></div>
  </div>
</header>

<div class="wrap layout">
  <aside class="side">
    <h3>Views</h3>
    <div id="tabs"></div>
    <h3>Filters</h3>
    <div class="filterbox">
      <label>Status</label><select class="fil" id="fStatus"></select>
      <label>Discipline</label><select class="fil" id="fDiscipline"></select>
      <label>Target Req</label><select class="fil" id="fReq"></select>
      <label>Recruiter</label><select class="fil" id="fOwner"></select>
      <label>Priority</label><select class="fil" id="fPriority"></select>
    </div>
  </aside>
  <main class="main">
    <div class="toolbar"><span class="title" id="viewTitle">All Candidates</span><span class="meta" id="viewMeta"></span><div class="grow"></div></div>
    <div id="list"></div>
  </main>
</div>
</div>

<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
<input type="file" id="fileInput" accept=".csv" style="display:none">
<div class="toast" id="toast"></div>

<script>
"use strict";

/* ============================================================
   STEP 1: paste your two Supabase values between the quotes.
   Find them in Supabase: Project Settings -> API.
   ============================================================ */
var SUPABASE_URL = "https://apxirlgoiruvczhwdgue.supabase.co";
var SUPABASE_ANON_KEY = "sb_publishable_KrYU_Wa9pJtQiNo8vWNTKA_znqip7TX";

/*CONFIG_START*/
var CONFIG = {"company": "Elbit", "brand": "Elbit Systems", "subtitle": "Talent Pipeline", "org": "elbit", "owners": ["Amy", "Jonah", "Anthony", "Craig", "Unassigned"], "reqs": [{"title": "Program Manager 3", "loc": "Yuma", "disc": "Other", "urgency": "Open", "openings": 1}, {"title": "Program Manager 3", "loc": "Charleston", "disc": "Other", "urgency": "Open", "openings": 1}, {"title": "Program Manager 3", "loc": "FTW/DET/CHS", "disc": "Other", "urgency": "Open", "openings": 1}, {"title": "Project Manager", "loc": "Charleston", "disc": "Other", "urgency": "Open", "openings": 1}, {"title": "Sr Director Engineer", "loc": "FTW/DET", "disc": "Other", "urgency": "Open", "openings": 1}, {"title": "Sr Staff Engineer", "loc": "FTW/DET", "disc": "Other", "urgency": "Open", "openings": 1}, {"title": "Sr Systems Engineer", "loc": "FTW/DET", "disc": "Other", "urgency": "Open", "openings": 1}, {"title": "Sr Engineer", "loc": "FTW/DET", "disc": "Other", "urgency": "Open", "openings": 1}, {"title": "Sr Engineer", "loc": "Remote/FTW", "disc": "Other", "urgency": "Open", "openings": 1}], "reqOptions": ["Program Manager 3 – Yuma", "Program Manager 3 – Charleston", "Program Manager 3 – FTW/DET/CHS", "Project Manager – Charleston", "Sr Director Engineer – FTW/DET", "Sr Staff Engineer – FTW/DET", "Sr Systems Engineer – FTW/DET", "Sr Engineer – FTW/DET", "Sr Engineer – Remote/FTW"]};
/*CONFIG_END*/

var ORG = CONFIG.org;
var STATUS = ["New","Review","Contacted","Screening","Submitted","Interviewing","On Hold","Archived"];
var PRIORITY = ["High","Medium","Low"];
var SOURCE = ["LinkedIn","Referral","Direct Applicant","Resume Database","Recruiter Outreach","Internal Referral","Agency","Other"];
var DISCIPLINES = ["Program Management","Systems Engineering","Electrical / Hardware","Software","Manufacturing","Quality","Supply Chain","Other"];
var ACT_TYPES = ["Call","Email","LinkedIn Message","Text","Voicemail","Meeting","Resume Submitted","Status Change","Note","Other"];
var OWNERS = CONFIG.owners;
var REQS = CONFIG.reqs;
var REQ_OPTIONS = CONFIG.reqOptions;

var STATUS_COLOR = {"New":"--blue","Review":"--cyan","Contacted":"--teal","Screening":"--yellow","Submitted":"--orange","Interviewing":"--purple","On Hold":"--gray","Archived":"--gray"};
var PRI_COLOR = {"High":"--red","Medium":"--yellow","Low":"--gray"};
var URG_COLOR = {"Immediate need":"--red","Immediate":"--red","Contract Award":"--orange","August":"--yellow","Open":"--teal"};

var VIEW_ONLY = true;       /* set from profile after login */
var sb = null;
var state = { candidates:[], activities:[] };
var ui = { view:"all", q:"", fStatus:"", fDiscipline:"", fReq:"", fOwner:"", fPriority:"" };
var openId = null;

/* ---------- auth ---------- */
function gateMsg(text, cls){ var m = document.getElementById("loginMsg"); m.textContent = text || ""; m.className = "msg" + (cls ? " " + cls : ""); }
function configReady(){ return SUPABASE_URL.indexOf("http") === 0 && SUPABASE_ANON_KEY.length > 20 && SUPABASE_URL.indexOf("PASTE_") === -1 && SUPABASE_ANON_KEY.indexOf("PASTE_") === -1; }

async function boot(){
  if(!configReady()){
    document.getElementById("gateForm").innerHTML = "";
    gateMsg("Setup needed: paste your Supabase URL and anon key into this file (top of the script), then redeploy.", "err");
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  var sess = await sb.auth.getSession();
  if(sess.data && sess.data.session){ await onAuthed(sess.data.session.user); }
}
async function doLogin(){
  gateMsg("Signing in...", "");
  var email = document.getElementById("loginEmail").value.trim();
  var pass = document.getElementById("loginPass").value;
  var res = await sb.auth.signInWithPassword({ email: email, password: pass });
  if(res.error){ gateMsg(res.error.message, "err"); return; }
  await onAuthed(res.data.user);
}
async function onAuthed(user){
  var prof = await sb.from("profiles").select("role,orgs,email").eq("id", user.id).single();
  if(prof.error || !prof.data){ gateMsg("Your account has no access profile yet. Ask the admin to set your role.", "err"); return; }
  var orgs = prof.data.orgs || [];
  if(orgs.indexOf(ORG) === -1){ gateMsg("Your account does not have access to this program.", "err"); return; }
  VIEW_ONLY = prof.data.role !== "editor";
  document.getElementById("whoami").textContent = (prof.data.email || user.email) + " (" + (VIEW_ONLY ? "viewer" : "editor") + ")";
  document.getElementById("gate").style.display = "none";
  document.getElementById("app").style.display = "block";
  applyViewOnly();
  await loadData();
  wireRealtime();
  refresh();
}
function applyViewOnly(){
  document.getElementById("voBadge").style.display = VIEW_ONLY ? "inline-block" : "none";
  ["importBtn","exportBtn","dayforceBtn","bulkBtn","addBtn"].forEach(function(id){ var b = document.getElementById(id); if(b){ b.style.display = (VIEW_ONLY && id !== "exportBtn") ? "none" : ""; } });
}

/* ---------- data layer ---------- */
function nz(v){ return (v && String(v).length) ? v : null; }
function rowToCand(r){
  return { id:r.id, firstName:r.first_name||"", lastName:r.last_name||"", email:r.email||"", phone:r.phone||"",
    location:r.location||"", title:r.title||"", company:r.company||"", skills:r.skills||[], discipline:r.discipline||"",
    reqs:r.reqs||[], source:r.source||"Other", status:r.status||"New", priority:r.priority||"Medium", owner:r.owner||"Unassigned",
    dateReceived:r.date_received||"", lastContacted:r.last_contacted||"", nextFollowUp:r.next_follow_up||"",
    resumeLink:r.resume_link||"", resumeFileName:r.resume_file_name||"", resumePath:r.resume_path||"", resumeText:r.resume_text||"", notes:r.notes||"",
    createdAt:r.created_at, updatedAt:r.updated_at };
}
function rowToAct(r){ return { id:r.id, candidateId:r.candidate_id, type:r.type||"Note", date:r.date||"", notes:r.notes||"", owner:r.owner||"" }; }
function candToRow(c){
  return { org:ORG, first_name:c.firstName||"", last_name:c.lastName||"", email:c.email||"", phone:c.phone||"",
    location:c.location||"", title:c.title||"", company:c.company||"", skills:c.skills||[], discipline:c.discipline||"",
    reqs:c.reqs||[], source:c.source||"Other", status:c.status||"New", priority:c.priority||"Medium", owner:c.owner||"Unassigned",
    date_received:nz(c.dateReceived), last_contacted:nz(c.lastContacted), next_follow_up:nz(c.nextFollowUp),
    resume_link:c.resumeLink||"", resume_file_name:c.resumeFileName||"", resume_path:c.resumePath||"", resume_text:c.resumeText||"", notes:c.notes||"",
    updated_at:new Date().toISOString() };
}
function rowToReq(r){ return { id:r.id, title:r.title||"", loc:r.loc||"", disc:r.discipline||"Other", urgency:r.urgency||"Open", openings:r.openings||1, hm:r.hiring_manager||"", jobId:r.job_id||"", jd:r.jd||"", jdLink:r.jd_link||"" }; }
function setReqs(arr){
  REQS = arr;
  REQ_OPTIONS = arr.map(function(r){ return r.title + " \u2013 " + r.loc; });
  var sel = document.getElementById("fReq"); var cur = ui.fReq; fillSelect(sel, REQ_OPTIONS, "All Reqs"); sel.value = cur;
}
async function loadData(){
  var c = await sb.from("candidates").select("*").eq("org", ORG).order("created_at", { ascending:false });
  var a = await sb.from("activities").select("*").eq("org", ORG).order("date", { ascending:false });
  var rq = await sb.from("reqs").select("*").eq("org", ORG).order("created_at", { ascending:true });
  if(c.error){ toast(c.error.message); }
  state.candidates = (c.data || []).map(rowToCand);
  state.activities = (a.data || []).map(rowToAct);
  if(rq.data){ setReqs(rq.data.map(rowToReq)); }
}
async function reloadSoft(){ await loadData(); refresh(); }
function wireRealtime(){
  sb.channel("rt-" + ORG)
    .on("postgres_changes", { event:"*", schema:"public", table:"candidates", filter:"org=eq." + ORG }, function(){ reloadSoft(); })
    .on("postgres_changes", { event:"*", schema:"public", table:"activities", filter:"org=eq." + ORG }, function(){ reloadSoft(); })
    .on("postgres_changes", { event:"*", schema:"public", table:"reqs", filter:"org=eq." + ORG }, function(){ reloadSoft(); })
    .subscribe();
}
async function run(promise, okMsg){
  var res = await promise;
  if(res && res.error){ toast(res.error.message || "Error"); return false; }
  await reloadSoft();
  if(okMsg){ toast(okMsg); }
  return true;
}

/* ---------- computed ---------- */
function fullName(c){ return (c.firstName + " " + c.lastName).trim(); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function followUp(c){
  if(c.status === "Archived" || !c.nextFollowUp){ return {label:"", color:"--muted"}; }
  var t = todayISO();
  if(c.nextFollowUp < t){ return {label:"Overdue", color:"--red"}; }
  if(c.nextFollowUp === t){ return {label:"Due Today", color:"--yellow"}; }
  return {label:"Upcoming", color:"--green"};
}
function ageDays(c){ var d = c.dateReceived || (c.createdAt ? c.createdAt.slice(0,10) : todayISO()); return Math.max(0, Math.round((new Date(todayISO()) - new Date(d)) / 86400000)); }
function withinDays(c,n){ return ageDays(c) <= n; }

/* ---------- views ---------- */

  { id:"followup", name:"Follow Up Due", fn:function(c){ return followUp(c).label !== ""; } },
  { id:"overdue", name:"Overdue Follow Up", fn:function(c){ return followUp(c).label === "Overdue"; } },
  { id:"high", name:"High Priority", fn:function(c){ return c.priority === "High" && c.status !== "Archived"; } },
  { id:"bystatus", name:"By Status", fn:function(c){ return c.status !== "Archived"; }, group:"status" },
  { id:"bydisc", name:"By Discipline", fn:function(c){ return c.status !== "Archived"; }, group:"discipline" },
  { id:"byreq", name:"By Req", fn:function(c){ return c.status !== "Archived"; }, special:"byreq" },

  return hay.indexOf(ui.q.toLowerCase()) !== -1;
}
function passFilters(c){
  if(ui.fStatus && c.status !== ui.fStatus){ return false; }
  if(ui.fDiscipline && c.discipline !== ui.fDiscipline){ return false; }
  if(ui.fReq && (c.reqs||[]).indexOf(ui.fReq) === -1){ return false; }

/* ---------- resume upload + extract ---------- */
function setUpStat(t){ var s = document.getElementById("resumeUpStat"); if(s){ s.textContent = t; } }
function grabEmail(text){ var m = text.match(/[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}/); return m ? m[0] : ""; }
function grabPhone(text){ var m = text.match(/(\+?1[\s.\-]?)?\(?\d{3}\)?[\s.\-]?\d{3}[\s.\-]?\d{4}/); return m ? m[0].trim() : ""; }
async function extractText(file){
  var name = file.name.toLowerCase();
  if(/\.pdf$/.test(name) && window.pdfjsLib){
    try{
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      var buf = await file.arrayBuffer();
      var pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
      var out = "";
      for(var p = 1; p <= pdf.numPages; p++){ var page = await pdf.getPage(p); var tc = await page.getTextContent(); out += tc.items.map(function(it){ return it.str; }).join(" ") + "\n"; }
      return out;
    }catch(e){ return ""; }
  }
  if(/\.docx?$/.test(name) && window.mammoth){
    try{ var ab = await file.arrayBuffer(); var res = await window.mammoth.extractRawText({ arrayBuffer: ab }); return res.value || ""; }catch(e){ return ""; }
  }
  return "";
}
async function handleResumeFile(file){
  if(!file){ return; }
  setUpStat("Reading " + file.name + " ...");
  var text = await extractText(file);
  // fill text field
  var m = document.getElementById("modal");
  var rt = m.querySelector("[data-field='resumeText']");
  if(rt && text){ rt.value = text.slice(0, 60000); }
  // auto-fill email/phone if empty
  if(text){
    var em = m.querySelector("[data-field='email']"); var ph = m.querySelector("[data-field='phone']");
    if(em && !em.value){ var e2 = grabEmail(text); if(e2){ em.value = e2; } }
    if(ph && !ph.value){ var p2 = grabPhone(text); if(p2){ ph.value = p2; } }
  }
  // upload to storage
  setUpStat("Uploading " + file.name + " ...");
  var path = ORG + "/" + Date.now() + "_" + file.name.replace(/[^A-Za-z0-9._\-]/g, "_");
  var up = await sb.storage.from("resumes").upload(path, file, { upsert: true });
  if(up.error){ setUpStat("Upload failed: " + up.error.message); return; }
  // stash path + filename on a hidden marker so save picks it up
  m.setAttribute("data-resumepath", path);
  m.setAttribute("data-resumefilename", file.name);
  setUpStat("Ready: " + file.name + (text ? " (text extracted)" : " (stored; no text found)"));
}
async function openResume(path){
  var res = await sb.storage.from("resumes").createSignedUrl(path, 3600);
  if(res.error || !res.data){ toast("Could not open file"); return; }
  window.open(res.data.signedUrl, "_blank");
}

/* ---------- bulk add ---------- */
function openBulk(){

  var head = el("div","mhead"); head.appendChild(el("h2", null, "Bulk Add")); var x = el("button","x","\u00d7"); x.setAttribute("data-close","1"); head.appendChild(x); m.appendChild(head);

  drop.appendChild(el("div","hint","One record per file. Name and location read from  LastName_FirstName_Location.  Text files (.txt) also load contents into Resume Text.")); body.appendChild(drop);
  body.appendChild(el("div","hint","Or paste lines. Each line becomes a candidate:  First Last, Title, Location"));
  var ta = el("textarea"); ta.id = "bulkText"; ta.style.width = "100%"; ta.style.minHeight = "130px"; ta.style.marginTop = "8px"; ta.style.background = "var(--bg)"; ta.style.color = "var(--ink)"; ta.style.border = "1px solid var(--line)"; ta.style.borderRadius = "8px"; ta.style.padding = "10px";
  ta.placeholder = "Jane Smith, Sr Systems Engineer, Fort Worth TX\nJohn Doe, Program Manager, Yuma"; body.appendChild(ta);
  var defRow = el("div","grid2"); defRow.style.marginTop = "12px";
  defRow.appendChild(field("Default Discipline","bDisc","","select",[""].concat(DISCIPLINES)));
  defRow.appendChild(field("Default Source","bSource","Resume Database","select",SOURCE));
  defRow.appendChild(field("Default Owner","bOwner",OWNERS[0] || "Unassigned","select",OWNERS)); body.appendChild(defRow); m.appendChild(body);
  var foot = el("div","mfoot"); foot.appendChild(el("div")); var right = el("div","right");
  var cancel = el("button","btn ghost","Cancel"); cancel.setAttribute("data-close","1"); var add = el("button","btn gold","Add Candidates"); add.setAttribute("data-bulkadd","1");
  right.appendChild(cancel); right.appendChild(add); foot.appendChild(right); m.appendChild(foot);
  document.getElementById("scrim").classList.add("open"); wireDrop();
}
function parseFilename(name){
  var base = name.replace(/\.[^.]+$/, ""); var parts = base.split("_"); var out = { firstName:"", lastName:"", location:"" };
  if(parts.length >= 2){ out.lastName = parts[0]; out.firstName = parts[1]; if(parts[2]){ out.location = parts[2].replace(/([a-z])([A-Z])/g, "$1 $2"); } }
  else{ var sp = base.split(/\s+/); out.firstName = sp[0] || base; out.lastName = sp.slice(1).join(" "); } return out;
}
function bulkDefaults(){ var m = document.getElementById("modal"); var dd = m.querySelector("[data-field='bDisc']"); var s = m.querySelector("[data-field='bSource']"); var o = m.querySelector("[data-field='bOwner']"); return { disc: dd ? dd.value : "", source: s ? s.value : "Resume Database", owner: o ? o.value : (OWNERS[0]||"Unassigned") }; }
function wireDrop(){
  var drop = document.getElementById("drop"); if(!drop){ return; }
  ["dragenter","dragover"].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.add("hot"); }); });
  ["dragleave","drop"].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.remove("hot"); }); });
  drop.addEventListener("drop", function(e){
    var files = e.dataTransfer.files; var d = bulkDefaults(); var rows = []; var pending = files.length; if(pending === 0){ return; }
    for(var i=0;i<files.length;i++){
      (function(file){
        var info = parseFilename(file.name); var c = newBlank();
        c.firstName = info.firstName; c.lastName = info.lastName; c.location = info.location; c.source = d.source; c.owner = d.owner; c.discipline = d.disc; c.resumeFileName = file.name;
        if(/\.txt$/i.test(file.name)){ var r = new FileReader(); r.onload = function(){ c.resumeText = String(r.result).slice(0,20000); rows.push(candToRow(c)); done(); }; r.onerror = function(){ rows.push(candToRow(c)); done(); }; r.readAsText(file); }
        else{ rows.push(candToRow(c)); done(); }
        async function done(){ pending--; if(pending === 0){ closeModal(); await run(sb.from("candidates").insert(rows), rows.length + " candidate(s) added"); } }
      })(files[i]);
    }
  });
}
async function bulkFromText(){
  var ta = document.getElementById("bulkText"); var d = bulkDefaults();
  var lines = (ta ? ta.value : "").split("\n").map(function(s){ return s.trim(); }).filter(Boolean); var rows = [];
  lines.forEach(function(line){ var cols = line.split(",").map(function(s){ return s.trim(); }); var np = (cols[0] || "").split(/\s+/);
    var c = newBlank(); c.firstName = np[0] || ""; c.lastName = np.slice(1).join(" "); c.title = cols[1] || ""; c.location = cols[2] || ""; c.source = d.source; c.owner = d.owner; c.discipline = d.disc; rows.push(candToRow(c)); });
  if(rows.length === 0){ closeModal(); return; }
  closeModal(); await run(sb.from("candidates").insert(rows), rows.length + " candidate(s) added");
}

/* ---------- CSV ---------- */
function parseCSV(text){
  var rows = []; var row = []; var cur = ""; var q = false;
  for(var i=0;i<text.length;i++){ var ch = text[i];
    if(q){ if(ch === '"'){ if(text[i+1] === '"'){ cur += '"'; i++; } else{ q = false; } } else{ cur += ch; } }
    else{ if(ch === '"'){ q = true; } else if(ch === ","){ row.push(cur); cur = ""; } else if(ch === "\n"){ row.push(cur); rows.push(row); row = []; cur = ""; } else if(ch === "\r"){} else{ cur += ch; } } }
  if(cur.length > 0 || row.length > 0){ row.push(cur); rows.push(row); } return rows;
}
async function importCSV(text){
  var rows = parseCSV(text).filter(function(r){ return r.join("").trim() !== ""; });
  if(rows.length < 2){ toast("No rows found"); return; }
  var head = rows[0].map(function(h){ return h.trim().toLowerCase(); });
  function idx(n){ return head.indexOf(n.toLowerCase()); }
  var map = { firstName:idx("first name"), lastName:idx("last name"), full:idx("full name"), email:idx("email"), phone:idx("phone"), location:idx("location"), title:idx("current title"), company:idx("current company"), skills:idx("skills"), source:idx("source"), status:idx("status"), priority:idx("priority"), owner:idx("recruiter owner"), disc:idx("discipline"), recv:idx("date received"), last:idx("last contacted"), next:idx("next follow up"), link:idx("resume link"), notes:idx("notes") };
  var out = [];
  for(var r=1;r<rows.length;r++){ var row = rows[r];
    function g(i){ return (i>=0 && row[i] !== undefined) ? row[i].trim() : ""; }
    var fn = g(map.firstName); var ln = g(map.lastName);
    if(!fn && !ln && map.full >= 0){ var sp = g(map.full).split(/\s+/); fn = sp[0] || ""; ln = sp.slice(1).join(" "); }
    var c = newBlank(); c.firstName = fn; c.lastName = ln; c.email = g(map.email); c.phone = g(map.phone); c.location = g(map.location); c.title = g(map.title); c.company = g(map.company); c.discipline = g(map.disc);
    c.skills = g(map.skills) ? g(map.skills).split(",").map(function(s){ return s.trim(); }).filter(Boolean) : [];
    c.source = g(map.source) || "Other"; c.status = g(map.status) || "New"; c.priority = g(map.priority) || "Medium"; c.owner = g(map.owner) || (OWNERS[0]||"Unassigned");
    c.dateReceived = g(map.recv) || todayISO(); c.lastContacted = g(map.last); c.nextFollowUp = g(map.next); c.resumeLink = g(map.link); c.notes = g(map.notes);
    out.push(candToRow(c));
  }
  await run(sb.from("candidates").insert(out), out.length + " candidate(s) imported");
}

/* ---------- export ---------- */
function exportData(){
  var headers = ["Full Name","First Name","Last Name","Email","Phone","Location","Discipline","Current Title","Current Company","Skills","Target Reqs","Source","Status","Priority","Recruiter Owner","Date Received","Last Contacted","Next Follow Up","Resume Link","Notes"];
  function esc(v){ v = (v === undefined || v === null) ? "" : String(v); if(/[",\n]/.test(v)){ return '"' + v.replace(/"/g, '""') + '"'; } return v; }
  var lines = [headers.join(",")];
  state.candidates.forEach(function(c){ lines.push([fullName(c),c.firstName,c.lastName,c.email,c.phone,c.location,c.discipline,c.title,c.company,(c.skills||[]).join(", "),(c.reqs||[]).join(" | "),c.source,c.status,c.priority,c.owner,c.dateReceived,c.lastContacted,c.nextFollowUp,c.resumeLink,c.notes].map(esc).join(",")); });
  download(CONFIG.company + "_Candidates_Export.csv", lines.join("\n"), "text/csv");
  toast("Exported CSV");
}
function exportDayforce(){
  // Standard Dayforce-style applicant import columns. Map to the client's
  // template if they provide one. Splits Location "City, ST" into City/State.
  var headers = ["First Name","Last Name","Email","Mobile Phone","Address Line 1","City","State","Country","Source","Candidate Status","Requisition Title","Current Job Title","Current Employer","Skills","Notes","Date Applied"];
  function esc(v){ v = (v === undefined || v === null) ? "" : String(v); if(/[",\n]/.test(v)){ return '"' + v.replace(/"/g, '""') + '"'; } return v; }
  function splitLoc(loc){ loc = loc || ""; var parts = loc.split(","); var city = (parts[0]||"").trim(); var st = (parts[1]||"").trim(); return { city:city, state:st }; }
  var lines = [headers.join(",")];
  state.candidates.forEach(function(c){
    var L = splitLoc(c.location);
    lines.push([
      c.firstName, c.lastName, c.email, c.phone, "", L.city, L.state, "USA",
      c.source, c.status, (c.reqs||[]).join(" | "), c.title, c.company,
      (c.skills||[]).join("; "), c.notes, c.dateReceived
    ].map(esc).join(","));
  });
  download(CONFIG.company + "_Dayforce_Import.csv", lines.join("\n"), "text/csv");
  toast("Dayforce CSV exported");
}
function download(name, content, mime){ var blob = new Blob([content], {type: mime}); var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = name; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(a.href); }, 500); }
