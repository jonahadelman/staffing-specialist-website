<script id="tb-enterprise-library">
/* ═══════════════════════════════════════════════════════════════════════════
   ENTERPRISE CANDIDATE LIBRARY (TB_ENTERPRISE_LIBRARY_V1 — default OFF)
   One candidate. One resume. One source of truth. Unlimited organizations.
   Cross-workspace candidates are REFERENCED, never copied:
   zero DB writes, zero storage writes, rollback = flag off.
   ═══════════════════════════════════════════════════════════════════════════ */
(function(){
  "use strict";
  if(typeof window === "undefined"){ return; }
  if(typeof window.TB_ENTERPRISE_LIBRARY_V1 === "undefined"){ window.TB_ENTERPRISE_LIBRARY_V1 = true; }
  window.XORG = { cands: [], orgs: [], loaded: false, sharedEmails: {} };
  var LIB_FILTER = "enterprise";
  var LIB_AVAIL = "available";   /* founder decision 2026-07-18: the library defaults to Available */
  var LIB_PAINT = false;         /* true while the library view is building rows (enables Elbit origin badge) */
  function flagOn(){ return window.TB_ENTERPRISE_LIBRARY_V1 === true; }
  function orgLabel(o){ return o === "hiarc" ? "HiArc" : o === "elbit" ? "Elbit" : (o || "").replace(/^\w/, function(c){ return c.toUpperCase(); }); }
  var ACTIVE_PROCESS = { "Submitted":1, "Interviewing Stage 1":1, "Interviewing Stage 2":1, "Interviewing Stage 3":1, "Panel / Final Interview":1, "Interviewing":1, "Offer Pending":1, "TA Interview":1 };

  /* ---------- availability model (founder-approved tiers) ----------
     available    → open talent, adoptable
     submitted    → read-only, "Already Active"
     interviewing → read-only, "Interview Process"  (incl. TA/panel stages)
     offer        → locked,    "Offer Pending"
     hired        → hidden unless explicitly filtered to
     other        → archived / rejected / withdrawn (visible under All Statuses) */
  function availCat(c){
    var s = (c && c.status) || "";
    if(s === "Offer Accepted - Hired"){ return "hired"; }
    if(s === "Offer Pending"){ return "offer"; }
    if(s === "Submitted"){ return "submitted"; }
    if(/^Interviewing/.test(s) || s === "Panel / Final Interview" || s === "TA Interview"){ return "interviewing"; }
    if(s === "Archived" || s === "Withdrawn" || s === "TA Rejected" || s === "HM Rejected"){ return "other"; }
    return "available";
  }
  function isActiveCat(cat){ return cat === "submitted" || cat === "interviewing" || cat === "offer"; }
  var XORG_CUE = { submitted: "Already Active", interviewing: "Interview Process", offer: "Offer Pending", hired: "Hired" };
  /* only openly-available cross-workspace talent feeds TalentFit & AutoSlate —
     never slate a candidate mid-process at another client */
  window.XORG.recruitable = function(){ return XORG.cands.filter(function(c){ return availCat(c) === "available"; }); };

  /* ---------- loader: aggregate every workspace this account can access ---------- */
  async function loadXorg(){
    try{
      if(!flagOn() || XORG.loaded || typeof sb === "undefined" || !sb || typeof CURRENT_USER === "undefined" || !CURRENT_USER){ return; }
      var prof = await sb.from("profiles").select("orgs").eq("id", CURRENT_USER.id).single();
      var all = (prof.data && prof.data.orgs) || [];
      var others = all.filter(function(o){ return o && o !== ORG; });
      XORG.orgs = others;
      var localEmails = {};
      (state.candidates || []).forEach(function(c){ var e = (c.email || "").trim().toLowerCase(); if(e){ localEmails[e] = c; } });
      var pool = [];
      for(var i = 0; i < others.length; i++){
        var res = await sb.from("candidates").select("*").eq("org", others[i]);
        if(res.error){ continue; }
        (res.data || []).forEach(function(row){
          var c = rowToCand(row);
          c._xorg = others[i];
          var e = (c.email || "").trim().toLowerCase();
          if(e && localEmails[e]){ localEmails[e]._shared = true; XORG.sharedEmails[e] = 1; return; } /* shown once — local record preferred */
          pool.push(c);
        });
      }
      XORG.cands = pool;
      XORG.loaded = true;
      try{ renderTabs(); if(ui.view === "all"){ renderList(); } }catch(eR){}
    }catch(e){ /* enterprise layer must never break the workspace */ }
  }
  var bootPoll = setInterval(function(){
    if(!flagOn()){ clearInterval(bootPoll); return; }
    if(typeof state !== "undefined" && state.candidates && state.candidates.length && typeof sb !== "undefined" && sb){
      clearInterval(bootPoll); loadXorg();
    }
  }, 700);

  /* ---------- origin badges on every candidate card ---------- */
  if(typeof rowFor === "function"){
    var _rowFor = rowFor;
    window.rowFor = function(c){
      var tr = _rowFor(c);
      try{
        if(c && c._xorg){
          /* the app's delegated row-click resolves ids against state.candidates only —
             cross-workspace rows need their own opener (referenced, not in local state) */
          tr.addEventListener("click", function(ev){ ev.stopPropagation(); openDetail(c); });
        }
        if(c && (c._xorg || c._shared || (LIB_PAINT && !c._xorg))){
          var nm = tr.querySelector(".nm");
          if(nm){
            /* origin badge on EVERY enterprise row: 🟦 HiArc · 🟩 Elbit — small, instant, not flashy */
            if(c._xorg || LIB_PAINT){
              var b = el("span", null, c._xorg ? orgLabel(c._xorg) : orgLabel(ORG));
              b.style.cssText = "margin-left:7px;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;border-radius:4px;padding:1px 6px;vertical-align:1px;" +
                (c._xorg ? "color:#2563eb;background:rgba(37,99,235,.10)" : "color:#15803d;background:rgba(21,128,61,.10)");
              b.title = c._xorg ? ("Enterprise candidate — originally sourced by " + orgLabel(c._xorg) + "; one record, one resume") : ("Sourced by " + orgLabel(ORG));
              nm.appendChild(b);
            }
            if(c._shared){
              var sh = el("span", null, "Shared");
              sh.style.cssText = "margin-left:5px;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;border-radius:4px;padding:1px 6px;vertical-align:1px;color:var(--muted);background:var(--panel2)";
              sh.title = "Exists in more than one workspace";
              nm.appendChild(sh);
            }
            var cue = c._xorg ? XORG_CUE[availCat(c)] : null;
            if(cue){
              var st = el("span", null, cue);
              st.style.cssText = "margin-left:6px;font-size:9.5px;font-weight:700;color:" + (availCat(c) === "offer" ? "var(--red)" : "var(--orange)");
              st.title = orgLabel(c._xorg) + " – " + c.status + " — in another client's recruiting process; not available talent";
              nm.appendChild(st);
            }
          }
        }
      }catch(e){}
      return tr;
    };
  }

  /* ---------- read-only profile + Adopt for cross-workspace candidates ---------- */
  if(typeof openDetail === "function"){
    var _openDetail = window.openDetail;
    window.openDetail = function(c){
      if(!(flagOn() && c && c._xorg)){ _openDetail(c); return; }
      var was = VIEW_ONLY; VIEW_ONLY = true;           /* reuse the proven read-only rendering */
      try{ _openDetail(c); } finally { VIEW_ONLY = was; }
      try{
        var mh = document.querySelector("#modal .mhead h2");
        if(mh){
          var ob = el("span", null, "Enterprise Candidate · Originally sourced by " + orgLabel(c._xorg)); ob.style.cssText = "margin-left:10px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#2563eb;background:rgba(37,99,235,.10);border-radius:5px;padding:2px 8px;vertical-align:3px";
          mh.appendChild(ob);
          var mcat = availCat(c);
          if(XORG_CUE[mcat]){
            var sb2 = el("span", null, XORG_CUE[mcat]);
            sb2.style.cssText = "margin-left:6px;font-size:10px;font-weight:700;vertical-align:3px;color:" + (mcat === "offer" ? "var(--red)" : "var(--orange)");
            sb2.title = orgLabel(c._xorg) + " – " + c.status + " — in another client's recruiting process";
            mh.appendChild(sb2);
          }
        }
        /* cross-workspace record: engagement happens in its home workspace — strip
           local write-path actions (Submit to HM / Scorecard act on Elbit state) */
        var foot = document.querySelector("#modal .mfoot .right");
        if(foot){
          ["[data-submitcand]","[data-scorecard]","[data-tareject]","[data-hmreject]"].forEach(function(sel){
            var b = foot.querySelector(sel); if(b){ b.remove(); }
          });
        }
        if(foot && !was){
          if(availCat(c) === "available"){
            var ad = el("button","btn gold","Add to " + orgLabel(ORG) + " Pipeline"); ad.type = "button";
            ad.title = "Start recruiting this candidate for " + orgLabel(ORG) + " — assign requisitions, add notes, submit to hiring managers. One candidate, one resume: the " + orgLabel(c._xorg) + " record is never changed.";
            ad.addEventListener("click", function(){ adoptCandidate(c); });
            foot.insertBefore(ad, foot.firstChild);
          }else{
            /* founder rule: mid-process / hired candidates are not available talent — no Adopt */
            var lk = el("span", null, availCat(c) === "offer" ? "Locked — offer pending at " + orgLabel(c._xorg) : "In process at " + orgLabel(c._xorg) + " — can’t be added to a pipeline right now");
            lk.style.cssText = "font-size:11.5px;font-weight:600;color:var(--muted);margin-right:10px;align-self:center";
            foot.insertBefore(lk, foot.firstChild);
          }
        }
      }catch(e){}
    };
  }
  window.adoptCandidate = async function(c){
    var msg = "Start recruiting " + fullName(c) + " for " + orgLabel(ORG) + "?\n\n" +
      "• " + fullName(c) + " joins the " + orgLabel(ORG) + " pipeline on your desk.\n" +
      "• Assign requisitions, add notes, submit to hiring managers.\n" +
      "• One candidate, one resume — nothing is duplicated.\n" +
      "• The " + orgLabel(c._xorg) + " record is never changed.";
    if(!window.confirm(msg)){ return; }
    var row = candToRow(c);
    row.org = ORG;
    row.status = "New";
    var _meFirst = ((CURRENT_USER && CURRENT_USER.email) || "").trim().split("@")[0].split(/[._+\-]/)[0].toLowerCase();
    var _meOwner = (typeof OWNERS !== "undefined" ? OWNERS : []).filter(function(o){ return o.toLowerCase() === _meFirst; })[0];
    row.owner = _meOwner || ((typeof OWNERS !== "undefined" && OWNERS.indexOf(row.owner) >= 0) ? row.owner : "Unassigned"); /* the recruiter starting the process owns the candidate */
    row.notes = ((row.notes || "") + "\n[Added to " + orgLabel(ORG) + " pipeline from " + orgLabel(c._xorg) + " " + new Date().toISOString().slice(0,10) + " — the " + orgLabel(c._xorg) + " record is unchanged; status there was “" + (c.status || "?") + "”. One resume, referenced, not copied.]").trim();
    delete row.id;
    var ins = await sb.from("candidates").insert(row).select().single();
    if(ins.error){ toast("Adopt failed: " + ins.error.message.slice(0, 60)); return; }
    XORG.cands = XORG.cands.filter(function(x){ return x !== c && x.id !== c.id; });
    try{ state.candidates.push(rowToCand(ins.data)); }catch(eP){}
    closeModal();
    toast(fullName(c) + " added to the " + orgLabel(ORG) + " pipeline — the " + orgLabel(c._xorg) + " record is untouched");
    try{ renderTabs(); renderList(); }catch(eR){}
  };

  /* ---------- the Enterprise Candidate Library view ---------- */
  function libFilters(){
    var meFirst = (typeof CURRENT_USER !== "undefined" && CURRENT_USER && CURRENT_USER.email) ? CURRENT_USER.email.trim().split("@")[0].split(/[._]/)[0].toLowerCase() : "";
    var now = Date.now(); var recentMs = 14 * 86400000;
    return [
      ["enterprise", "Enterprise", function(){ return true; }],
      ["elbit", orgLabel(ORG), function(c){ return !c._xorg; }],
      ["hiarc", XORG.orgs.length ? orgLabel(XORG.orgs[0]) : "Other", function(c){ return !!c._xorg; }],
      ["shared", "Shared Candidates", function(c){ return !!c._shared; }],
      ["recent", "Recently Added", function(c){ var d = Date.parse(c.dateReceived || ""); return d && (now - d) < recentMs; }],
      ["mine", "Owned By Me", function(c){ return (c.owner || "").toLowerCase().indexOf(meFirst) === 0 && meFirst; }]
    ];
  }
  /* availability dimension — founder-approved; defaults to Available so nobody
     unknowingly pursues a candidate mid-process at another client */
  function libAvail(){
    return [
      ["available", "Available", function(c){ return availCat(c) === "available"; }],
      ["active", "Active Process", function(c){ return isActiveCat(availCat(c)); }],
      ["submitted", "Submitted", function(c){ return availCat(c) === "submitted"; }],
      ["interviewing", "Interviewing", function(c){ return availCat(c) === "interviewing"; }],
      ["offer", "Offer", function(c){ return availCat(c) === "offer"; }],
      ["hired", "Hired", function(c){ return availCat(c) === "hired"; }],
      ["allstatus", "All Statuses", function(){ return true; }]
    ];
  }
  window.renderEnterpriseLibrary = function(){
    var host = document.getElementById("list"); host.innerHTML = "";
    document.getElementById("viewTitle").textContent = "Candidate Library";
    var pool = (state.candidates || []).concat(XORG.loaded ? XORG.cands : []);
    var defs = libFilters(); var avails = libAvail();
    var fdef = defs.filter(function(d){ return d[0] === LIB_FILTER; })[0] || defs[0];
    var adef = avails.filter(function(d){ return d[0] === LIB_AVAIL; })[0] || avails[0];
    /* information banner — read-only until adopted */
    var ban = el("div");
    ban.style.cssText = "border:1px solid var(--line);border-left:3px solid #2563eb;background:var(--panel);border-radius:8px;padding:9px 13px;margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.5";
    var bt = el("b", null, "Candidate Library"); bt.style.cssText = "color:var(--ink);margin-right:6px";
    ban.appendChild(bt);
    ban.appendChild(document.createTextNode("One record. One resume. Zero duplicates. Enterprise-wide visibility — candidates from your other workspaces are read-only until you add them to your pipeline."));
    host.appendChild(ban);
    /* context strip — the user should never have to do math between the
       sidebar total and the filtered chips (Monday-morning audit, Bug #2) */
    var availableN = pool.filter(function(c){ return availCat(c) === "available"; }).length;
    var sharedN = pool.filter(function(c){ return !!c._shared; }).length;
    var ctx = el("div"); ctx.style.cssText = "display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;margin-bottom:10px";
    function ctxStat(n, label, tip){
      var w = el("span"); w.style.cssText = "font-size:13px;color:var(--muted)"; w.title = tip;
      var b = el("b", null, String(n)); b.style.cssText = "font-size:17px;font-weight:800;color:var(--ink);margin-right:5px";
      w.appendChild(b); w.appendChild(document.createTextNode(label));
      return w;
    }
    ctx.appendChild(ctxStat(pool.length, "total candidates", "Every candidate across all " + (1 + XORG.orgs.length) + " workspaces — the same number as the sidebar and the All Statuses chip."));
    ctx.appendChild(el("span","hint","·"));
    ctx.appendChild(ctxStat(availableN, "available now", "Open talent — not mid-process at any client, not hired. This is what the chips below show under the default Available filter."));
    if(sharedN){ ctx.appendChild(el("span","hint","·")); ctx.appendChild(ctxStat(sharedN, "shared across workspaces", "Candidates who exist in more than one workspace — shown once, local record preferred.")); }
    host.appendChild(ctx);
    /* chip rows with dynamic counts — every count equals exactly what clicking it shows */
    function chipRow(list, current, setter, poolFor, tipFor){
      var bar = el("div"); bar.style.cssText = "display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px;align-items:center";
      list.forEach(function(d){
        var n = poolFor(d).length;
        var on = current === d[0];
        var ch = el("button", null, d[1] + " " + n); ch.type = "button";
        if(tipFor){ ch.title = tipFor(d, n); }
        ch.style.cssText = "border-radius:999px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid " +
          (on ? "var(--gold);background:var(--gold);color:#fff" : "var(--line);background:var(--panel);color:var(--ink)");
        ch.addEventListener("click", function(){ setter(d[0]); renderList(); });
        bar.appendChild(ch);
      });
      return bar;
    }
    host.appendChild(chipRow(defs, LIB_FILTER, function(v){ LIB_FILTER = v; },
      function(d){ return pool.filter(function(c){ return d[2](c) && adef[2](c); }); },
      function(d, n){ return n + " " + d[1] + " candidate" + (n === 1 ? "" : "s") + " under the current availability filter (" + adef[1] + "). Switch Availability to All Statuses for workspace totals."; }));
    var avLab = el("span", null, "Availability:"); avLab.style.cssText = "font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin-right:2px";
    var avRow = chipRow(avails, LIB_AVAIL, function(v){ LIB_AVAIL = v; },
      function(d){ return pool.filter(function(c){ return d[2](c) && fdef[2](c); }); },
      function(d, n){ return d[0] === "allstatus" ? (n + " candidates in the current scope with no availability filter — with Enterprise scope this equals the sidebar total.") : (n + " " + d[1] + " candidate" + (n === 1 ? "" : "s") + " within the current scope (" + fdef[1] + ")."); });
    avRow.insertBefore(avLab, avRow.firstChild); avRow.style.marginBottom = "14px";
    host.appendChild(avRow);
    var rows = pool.filter(function(c){ return fdef[2](c) && adef[2](c) && matchesSearch(c) && passFilters(c); });
    rows = pipelineSort(rows);
    document.getElementById("viewMeta").textContent = pool.length + " candidates across " + (1 + XORG.orgs.length) + " workspaces · showing " + rows.length + " (" + fdef[1] + " · " + adef[1] + ") · one record, one resume, zero copies";
    if(!rows.length){
      var em = el("div","empty"); em.appendChild(el("div","big","No candidates match"));
      em.appendChild(el("div", null, "Adjust the library filter, availability, search, or filters."));
      host.appendChild(em); return;
    }
    var table = el("table","cardtable"); var tb = el("tbody");
    LIB_PAINT = true;
    try{ rows.forEach(function(c){ tb.appendChild(rowFor(c)); }); } finally { LIB_PAINT = false; }
    table.appendChild(tb); host.appendChild(table);
  };
  /* chain LAST over renderList so the library takes over the 'all' view when ON */
  var _prevRL = window.renderList;
  window.renderList = function(){
    if(flagOn() && typeof ui !== "undefined" && ui.view === "all"){
      try{ renderEnterpriseLibrary(); return; }catch(e){ /* fall through to standard view */ }
    }
    _prevRL();
  };
})();
</script>

<script id="tb-workstations">
/* ═══════════════════════════════════════════════════════════════════════════
   TALENTBASE v3.0 — WORKSTATION LAYER (the Recruiting Operating System)
   One engine, five workstations. Every login resolves
   Organization → Program → Role → Workstation, never a hardcoded user.
   Dayforce stays the System of Record; TalentBase is the System of Execution.
   ═══════════════════════════════════════════════════════════════════════════ */
(function(){
  "use strict";
  if(typeof window === "undefined"){ return; }

  /* ---------- 1. WORKSTATION ASSIGNMENTS (first-class, config-driven) ----------
     Explicit assignments win; rules cover everyone else. Programs scope which
     departments a user works — "*" means all. */
  window.TB_WORKSTATION_ASSIGNMENTS = window.TB_WORKSTATION_ASSIGNMENTS || {
    "jonah.adelman1979@gmail.com": { workstation: "admin",     programs: "*" },
    /* examples per the v3.0 assignment model — activate by matching real logins:
       "amy@...":     { workstation: "recruiter", programs: ["MTC","SlingWorks"] },
       "anthony@...": { workstation: "admin",     programs: "*" },
       "nicole@...":  { workstation: "executive", programs: "*" }  */
  };
  var WS_HOME = { recruiter:"guide", manager:"tb_ws_manager", hm:"tb_hm_review", executive:"tb_brief", admin:"tb_ws_admin" };
  var WS_LABEL = { recruiter:"Recruiter Workstation", manager:"Recruiting Manager Workstation", hm:"Hiring Manager Workstation", executive:"Executive Workstation", admin:"Administrator Workstation" };

  /* ── ADMIN IMPERSONATION: become any user for support, training, QA.
     View-only by default; Edit requires confirmation; every session is
     audit-logged to the database. ── */
  window.TB_IMPERSONATE = null;
  async function tbAuditLog(text){
    try{ if(sb && CURRENT_USER){ await sb.from("program_notes").insert({ org: ORG, author_id: CURRENT_USER.id, author_email: (CURRENT_USER.email || "").trim(), body: text, context: "admin_audit" }); if(typeof loadNotes === "function"){ await loadNotes(); } } }catch(eA){}
  }
  window.tbImpersonate = function(target){
    window.TB_IMPERSONATE = { name: target.name, ws: target.ws, started: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }), edit: false };
    tbAuditLog("[Admin Access] " + ((CURRENT_USER && CURRENT_USER.email) || "admin").trim() + " opened the " + (WS_LABEL[target.ws] || target.ws) + " as " + target.name + " (view-only)");
    window.TB_WORKSTATION_OVERRIDE = null;
    tbApplyWorkstation(true);
  };
  window.tbImpersonateEdit = function(){
    if(!window.TB_IMPERSONATE){ return; }
    if(!window.confirm("Enter Edit Mode as " + window.TB_IMPERSONATE.name + "?\n\nYou will be able to change records exactly as they can.\nEvery action is logged to the audit trail.")){ return; }
    window.TB_IMPERSONATE.edit = true;
    tbAuditLog("[Admin Access] edit mode ENABLED while acting as " + window.TB_IMPERSONATE.name);
    tbApplyWorkstation(true);
  };
  window.tbImpersonateSwitch = function(target){
    var prev = window.TB_IMPERSONATE;
    if(prev){ tbAuditLog("[Admin Access] ended session as " + prev.name + (prev.edit ? " (edit mode was used)" : " (view-only)")); }
    tbImpersonate(target);
  };
  window.tbImpersonateEnd = function(){
    var imp = window.TB_IMPERSONATE; window.TB_IMPERSONATE = null;
    if(imp){ tbAuditLog("[Admin Access] ended session as " + imp.name + (imp.edit ? " (edit mode was used)" : " (view-only)")); }
    window.TB_WORKSTATION_OVERRIDE = null;
    tbApplyWorkstation(true);
  };
  function tbResolveWorkstation(){
    if(window.TB_IMPERSONATE){ return window.TB_IMPERSONATE.ws; }   /* impersonation wins over everything */
    if(window.TB_WORKSTATION_OVERRIDE){ return window.TB_WORKSTATION_OVERRIDE; } /* admin View-as */
    var email = ((typeof CURRENT_USER !== "undefined" && CURRENT_USER && CURRENT_USER.email) || "").trim().toLowerCase();
    var cfg = window.TB_WORKSTATION_ASSIGNMENTS[email];
    if(cfg && cfg.workstation){ return cfg.workstation; }
    var first = email.split("@")[0].split(/[._+\-]/)[0];
    if(first === "jonah" || first === "anthony"){ return "admin"; }
    if(first === "nicole"){ return "executive"; }
    if(typeof MANAGERS !== "undefined" && MANAGERS.some(function(m){ return (m.email || "").toLowerCase() === email; })){ return "hm"; }
    if(typeof VIEW_ONLY !== "undefined" && VIEW_ONLY){ return "executive"; } /* read-only accounts get the executive experience */
    return "recruiter";
  }
  window.TB_WS = null;

  var EXEC_VIEWS = { tb_brief:1, dashboard:1, reqs:1, talentbench:1, all:1, tb_people_hm:1, tb_people_rec:1 };
  window.TB_WS_FILTER = function(v){
    var ws = window.TB_WS || "recruiter";
    if(ws === "hm"){ return v.ws === "hm"; }
    if(ws === "executive"){ return !v.ws && EXEC_VIEWS[v.id]; }
    if(ws === "manager"){ return !v.ws || v.ws === "manager"; }
    if(ws === "admin"){ return !v.ws || v.ws === "admin"; }
    return !v.ws; /* recruiter: the flagship experience, nothing bolted on */
  };

  function isAdmin(){
    if(window.TB_IMPERSONATE){ return window.TB_IMPERSONATE.ws === "admin"; } /* while impersonating you carry THEIR rights */
    return (window.TB_WS === "admin") || (!window.TB_WORKSTATION_OVERRIDE && tbResolveWorkstation() === "admin");
  }
  function hmName(){
    if(window.TB_IMPERSONATE && window.TB_IMPERSONATE.ws === "hm"){ return window.TB_IMPERSONATE.name; }
    var email = ((CURRENT_USER && CURRENT_USER.email) || "").trim().toLowerCase();
    var m = (typeof MANAGERS !== "undefined" ? MANAGERS : []).filter(function(x){ return (x.email || "").toLowerCase() === email; })[0];
    if(m){ return m.name; }
    return window.TB_HM_PREVIEW || ""; /* admin View-as previews the first HM */
  }

  /* ---------- 2. CANDIDATE OWNERSHIP (claim → own → transfer, history kept) ---------- */
  var LOCKED_STATUSES = { "Submitted":1, "Interviewing Stage 1":1, "Interviewing Stage 2":1, "Interviewing Stage 3":1, "Panel / Final Interview":1, "Interviewing":1, "Offer Pending":1 };
  function meOwnerName(){
    if(window.TB_IMPERSONATE){
      var inm = window.TB_IMPERSONATE.name.split(" ")[0];
      var ihit = (typeof OWNERS !== "undefined" ? OWNERS : []).filter(function(o){ return o.toLowerCase() === inm.toLowerCase(); })[0];
      return ihit || inm;
    }
    var first = ((CURRENT_USER && CURRENT_USER.email) || "").trim().split("@")[0].split(/[._+\-]/)[0].toLowerCase();
    var hit = (typeof OWNERS !== "undefined" ? OWNERS : []).filter(function(o){ return o.toLowerCase() === first; })[0];
    return hit || (first ? first.charAt(0).toUpperCase() + first.slice(1) : "");
  }
  function ownerIsMe(c){ return (c.owner || "") !== "" && c.owner !== "Unassigned" && c.owner.toLowerCase() === meOwnerName().toLowerCase(); }
  function unclaimed(c){ return !c.owner || c.owner === "Unassigned"; }
  async function logOwnership(c, text){
    try{ if(!sb){ return; } await sb.from("activities").insert({ org: ORG, candidate_id: c.id, type: "Note", date: todayISO(), notes: "[Ownership] " + text, owner: meOwnerName() }); await loadData(); }catch(e){}
  }
  window.tbClaimCandidate = async function(c){
    var me = meOwnerName(); if(!me){ toast("Sign in to claim candidates."); return; }
    var res = await sb.from("candidates").update({ owner: me }).eq("id", c.id);
    if(res.error){ toast("Claim failed: " + res.error.message.slice(0, 60)); return; }
    await logOwnership(c, "Claimed by " + me + ".");
    closeModal(); toast(fullName(c) + " is now on your desk."); refresh();
  };
  window.tbTransferCandidate = async function(c){
    var to = window.prompt("Transfer " + fullName(c) + " to which recruiter?\n\n" + OWNERS.join(" · "), "");
    if(!to){ return; }
    var match = OWNERS.filter(function(o){ return o.toLowerCase() === to.trim().toLowerCase(); })[0];
    if(!match){ toast("No recruiter named “" + to + "”."); return; }
    var res = await sb.from("candidates").update({ owner: match }).eq("id", c.id);
    if(res.error){ toast("Transfer failed: " + res.error.message.slice(0, 60)); return; }
    await logOwnership(c, "Transferred from " + (c.owner || "Unassigned") + " to " + match + ".");
    closeModal(); toast(fullName(c) + " transferred to " + match + "."); refresh();
  };
  /* enforce ownership on the candidate record — chained over the library layer */
  if(typeof openDetail === "function"){
    var _od = window.openDetail;
    window.openDetail = function(c){
      var ws = window.TB_WS || "recruiter";
      if(!c || c._xorg || isAdmin() || ws === "executive" || ws === "hm"){ _od(c); tbOwnershipChrome(c, false); return; }
      var lockedToOther = !unclaimed(c) && !ownerIsMe(c);
      if(!lockedToOther){ _od(c); tbOwnershipChrome(c, false); return; }
      /* another recruiter's candidate: view, recommend, request transfer — never edit */
      var was = VIEW_ONLY; VIEW_ONLY = true;
      try{ _od(c); } finally { VIEW_ONLY = was; }
      tbOwnershipChrome(c, true);
    };
  }
  function tbOwnershipChrome(c, lockedToOther){
    try{
      if(!c || c._xorg){ return; }
      var mh = document.querySelector("#modal .mhead h2"); if(!mh){ return; }
      var ws = window.TB_WS || "recruiter";
      if(ws === "hm" && c.id){
        var footH = document.querySelector("#modal .mfoot .right");
        if(footH && !footH.querySelector("[data-hmfb]")){
          var ri = el("button","btn gold","Request Interview"); ri.type = "button"; ri.setAttribute("data-hmfb","1");
          ri.title = "Sends an interview request for this candidate straight to your recruiter";
          ri.addEventListener("click", function(){ tbHMDecision(c, "Interview"); });
          var ps = el("button","btn ghost","Pass"); ps.type = "button"; ps.setAttribute("data-hmfb","1");
          ps.title = "Sends a pass decision (with your reason) straight to your recruiter";
          ps.addEventListener("click", function(){ tbHMDecision(c, "Reject"); });
          footH.insertBefore(ps, footH.firstChild); footH.insertBefore(ri, footH.firstChild);
        }
        return;
      }
      if(lockedToOther){
        var ob = el("span", null, "Owned by " + c.owner + (LOCKED_STATUSES[c.status] ? " · in process" : ""));
        ob.style.cssText = "margin-left:10px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--orange);background:rgba(234,88,12,.09);border-radius:5px;padding:2px 8px;vertical-align:3px";
        mh.appendChild(ob);
        var foot = document.querySelector("#modal .mfoot .right");
        if(foot){
          var rq = el("button","btn","Request Transfer"); rq.type = "button";
          rq.title = "Logs a transfer request on the record — " + c.owner + " and the recruiting manager see it";
          rq.addEventListener("click", function(){ logOwnership(c, "Transfer requested by " + meOwnerName() + "."); toast("Transfer request logged for " + c.owner + "."); });
          var rec = el("button","btn ghost","Recommend"); rec.type = "button";
          rec.title = "Recommend this candidate for a requisition — it routes to that requisition\u2019s recruiter as actionable work";
          rec.addEventListener("click", function(){ tbRecommendCandidate(c); });
          foot.insertBefore(rq, foot.firstChild); foot.insertBefore(rec, foot.firstChild);
        }
      } else if(unclaimed(c) && (ws === "recruiter" || ws === "manager" || ws === "admin")){
        var foot2 = document.querySelector("#modal .mfoot .right");
        if(foot2 && !VIEW_ONLY && c.id){
          var cl = el("button","btn gold","Claim Candidate"); cl.type = "button";
          cl.title = "Put this candidate on your desk — ownership is logged on the record";
          cl.addEventListener("click", function(){ tbClaimCandidate(c); });
          foot2.insertBefore(cl, foot2.firstChild);
        }
      } else if((ownerIsMe(c) || isAdmin()) && c.id && !VIEW_ONLY){
        var foot3 = document.querySelector("#modal .mfoot .right");
        if(foot3){
          var tr = el("button","btn ghost sm","Transfer"); tr.type = "button";
          tr.title = "Hand this candidate to another recruiter — ownership history is kept on the record";
          tr.addEventListener("click", function(){ tbTransferCandidate(c); });
          foot3.insertBefore(tr, foot3.firstChild);
        }
      }
    }catch(e){}
  }

  /* ---------- 3. CANDIDATE INTELLIGENCE (computed live, zero DB writes) ---------- */
  var DISC_RULES = [
    ["Program Management", /program manager|project manager|\bpmp\b|\bpmo\b|program management|scrum master/i],
    ["Systems Engineering", /systems engineer|sys\.? eng|model.based|mbse|requirements engineer|integration lead/i],
    ["Engineering Leadership", /chief engineer|director.{0,12}engineering|engineering manager|vp.{0,10}engineering|head of engineering/i],
    ["Software", /software|developer|devops|full.?stack|embedded|c\+\+|java|python|rtos/i],
    ["Electrical / Hardware", /electrical|hardware|fpga|pcb|circuit|power electronics|\bee\b/i],
    ["Mechanical / Hardware", /mechanical|structural|thermal|\bcad\b|solidworks|creo/i],
    ["Test & Evaluation", /test engineer|test technician|\bt&e\b|verification|validation|flight test/i],
    ["Configuration Management", /configuration (analyst|manag)|\bcm\b analyst|data management/i],
    ["Manufacturing", /manufactur|production engineer|assembler|technician|industrial engineer|\bnpi\b/i],
    ["Quality", /quality|qa engineer|\bcapa\b|supplier quality|mission assurance/i],
    ["Supply Chain", /supply chain|procurement|buyer|logistics|material/i],
    ["Cyber / DevSecOps", /cyber|security engineer|devsecops|\bisso\b|\brmf\b/i]
  ];
  window.tbInferDiscipline = function(c){
    var hay = ((c.title || "") + " " + ((c.skills || []).join(" ")) + " " + (c.company || "") + " " + String(c.resumeText || "").slice(0, 1500)).toLowerCase();
    for(var i = 0; i < DISC_RULES.length; i++){ if(DISC_RULES[i][1].test(hay)){ return DISC_RULES[i][0]; } }
    return "";
  };
  window.tbIntelligence = function(){
    var out = { uncategorized: [], inferred: 0 };
    (state.candidates || []).forEach(function(c){
      if(!c.discipline || c.discipline === "Other" || c.discipline === ""){
        var d = tbInferDiscipline(c);
        if(d){ c._inferredDisc = d; out.inferred++; }
        out.uncategorized.push(c);
      }
    });
    return out;
  };
  /* NEW badge: fresh, unclaimed talent flowing into the workstation */
  if(typeof rowFor === "function"){
    var _rf = window.rowFor;
    window.rowFor = function(c){
      var tr = _rf(c);
      try{
        if(c && !c._xorg && unclaimed(c)){
          var d = Date.parse(c.dateReceived || "");
          if(d && (Date.now() - d) < 7 * 86400000){
            var nm = tr.querySelector(".nm");
            if(nm){
              var nb = el("span", null, "NEW");
              nb.style.cssText = "margin-left:6px;font-size:8.5px;font-weight:800;letter-spacing:.6px;border-radius:4px;padding:1px 5px;vertical-align:1px;color:#fff;background:var(--green)";
              nb.title = "Arrived in the last 7 days and unclaimed — open the record to claim it";
              nm.appendChild(nb);
            }
          }
        }
        if(c && !c._xorg && c._inferredDisc && (!c.discipline || c.discipline === "Other")){
          var dsc = tr.querySelectorAll("td")[2];
          if(dsc && /^(-|Other)?$/.test(dsc.textContent.trim())){ dsc.textContent = c._inferredDisc; dsc.title = "Suggested by Candidate Intelligence — not yet written to the record"; dsc.style.fontStyle = "italic"; }
        }
      }catch(e){}
      return tr;
    };
  }

  /* ---------- 3b. RECOMMENDATION WORKFLOW (launch certification) ----------
     A recommendation is routed work, not a note: pick the requisition, the
     system determines that req's recruiter, and it lands in their
     "Recommended to Me" queue with a full status trail —
     Recommended → Accepted (claimed) / Declined. History lives on the record. */
  function tbRecParse(a){
    var m = /^\[Recommendation\] to:(.+?) req:(.+?) status:(\w+) by:(.+?)(?: — ([\s\S]*))?$/.exec((a.notes || "").trim());
    return m ? { to: m[1], req: m[2], status: m[3], by: m[4], reason: m[5] || "", date: a.date || "", candidateId: a.candidateId } : null;
  }
  function tbRecStateFor(candidateId){
    var recs = (state.activities || []).filter(function(a){ return a.candidateId === candidateId; }).map(tbRecParse).filter(Boolean);
    if(!recs.length){ return null; }
    /* a decision (Accepted/Declined) always supersedes the pending Recommended
       for the same recruiter+req — independent of same-day sort order */
    var pending = recs.filter(function(r){ return r.status === "Recommended"; });
    var open = pending.filter(function(p){
      return !recs.some(function(r){ return r.status !== "Recommended" && r.to === p.to && r.req === p.req; });
    });
    if(open.length){ return open[0]; }
    var decided = recs.filter(function(r){ return r.status !== "Recommended"; });
    return decided.length ? decided[0] : recs[0];
  }
  function tbRecPendingFor(candidateId){
    var r = tbRecStateFor(candidateId);
    return (r && r.status === "Recommended") ? r : null;
  }
  function tbReqRecruiter(reqTag){
    var counts = {};
    (state.candidates || []).forEach(function(c){
      if((c.reqs || []).indexOf(reqTag) !== -1 && c.owner && c.owner !== "Unassigned" && c.status !== "Archived"){ counts[c.owner] = (counts[c.owner] || 0) + 1; }
    });
    var best = Object.keys(counts).sort(function(a,b){ return counts[b] - counts[a]; })[0];
    return best || null;
  }
  window.tbRecommendCandidate = async function(c){
    var open = REQS.filter(function(r){ return !r.bench && (window.TB_METRICS ? TB_METRICS.isOpenReq(r) : true); });
    var pick = window.prompt("Recommend " + fullName(c) + " for which requisition?\n\nType a req # or part of the title:", "");
    if(!pick){ return; }
    var p = pick.trim().toLowerCase();
    var req = open.filter(function(r){ return String(r.jobId || "").toLowerCase() === p; })[0] ||
              open.filter(function(r){ return (r.title + " – " + r.loc).toLowerCase().indexOf(p) !== -1 || (r.title || "").toLowerCase().indexOf(p) !== -1; })[0];
    if(!req){ toast("No open requisition matches “" + pick + "”."); return; }
    var tag = req.title + " – " + req.loc;
    var toRec = tbReqRecruiter(tag);
    if(!toRec){
      var ask = window.prompt("No recruiter is working " + tag + " yet. Send this recommendation to which recruiter?\n\n" + OWNERS.join(" · "), "");
      if(!ask){ return; }
      toRec = OWNERS.filter(function(o){ return o.toLowerCase() === ask.trim().toLowerCase(); })[0];
      if(!toRec){ toast("No recruiter named “" + ask + "”."); return; }
    }
    var why = window.prompt("Why is " + fullName(c) + " right for " + tag + "? (goes to " + toRec + ")", "") || "";
    var res = await sb.from("activities").insert({ org: ORG, candidate_id: c.id, type: "Note", date: todayISO(),
      notes: "[Recommendation] to:" + toRec + " req:" + tag + " status:Recommended by:" + meOwnerName() + (why ? " — " + why : ""), owner: meOwnerName() });
    if(res.error){ toast("Could not send: " + res.error.message.slice(0, 60)); return; }
    await loadData();
    toast("Recommended to " + toRec + " — it\u2019s in their queue now."); refresh();
  };
  window.tbRecsForMe = function(){
    var me = meOwnerName().toLowerCase();
    var out = [];
    (state.candidates || []).forEach(function(c){
      var r = tbRecPendingFor(c.id);
      if(r && r.to.toLowerCase() === me){ out.push({ c: c, rec: r }); }
    });
    return out;
  };
  window.tbRecRespond = async function(item, accept){
    var r = item.rec, c = item.c;
    var status = accept ? "Accepted" : "Declined";
    var res = await sb.from("activities").insert({ org: ORG, candidate_id: c.id, type: "Note", date: todayISO(),
      notes: "[Recommendation] to:" + r.to + " req:" + r.req + " status:" + status + " by:" + meOwnerName(), owner: meOwnerName() });
    if(res.error){ toast("Could not update: " + res.error.message.slice(0, 60)); return; }
    if(accept && (!c.owner || c.owner === "Unassigned")){ await sb.from("candidates").update({ owner: meOwnerName() }).eq("id", c.id); }
    await loadData();
    toast(accept ? (fullName(c) + " accepted — on your desk, ready to work " + r.req) : "Declined — " + r.by + " can see the call you made.");
    refresh();
  };

  /* ---------- 3c. TALENTFIT WARM ENGINE (launch perf fix) ----------
     Cold scoring of the full desk is seconds of synchronous work, and the
     cache clears on every data reload. Nothing user-facing may ever pay that
     cost on the main thread: scoring warms in idle chunks, heavy views show
     a brief skeleton on a cold cache, and the cache re-warms in the
     background after every reload. */
  window.__TB_SCORES_WARM = false;
  var _warmRunning = false, _warmGen = 0;
  try{
    var _csc = BOARD.clearScoreCache;
    BOARD.clearScoreCache = function(){ window.__TB_SCORES_WARM = false; _warmGen++; _csc(); };
  }catch(eW){}
  window.tbWarmScores = function(cb){
    if(window.__TB_SCORES_WARM){ if(cb){ cb(); } return; }
    var gen = _warmGen;
    var pool = (state.candidates || []).filter(function(c){ return c.status !== "Archived"; });
    if(window.TB_ENTERPRISE_LIBRARY_V1 && window.XORG && window.XORG.loaded && window.XORG.recruitable){ pool = pool.concat(window.XORG.recruitable()); }
    var i = 0;
    if(_warmRunning){ /* piggyback: poll for completion */
      var wait = setInterval(function(){ if(window.__TB_SCORES_WARM || gen !== _warmGen){ clearInterval(wait); if(cb && window.__TB_SCORES_WARM){ cb(); } } }, 120);
      return;
    }
    _warmRunning = true;
    (function chunk(){
      if(gen !== _warmGen){ _warmRunning = false; return; } /* cache cleared mid-warm: abort, a re-warm will follow */
      var end = Math.min(i + 15, pool.length);
      try{ for(; i < end; i++){ BOARD.scoreCandidate(pool[i]); } }catch(eS){}
      if(i < pool.length){ setTimeout(chunk, 0); }
      else { _warmRunning = false; window.__TB_SCORES_WARM = true; if(cb){ cb(); } }
    })();
  };
  function tbSkeleton(host, label){
    host.innerHTML = "";
    var sk = el("div"); sk.style.cssText = "max-width:1020px";

      var row = el("div"); row.style.cssText = "height:64px;border-radius:12px;background:linear-gradient(90deg,var(--panel) 25%,var(--panel2) 50%,var(--panel) 75%);background-size:200% 100%;animation:tbSkel 1.1s infinite linear;margin-bottom:12px;border:1px solid var(--line)";
      sk.appendChild(row);
    }

      var st = document.createElement("style"); st.id = "tbSkelCss";
      st.textContent = "@keyframes tbSkel{0%{background-position:200% 0}100%{background-position:-200% 0}}";
      document.head.appendChild(st);

  ["renderBoard", "renderAutoSlate"].forEach(function(fn){
    var _orig = window[fn];

    window[fn] = function(host){
      if(window.__TB_SCORES_WARM){ _orig(host); return; }

  function tbHMFbParse(a){

    return m ? { from: m[1], req: m[2], decision: m[3], status: m[4], by: m[5] || "", reason: m[6] || "", date: a.date || "", candidateId: a.candidateId } : null;

  /* ---------- 3e. RECRUITING INTELLIGENCE (the database never sleeps) ----------
     Powered by the local TalentFit engine — free, instant, always current.
     Rediscovery: candidates who existed BEFORE a role opened and now match it.
     Silver medalists: candidates who went deep on one req and match another. */
  var SILVER = { "HM Rejected":1, "Offer Declined":1, "TA Rejected":1, "Withdrawn":1 };
  window.tbIntelligenceReport = function(){
    var out = { rediscovered: [], byRecruiter: {}, silver: [], multi: [], newReqs: 0 };
    try{
      if(!window.__TB_SCORES_WARM){ return out; } /* never compute cold on a render path */
      var cutoff = Date.now() - 14 * 86400000;
      var canon = window.TB_METRICS ? TB_METRICS.canonicalReqEntries(REQS).map(function(e){ return e.req; }) : REQS;
      var openReqs = canon.filter(function(r){ return window.TB_METRICS ? TB_METRICS.isOpenReq(r) : !r.bench; });
      var newReqs = openReqs.filter(function(r){ var d = Date.parse(r.createdAt || ""); return d && d >= cutoff; });
      out.newReqs = newReqs.length;
      var newIds = {}; newReqs.forEach(function(r){ newIds[r.id] = r; });
      (state.candidates || []).forEach(function(c){
        if(c.status === "Archived" || c.status === "Offer Accepted - Hired"){ return; }
        var sc = BOARD.scoreCandidate(c); if(!sc || !sc.results){ return; }
        var strongOpen = sc.results.filter(function(x){ return x.score >= 72 && x.req && openReqs.some(function(r){ return r.id === x.req.id; }); });
        if(strongOpen.length >= 2){ out.multi.push({ c: c, n: strongOpen.length }); }
        if(SILVER[c.status] && strongOpen.length){ out.silver.push({ c: c, top: strongOpen[0] }); }
        /* rediscovery: candidate pre-dates a newly opened role and strongly matches it */
        var cd = Date.parse(c.dateReceived || "");
        var redisc = strongOpen.filter(function(x){ var rd = Date.parse((newIds[x.req.id] || {}).createdAt || ""); return rd && cd && cd < rd; });
        if(redisc.length){
          out.rediscovered.push({ c: c, top: redisc[0] });
          var o = c.owner && c.owner !== "Unassigned" ? c.owner : "Unassigned";
          out.byRecruiter[o] = (out.byRecruiter[o] || 0) + 1;
        }
      });
    }catch(eIR){}
    return out;
  };

        var res = await sb.from("activities").insert({ org: ORG, candidate_id: c.id, type: "Note", date: todayISO(), notes: "[HM Note] " + hmName() + ": " + w, owner: hmName() });
        if(res.error){ toast("Could not save note."); return; }

      });
      var op = el("button","btn ghost sm","Open Profile"); op.title = "Full record: resume, activity history, notes";
      op.addEventListener("click", function(){ openDetail(c); });
      act.appendChild(ri); act.appendChild(ps); act.appendChild(nt); act.appendChild(op);

    }
    function candTable(rows, empty){

    if(v === "tb_hm_review"){

  /* Administrator — Platform Status */
  window.renderWsAdmin = function(host){
    document.getElementById("viewTitle").textContent = "";
    document.getElementById("viewMeta").textContent = "";
    var wrap = el("div"); wrap.style.cssText = "max-width:1060px";

    var h1 = el("div", null, "Platform Status"); h1.style.cssText = "font-size:26px;font-weight:800;letter-spacing:-.3px;margin-bottom:2px";

    var strip = el("div"); strip.style.cssText = "display:flex;gap:14px;flex-wrap:wrap;margin:16px 0";
    [["Candidates", (state.candidates||[]).length], ["Requisitions", REQS.length], ["Interview Requests", (state.interviewRequests||[]).length], ["Hiring Managers", (state.managers||MANAGERS||[]).length], ["Activities", (state.activities||[]).length]].forEach(function(m){

      var n = el("div", null, String(m[1])); n.style.cssText = "font-size:24px;font-weight:800";
      b.appendChild(n); b.appendChild(el("div","hint", m[0])); strip.appendChild(b);
    });
    wrap.appendChild(strip);
    /* feature flags */
    var ff = wsCard("margin-bottom:14px"); ff.appendChild(wsHead("Feature Flags"));
    [["TB_ENTERPRISE_LIBRARY_V1", window.TB_ENTERPRISE_LIBRARY_V1 === true], ["TB_ACTIVE_REQUISITIONS_V1", window.TB_ACTIVE_REQUISITIONS_V1 === true]].forEach(function(f){

      var dot = el("span"); dot.style.cssText = "width:9px;height:9px;border-radius:50%;background:" + (f[1] ? "var(--green)" : "var(--gray)");
      li.appendChild(dot); li.appendChild(el("span", null, f[0] + " — " + (f[1] ? "ON" : "OFF") + " (set in the deployed file; rollback = flip the flag)"));
      ff.appendChild(li);
    });
    wrap.appendChild(ff);
    /* ── ACCESS ANY WORKSTATION — become any user for support, training, QA.
       View-only by default; Edit Mode requires confirmation; every session is

    var va = wsCard("margin-bottom:14px"); va.appendChild(wsHead("Access Any Workstation"));
    va.appendChild(el("div","hint","Open TalentBase exactly as that person sees it. View-only until you enable Edit Mode. Every session is audit-logged."));
    var rl = el("div", null, "Recruiters"); rl.style.cssText = "font-size:11px;font-weight:700;color:var(--muted);margin:12px 0 6px";
    va.appendChild(rl);
    var rrow = el("div"); rrow.style.cssText = "display:flex;gap:8px;flex-wrap:wrap";
    (typeof OWNERS !== "undefined" ? OWNERS : []).filter(function(o){ return o && o !== "Unassigned"; }).forEach(function(o){
      var b = el("button","btn sm ghost", o); b.title = "Open " + o + "\u2019s Recruiter Workstation (view-only)";
      b.addEventListener("click", function(){ tbImpersonate({ name: o, ws: "recruiter" }); });
      rrow.appendChild(b);
    });
    va.appendChild(rrow);
    var hl = el("div", null, "Hiring Managers"); hl.style.cssText = "font-size:11px;font-weight:700;color:var(--muted);margin:12px 0 6px";
    va.appendChild(hl);
    var hrow = el("div"); hrow.style.cssText = "display:flex;gap:8px;align-items:center;flex-wrap:wrap";
    var hsel = el("select","fil"); hsel.style.maxWidth = "260px";
    (state.managers && state.managers.length ? state.managers : (typeof MANAGERS !== "undefined" ? MANAGERS : [])).forEach(function(m2){
      var op = el("option", null, m2.name); op.value = m2.name; hsel.appendChild(op);
    });
    var hgo = el("button","btn sm ghost","Open Workstation");
    hgo.addEventListener("click", function(){ if(hsel.value){ window.TB_HM_PREVIEW = hsel.value; tbImpersonate({ name: hsel.value, ws: "hm" }); } });
    hrow.appendChild(hsel); hrow.appendChild(hgo); va.appendChild(hrow);
    var ol = el("div", null, "Other Roles"); ol.style.cssText = "font-size:11px;font-weight:700;color:var(--muted);margin:12px 0 6px";
    va.appendChild(ol);
    var orow = el("div"); orow.style.cssText = "display:flex;gap:8px;flex-wrap:wrap";
    [["Recruiting Manager","manager"],["Executive","executive"]].forEach(function(w){
      var b2 = el("button","btn sm ghost", w[0]); b2.title = "Open the " + w[0] + " Workstation";
      b2.addEventListener("click", function(){ tbImpersonate({ name: w[0], ws: w[1] }); });
      orow.appendChild(b2);
    });
    va.appendChild(orow);
    /* audit trail — nothing hidden */
    var audits = (state.notes || []).filter(function(n){ return (n.context || "") === "admin_audit"; }).slice(0, 6);
    if(audits.length){
      var al = el("div", null, "Recent Access Log"); al.style.cssText = "font-size:11px;font-weight:700;color:var(--muted);margin:14px 0 6px";
      va.appendChild(al);
      audits.forEach(function(a){
        var li = el("div", null, "\u00b7 " + (a.createdAt ? a.createdAt.slice(0, 16).replace("T", " ") : "") + " \u2014 " + String(a.body || "").replace("[Admin Access] ", ""));
        li.style.cssText = "font-size:12px;color:var(--muted);padding:2px 0";
        va.appendChild(li);
      });
    }
    wrap.appendChild(va);
    /* candidate intelligence */
    var intel = tbIntelligence();
    var ic = wsCard("margin-bottom:14px"); ic.appendChild(wsHead("Candidate Intelligence"));
    ic.appendChild(el("div", null, intel.uncategorized.length + " candidates without a firm discipline · " + intel.inferred + " classified live by the intelligence rules (shown in italics on cards — zero database writes)")).style.fontSize = "13.5px";
    if(intel.inferred > 0){
      var ap = el("button","btn sm","Apply " + intel.inferred + " classifications to the database"); ap.style.marginTop = "10px";
      ap.title = "Writes the inferred discipline onto records that have none. Explicit, logged, reversible by editing the record.";
      ap.addEventListener("click", async function(){
        if(!window.confirm("Write inferred disciplines onto " + intel.inferred + " candidate records that currently have none?\n\nOnly blank/Other disciplines are touched. Every other field is untouched.")){ return; }
        var n = 0;
        for(var i = 0; i < state.candidates.length; i++){
          var c = state.candidates[i];
          if(c._inferredDisc && (!c.discipline || c.discipline === "Other" || c.discipline === "")){
            var r = await sb.from("candidates").update({ discipline: c._inferredDisc }).eq("id", c.id);
            if(!r.error){ n++; }
          }
        }
        toast(n + " records classified."); await loadData(); refresh();
      });
      ic.appendChild(ap);
    }
    wrap.appendChild(ic);
    /* duplicate watch — one version of the truth, checked continuously */
    var dupes = [];
    (function(){
      var byKey = {};
      (state.candidates || []).forEach(function(c){
        var e = (c.email || "").trim().toLowerCase();
        var n = ((c.firstName || "") + " " + (c.lastName || "")).trim().toLowerCase();
        if(e){ (byKey["e:" + e] = byKey["e:" + e] || []).push(fullName(c)); }
        if(n){ (byKey["n:" + n] = byKey["n:" + n] || []).push(fullName(c)); }
      });
      Object.keys(byKey).forEach(function(k){ if(byKey[k].length > 1 && (k.charAt(0) === "e" || !Object.keys(byKey).some(function(k2){ return k2.charAt(0) === "e" && byKey[k2].length > 1 && byKey[k2][0] === byKey[k][0]; }))){ dupes.push("Candidate: " + byKey[k][0] + " ×" + byKey[k].length + (k.charAt(0) === "e" ? " (same email)" : " (same name)")); } });
      /* managers: same last name where one first name is a prefix of the other (Sam / Samridh) */
      var ms = state.managers || [];
      for(var i = 0; i < ms.length; i++){ for(var j = i + 1; j < ms.length; j++){
        var a = (ms[i].name || "").trim().toLowerCase().split(/\s+/), b = (ms[j].name || "").trim().toLowerCase().split(/\s+/);
        if(a.length > 1 && b.length > 1 && a[a.length-1] === b[b.length-1] && (a[0].indexOf(b[0]) === 0 || b[0].indexOf(a[0]) === 0)){
          dupes.push("Hiring manager: " + ms[i].name + " / " + ms[j].name + " — likely the same person");
        }
      } }
    })();
    var dc = wsCard("margin-bottom:14px"); dc.appendChild(wsHead("Duplicate Watch"));
    if(!dupes.length){
      var okRow = el("div"); okRow.style.cssText = "display:flex;gap:9px;align-items:center;font-size:13.5px";
      var okDot = el("span"); okDot.style.cssText = "width:9px;height:9px;border-radius:50%;background:var(--green)";
      okRow.appendChild(okDot); okRow.appendChild(el("span", null, "One version of the truth — no duplicate candidates or hiring managers detected."));
      dc.appendChild(okRow);
    } else {
      dupes.slice(0, 8).forEach(function(d){ var li = el("div", null, "· " + d); li.style.cssText = "font-size:13.5px;padding:4px 0;color:var(--red);font-weight:600"; dc.appendChild(li); });
      dc.appendChild(el("div","hint","Open each record, keep the complete one, and delete the empty one. Nobody should ever ask which record is real."));

    host.appendChild(wrap);
  };

  /* ---------- 5. ROUTING: nav filter application + landing + chrome ---------- */
  window.tbApplyWorkstation = function(rerender){
    window.TB_WS = tbResolveWorkstation();
    var ws = window.TB_WS;
    /* executive + hm are read-only experiences regardless of DB role */
    if(typeof window.TB_ORIG_VO === "undefined"){ window.TB_ORIG_VO = VIEW_ONLY; }
    VIEW_ONLY = (ws === "executive" || ws === "hm") ? true : window.TB_ORIG_VO;
    if(window.TB_IMPERSONATE && !window.TB_IMPERSONATE.edit){ VIEW_ONLY = true; } /* impersonation is view-only until Edit Mode is confirmed */
    if(ws === "executive"){ try{ sectionCollapsed["Analytics"] = false; }catch(eSC){} }
    /* impersonation banner — across the top, impossible to miss, one-click return */
    try{
      var iban = document.getElementById("tbImpBanner");
      if(window.TB_IMPERSONATE){
        var imp = window.TB_IMPERSONATE;
        if(!iban){
          iban = el("div"); iban.id = "tbImpBanner";
          iban.style.cssText = "background:#b45309;color:#fff;padding:9px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:13px;font-weight:600";
          document.body.insertBefore(iban, document.body.firstChild);
        }
        iban.innerHTML = "";
        var lab = el("span", null, "\ud83d\udfe7 ADMIN MODE \u2014 viewing TalentBase as " + imp.name + " \u00b7 " + (WS_LABEL[imp.ws] || imp.ws) + " \u00b7 started " + imp.started + (imp.edit ? " \u00b7 EDIT MODE ON (all actions logged)" : " \u00b7 view-only"));
        iban.appendChild(lab);
        var sp = el("span"); sp.style.flex = "1"; iban.appendChild(sp);
        /* one-click switch to any other user — no round-trip through the admin panel */
        var swSel = document.createElement("select");
        swSel.style.cssText = "background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.45);color:#fff;border-radius:7px;padding:4px 8px;font:inherit;font-size:12px;font-weight:700;cursor:pointer";
        var ph = document.createElement("option"); ph.value = ""; ph.textContent = "Switch user\u2026"; ph.style.color = "#333"; swSel.appendChild(ph);
        function swGroup(label, items){
          var og = document.createElement("optgroup"); og.label = label; og.style.color = "#333";
          items.forEach(function(it){ var op = document.createElement("option"); op.value = it.ws + "|" + it.name; op.textContent = it.name; op.style.color = "#333"; og.appendChild(op); });
          swSel.appendChild(og);
        }
        swGroup("Recruiters", (typeof OWNERS !== "undefined" ? OWNERS : []).filter(function(o){ return o && o !== "Unassigned" && o !== imp.name; }).map(function(o){ return { name: o, ws: "recruiter" }; }));
        swGroup("Hiring Managers", ((state.managers && state.managers.length ? state.managers : (typeof MANAGERS !== "undefined" ? MANAGERS : [])) || []).filter(function(m2){ return m2.name !== imp.name; }).map(function(m2){ return { name: m2.name, ws: "hm" }; }));
        swGroup("Roles", [{ name: "Recruiting Manager", ws: "manager" }, { name: "Executive", ws: "executive" }].filter(function(r2){ return r2.name !== imp.name; }));
        swSel.addEventListener("change", function(){
          if(!swSel.value){ return; }
          var parts = swSel.value.split("|");
          if(parts[0] === "hm"){ window.TB_HM_PREVIEW = parts[1]; }
          tbImpersonateSwitch({ name: parts[1], ws: parts[0] });
        });
        iban.appendChild(swSel);
        if(!imp.edit){
          var eb = el("button", null, "Enable Edit Mode"); eb.type = "button";
          eb.style.cssText = "background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.45);color:#fff;border-radius:7px;padding:5px 12px;font:inherit;font-size:12px;font-weight:700;cursor:pointer";
          eb.addEventListener("click", function(){ tbImpersonateEdit(); });
          iban.appendChild(eb);
        }
        var rb = el("button", null, "Return to Administrator"); rb.type = "button";
        rb.style.cssText = "background:#fff;border:0;color:#b45309;border-radius:7px;padding:5px 14px;font:inherit;font-size:12px;font-weight:800;cursor:pointer";
        rb.addEventListener("click", function(){ tbImpersonateEnd(); });
        iban.appendChild(rb);
        iban.title = "Personal notes, checklists, and goals live on each recruiter\u2019s own device \u2014 they are not visible from here.";
      } else if(iban){ iban.remove(); }
    }catch(eIB){}
    /* topbar: recruiters recruit; admins administer */
    try{
      var adminBtns = ["importBtn","exportBtn","dayforceBtn","bulkBtn"], recruitBtns = ["fromResumeBtn","addBtn"];
      adminBtns.forEach(function(id){ var b = document.getElementById(id); if(b){ b.style.display = (ws === "admin") ? "" : "none"; } });

      var fb = document.querySelector(".side .filterbox"); var fh = fb ? fb.previousElementSibling : null;
      var showF = (ws !== "hm" && ws !== "executive");
      if(fb){ fb.style.display = showF ? "" : "none"; } if(fh && /Candidate Filters/.test(fh.textContent)){ fh.style.display = showF ? "" : "none"; }
    }catch(e){}
    if(rerender){ ui.view = WS_HOME[ws] || "guide"; refresh(); }
  };

  var wsBoot = setInterval(function(){
    if(typeof state === "undefined" || !state.candidates || !state.candidates.length || typeof CURRENT_USER === "undefined" || !CURRENT_USER){ return; }

})();
