<html lang="en">
<head>

<title>Elbit Systems Resume Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
  :root{
    --bg:#f4f5f9; --panel:#ffffff; --panel2:#f0f1f6; --line:#e2e5ef;
    --ink:#111318; --muted:#52576b; --gold:#3b54e8; --gold-dim:#e8ebfd;
    --blue:#3b54e8; --cyan:#0891b2; --teal:#0e9e7a; --yellow:#b45309;
    --orange:#c2410c; --purple:#7c3aed; --gray:#8b90a8; --red:#dc2626; --green:#15803d;
    --gold-dim:#e8ebfd;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5}
  h1,h2,h3{font-family:inherit;font-weight:700;margin:0}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .wrap{max-width:1380px;margin:0 auto;padding:0 20px}
  header{border-bottom:1px solid var(--line);background:#ffffff;position:sticky;top:0;z-index:100}
  .topbar{display:flex;align-items:center;gap:10px;padding:13px 0;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{font-size:20px;letter-spacing:.2px;color:var(--ink)}
  .brand .dot{color:var(--gold)}
  .brand .sub{color:var(--gold);font-size:11px;letter-spacing:1.5px;text-transform:lowercase;font-weight:700}
  .vobadge{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .grow{flex:1}
  .userbox{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
  .search{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;min-width:200px;flex-shrink:1}
  .search input{background:transparent;border:0;color:var(--ink);width:100%;outline:none}
  .search input::placeholder{color:var(--gray)}
  .search svg{flex:0 0 auto;opacity:.5}
  .btn{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;transition:.15s}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  .btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
  .btn.gold:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent}
  .btn.ghost:hover{background:var(--panel2)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger:hover{border-color:var(--red);color:var(--red)}
  .btn.block{width:100%;padding:11px;font-size:14px}
  .layout{display:grid;grid-template-columns:224px 1fr;gap:20px;padding:18px 0 60px}
  .side{position:sticky;top:62px;align-self:start;max-height:calc(100vh - 80px);overflow-y:auto}
  .side h3{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--gray);margin:18px 0 6px;font-family:inherit;font-weight:700}
  .side h3:first-child{margin-top:0}
  .vtab{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;background:transparent;border:0;color:var(--muted);padding:7px 10px;border-radius:7px;font-size:13px;font-weight:500}
  .vtab:hover{background:var(--panel2);color:var(--ink)}
  .vtab.active{background:var(--gold-dim);color:var(--gold);font-weight:700;box-shadow:inset 3px 0 0 var(--gold)}
  .vtab .count{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:0 7px;font-size:11px;color:var(--gray)}
  .vtab.active .count{color:var(--gold);border-color:var(--gold);background:#fff}
  .side h3.sech{margin:16px 0 6px}
  .side h3.toggle{cursor:pointer;user-select:none}
  .side h3.toggle:hover{color:var(--ink)}
  .vtab.fu-amber:not(.active){color:var(--yellow);box-shadow:inset 3px 0 0 var(--yellow)}
  .vtab.fu-red:not(.active){color:var(--red);box-shadow:inset 3px 0 0 var(--red)}
  .vtab.fu-amber .count{color:var(--yellow);border-color:var(--yellow)}
  .vtab.fu-red .count{color:var(--red);border-color:var(--red)}
  .filterbox{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:6px}
  .filterbox label{display:block;font-size:11px;color:var(--gray);margin:8px 0 4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .filterbox label:first-child{margin-top:0}
  select.fil{width:100%;background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px 8px}
  .main{min-width:0}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .toolbar .title{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.2px}
  .toolbar .meta{color:var(--muted);font-size:12px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  thead th{text-align:left;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--gray);padding:11px 13px;border-bottom:1px solid var(--line);font-weight:700;background:var(--panel2);vertical-align:bottom;white-space:nowrap}
  tbody td{padding:11px 13px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  tbody tr:last-child td{border-bottom:0}
  tbody tr.click:hover td{background:var(--panel2);cursor:pointer}
  .pill{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;border:1px solid transparent;display:inline-block}
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
  .gate .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:40px;width:380px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
  .gate h1{font-size:24px;color:var(--ink);margin-bottom:4px}
  .gate .dot{color:var(--gold)}
  .gate .sub{color:var(--muted);font-size:13px;margin-bottom:28px;display:block}
  .gate label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin:14px 0 5px;text-transform:uppercase;letter-spacing:.5px}
  .gate input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--ink);font-size:14px;outline:none}
  .gate input:focus{border-color:var(--gold)}
  .msg{font-size:13px;margin-top:10px;min-height:18px}
  .msg.err{color:var(--red)}
  .msg.ok{color:var(--green)}
  #app{display:none}
  .scrim{position:fixed;inset:0;background:rgba(10,12,24,.5);display:none;align-items:center;justify-content:center;z-index:500;padding:16px}
  .scrim.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:860px;max-height:calc(100vh - 32px);overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.14)}
  .modal.wide{max-width:680px}
  .mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:10}
  .mbody{padding:20px 22px}
  .mfoot{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:16px 22px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--panel)}
  .fld{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
  .fld label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .fld input,.fld select,.fld textarea{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--ink);outline:none}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold)}
  .fld textarea{min-height:80px;resize:vertical}
  .fld.full{grid-column:1/-1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
  .x{background:transparent;border:0;color:var(--gray);font-size:22px;line-height:1;cursor:pointer;padding:0 4px;border-radius:6px}
  .x:hover{color:var(--ink);background:var(--panel2)}
  .click{cursor:pointer;transition:background .12s}
  .click:hover{background:var(--panel2)}
  .top{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;color:var(--muted)}
  .nm{font-weight:700;color:var(--ink)}
  .sub2{color:var(--muted);font-size:13px}
  .right{display:flex;gap:10px;align-items:center}
  .big{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px}
  .hint{color:var(--gray);font-size:12px;margin:10px 0 0;line-height:1.5}
  .act{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;background:var(--panel2)}
  .drop{border:2px dashed var(--line);border-radius:10px;padding:26px;text-align:center;color:var(--muted);background:var(--panel2);transition:.15s}
  .drop:hover{border-color:var(--gold);color:var(--gold)}
  .reqgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px}
  .reqck{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--ink)}
  .hot{border-color:var(--gold)!important;color:var(--gold)!important;background:var(--gold-dim)!important}
  .due{font-size:12px;font-weight:700;color:var(--yellow)}
  .grouphdr td{background:var(--panel2);color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:11px;border-top:2px solid var(--line);padding:10px 13px}
  .richtext{white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.6}
  .richul{margin:4px 0;padding-left:20px}
  .nt{margin-top:4px}
  .roval{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:8px 10px;color:var(--ink);min-height:18px;font-size:13px}
  .wide{max-width:680px}
  .sub{color:var(--muted);font-size:12px}
  .prognotes{margin-bottom:16px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2)}
  .toast.show{opacity:1}
  .empty{text-align:center;padding:40px;color:var(--gray);font-size:14px}
  .sect{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
</style>
</head>

</div>
</div>

<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>

async function fetchProfileWithRetry(userId, attempts){
  attempts = attempts || 3;
  for(var i = 0; i < attempts; i++){
    var prof = await sb.from("profiles").select("role,orgs,email").eq("id", userId).single();
    if(!prof.error){ return prof; }
    var msg = (prof.error && prof.error.message) || "";
    var code = (prof.error && prof.error.code) || "";
    /* Transient: OOM or network blip -- retry after brief delay */
    var isTransient = (msg.indexOf("Failed to fetch") !== -1 || msg.indexOf("fetch") !== -1 || msg.indexOf("network") !== -1 || msg.indexOf("OOM") !== -1 || code === "PGRST301" || code === "503" || code === "504");
    console.error("[TSS] profiles fetch attempt " + (i+1) + " failed:", { userId: userId, code: code, message: msg, hint: (prof.error && prof.error.hint) || "", details: (prof.error && prof.error.details) || "", supabaseError: prof.error });
    if(!isTransient || i === attempts - 1){ return prof; }
    await new Promise(function(r){ setTimeout(r, 1200 * (i + 1)); });
  }
  return { error: { message: "Profile fetch failed after " + attempts + " attempts." }, data: null };
}
async function onAuthed(user){
  gateMsg("Loading your profile...", "");
  var prof = await fetchProfileWithRetry(user.id);
  if(prof.error || !prof.data){
    var errMsg = (prof.error && prof.error.message) || "Unknown error";
    var errCode = (prof.error && prof.error.code) || "";
    console.error("[TSS] onAuthed: profiles load failed", { userId: user.id, code: errCode, message: errMsg, error: prof.error });
    if(errMsg.indexOf("Failed to fetch") !== -1 || errMsg.indexOf("fetch") !== -1 || errMsg.indexOf("network") !== -1){
      gateMsg("Connection error loading your profile. The server may be temporarily overloaded. Please wait a moment and try signing in again. (detail: " + errMsg + ")", "err");
    } else if(errCode === "PGRST116" || errMsg.indexOf("0 rows") !== -1 || errMsg.indexOf("multiple") !== -1){
      gateMsg("Your account has no access profile yet. Ask the admin to set your role.", "err");
    } else {
      gateMsg("Could not load your access profile. Error: " + errMsg + " (code: " + errCode + ")", "err");
    }
    return;
  }
  var orgs = prof.data.orgs || [];
  if(orgs.indexOf(ORG) === -1){ gateMsg("Your account does not have access to this program.", "err"); return; }
  VIEW_ONLY = prof.data.role !== "editor";
  document.getElementById("whoami").textContent = (function(e){ var n = (e||"").split("@")[0].split(/[._-]+/).filter(Boolean).map(function(w){ return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); }).join(" "); return (n || e) + " (" + (VIEW_ONLY ? "viewer" : "editor") + ")"; })(prof.data.email || user.email);
  CURRENT_USER = { id:user.id, email:(prof.data.email || user.email) };
  gateMsg("", "");
  document.getElementById("gate").style.display = "none";
  document.getElementById("app").style.display = "block";
  applyViewOnly();
  await loadData();
  wireRealtime();
  refresh();
}

/* Boolean search: supports AND, OR, NOT (and -term), "quoted phrases", parentheses.

function tokenizeQuery(q){
  var tokens = []; var i = 0; var s = q;

    var ch = s[i];

    if(ch === "(" || ch === ")"){ tokens.push({t:ch}); i++; continue; }

    var up = word.toUpperCase();
    if(up === "AND" || up === "OR" || up === "NOT"){ tokens.push({t:up}); }
    else if(word[0] === "-" && word.length > 1){ tokens.push({t:"NOT"}); tokens.push({t:"term", v:word.slice(1).toLowerCase()}); }
    else{ tokens.push({t:"term", v:word.toLowerCase()}); }
  }
  return tokens;
}
function parseQuery(tokens){
  var pos = {i:0};
  function peek(){ return tokens[pos.i]; }
  function next(){ return tokens[pos.i++]; }

    var left = parseAnd();
    while(peek() && peek().t === "OR"){ next(); var right = parseAnd(); left = (function(a,b){ return function(h){ return a(h) || b(h); }; })(left, right); }
    return left;
  }
  function parseAnd(){
    var left = parseUnary();
    while(peek() && peek().t !== "OR" && peek().t !== ")"){
      if(peek().t === "AND"){ next(); }
      var right = parseUnary(); if(!right){ break; }
      left = (function(a,b){ return function(h){ return a(h) && b(h); }; })(left, right);
    }
    return left;
  }
  function parseUnary(){
    var tk = peek(); if(!tk){ return null; }
    if(tk.t === "NOT"){ next(); var inner = parseUnary(); return function(h){ return !inner(h); }; }
    if(tk.t === "("){ next(); var e = parseOr(); if(peek() && peek().t === ")"){ next(); } return e; }
    if(tk.t === "term"){ next(); var term = tk.v; if(!term){ return function(){ return true; }; } return function(h){ return h.indexOf(term) !== -1; }; }
    next(); return null;
  }

  return fn || function(){ return true; };
}

function fuState(){
  var any = false, overdue = false;
  state.candidates.forEach(function(c){ var fr = followUp(c); if(fr.label !== ""){ any = true; if(fr.label === "Overdue"){ overdue = true; } } });
  return overdue ? "red" : (any ? "amber" : "");
}
function renderTabs(){
  var box = document.getElementById("tabs"); box.innerHTML = "";
  var actSec = (activeView()||{}).section || "";
  var lastSection = null;
  VIEWS.forEach(function(v){
    var sec = v.section || "";
    if(sec && sec !== lastSection){
      lastSection = sec;
      var coll = !!v.collapsible;
      var isCollapsed = coll && sectionCollapsed[sec] && actSec !== sec;
      var h = el("h3","sech" + (coll ? " toggle" : ""), (coll ? (isCollapsed ? "\u25B8 " : "\u25BE ") : "") + sec);
      if(coll){ h.setAttribute("data-section-toggle", sec); }
      box.appendChild(h);
    }
    if(v.collapsible && sectionCollapsed[v.section] && actSec !== v.section){ return; }
    var count;
    if(v.special === "reqs"){ count = REQS.filter(function(r){ return !r.bench; }).length; }
    else if(v.special === "priolist"){ count = REQS.filter(function(r){ return !r.bench && r.rank != null; }).length; }
    else if(v.special === "forms"){ count = ""; }
    else if(v.special === "resumecheck"){ count = state.candidates.filter(function(c){ return c.status !== "Archived" && resumeStatus(c) !== "match"; }).length; }
    else if(v.special === "pipeline"){ count = state.candidates.filter(function(c){ return PIPE_STAGES.indexOf(c.status) !== -1; }).length; }
    else if(v.special === "dashboard"){ count = ""; }
    else if(v.special === "interviewrequests"){ count = (state.interviewRequests||[]).length; }
    else if(v.special === "calendar"){ count = (state.interviewRequests||[]).filter(function(c){ return !!c.interviewDate; }).length; }
    else if(v.special === "managers"){
      var seen = {}; REQS.filter(function(r){ return !r.bench; }).forEach(function(r){ var n = (r.hm||"").trim(); if(n){ seen[n] = 1; } }); count = Object.keys(seen).length;
    }
    else if(v.special === "guide"){ count = ""; }
    else if(v.special === "talentbench"){ count = (state.reqs || REQS || []).filter(function(r){ return r.bench === true; }).length; }
    else{ count = state.candidates.filter(function(c){ return v.fn(c); }).length; }
    var fu = (v.id === "followup") ? fuState() : "";
    var b = el("button","vtab" + (v.id===ui.view ? " active" : "") + (fu ? " fu-" + fu : ""));
    b.appendChild(el("span", null, v.name)); if(count !== "" && count !== null){ b.appendChild(el("span","count", String(count))); }
    b.setAttribute("data-view", v.id); box.appendChild(b);
  });
}

function renderFollowUpWorklist(host){
  // Read-only triage worklist over state.candidates. Reuses followUp(), rowFor(),
  // matchesSearch(), todayISO(). Ignores filter dropdowns by design; respects search.
  // Four buckets: Overdue, Due Today, Upcoming, No Follow-Up Scheduled. Archived excluded.
  var pool = (state.candidates || []).filter(function(c){ return c.status !== "Archived" && matchesSearch(c); });
  var overdue = [], dueToday = [], upcoming = [], noFu = [];
  pool.forEach(function(c){
    if(!c.nextFollowUp){ noFu.push(c); return; }
    var lab = followUp(c).label;
    if(lab === "Overdue"){ overdue.push(c); }
    else if(lab === "Due Today"){ dueToday.push(c); }
    else if(lab === "Upcoming"){ upcoming.push(c); }
    else { noFu.push(c); }
  });
  overdue.sort(function(a,b){ return (a.nextFollowUp||"").localeCompare(b.nextFollowUp||""); });
  upcoming.sort(function(a,b){ return (a.nextFollowUp||"").localeCompare(b.nextFollowUp||""); });
  noFu.sort(function(a,b){ return fullName(a).localeCompare(fullName(b)); });

  document.getElementById("viewMeta").textContent = "Follow-Up Worklist";

  var strip = el("div"); strip.style.cssText = "display:flex;gap:18px;flex-wrap:wrap;align-items:center;margin-bottom:10px;font-size:13px;font-weight:700";
  function chip(label, n, colorVar){ var w = el("span"); w.style.cssText = "display:inline-flex;align-items:center;gap:6px;color:" + cssVar(colorVar); var dot = el("span"); dot.style.cssText = "width:9px;height:9px;border-radius:2px;display:inline-block;background:" + cssVar(colorVar); w.appendChild(dot); w.appendChild(document.createTextNode(label + ": " + n)); return w; }
  strip.appendChild(chip("Overdue", overdue.length, "--red"));
  strip.appendChild(chip("Due Today", dueToday.length, "--yellow"));
  strip.appendChild(chip("Upcoming", upcoming.length, "--green"));
  host.appendChild(strip);

  var banner = el("div"); banner.style.cssText = "font-size:12px;color:var(--muted);margin-bottom:14px;font-style:italic";
  banner.textContent = "Showing all active candidates. Filters are intentionally disabled in this view.";
  host.appendChild(banner);

  if(overdue.length + dueToday.length + upcoming.length + noFu.length === 0){
    var em = el("div","empty"); em.appendChild(el("div","big","Nothing to follow up on"));
    em.appendChild(el("div", null, "No active candidates match your search."));
    host.appendChild(em); return;
  }

  var table = el("table"); var thead = el("thead"); var htr = el("tr");
  ["Candidate","Title / Company","Discipline","Status","Target Reqs","Follow Up","Owner","Action"].forEach(function(h){ htr.appendChild(el("th", null, h)); });
  thead.appendChild(htr); table.appendChild(thead);
  var tb = el("tbody");
  function fuRowFor(c){
    var tr = rowFor(c);
    var td = el("td");
    if(c.nextFollowUp){
      var clr = el("button","btn sm ghost","Clear");
      clr.title = "Clear follow-up date";
      clr.addEventListener("click", function(e){ e.stopPropagation(); clearFollowUp(c.id); });
      td.appendChild(clr);
    } else {
      td.appendChild(el("span","sub2","-"));
    }
    tr.appendChild(td);
    return tr;
  }
  function section(label, sub, colorVar){
    if(sub.length === 0){ return; }
    var gtr = el("tr","grouphdr"); var gtd = el("td", null, label + "  (" + sub.length + ")"); gtd.setAttribute("colspan","8"); gtd.style.color = cssVar(colorVar); gtr.appendChild(gtd); tb.appendChild(gtr);
    sub.forEach(function(c){ tb.appendChild(fuRowFor(c)); });
  }
  section("Overdue", overdue, "--red");
  section("Due Today", dueToday, "--yellow");
  section("Upcoming", upcoming, "--green");
  section("No Follow-Up Scheduled", noFu, "--muted");
  table.appendChild(tb); host.appendChild(table);
}

function fmtWhen(iso){
  if(!iso){ return ""; }
  var d = new Date(iso);
  if(isNaN(d.getTime())){ return ""; }
  return d.toLocaleString(undefined, { month:"short", day:"numeric", year:"numeric", hour:"numeric", minute:"2-digit" });

async function addProgramNote(context){
  if(!sb){ toast("Not connected."); return; }
  if(!CURRENT_USER){ toast("Sign in to post a note."); return; }
  var body = (NOTES_COMPOSE || "").trim();
  if(!body){ toast("Write a note first."); return; }
  var res = await sb.from("program_notes").insert({ org:ORG, author_id:CURRENT_USER.id, author_email:CURRENT_USER.email, body:body, context:(context||"priolist") });
  if(res.error){ toast(res.error.message || "Could not post note."); return; }
  NOTES_COMPOSE = "";

  if(ui.view === "priolist" || ui.view === "talentbench"){ refresh(); }
  toast("Note posted.");
}
async function saveProgramNote(id, text){
  if(!sb){ return; }
  var body = (text || "").trim();
  if(!body){ toast("Note cannot be empty."); return; }
  var res = await sb.from("program_notes").update({ body:body, updated_at:new Date().toISOString() }).eq("id", id);
  if(res.error){ toast(res.error.message || "Could not save note."); return; }
  NOTES_EDITING = null;
  await loadNotes();
  if(ui.view === "priolist" || ui.view === "talentbench"){ refresh(); }
  toast("Note updated.");
}
async function deleteProgramNote(id){
  if(!sb){ return; }
  var res = await sb.from("program_notes").delete().eq("id", id);
  if(res.error){ toast(res.error.message || "Could not delete note."); return; }
  if(NOTES_EDITING === id){ NOTES_EDITING = null; }
  await loadNotes();
  if(ui.view === "priolist" || ui.view === "talentbench"){ refresh(); }

}

function b64ToBlob(b64, mime){
  var bin = atob(b64); var len = bin.length; var bytes = new Uint8Array(len);
  for(var i=0;i<len;i++){ bytes[i] = bin.charCodeAt(i); }
  return new Blob([bytes], { type: mime });
}
function openDoc(item){
  var node = document.getElementById(item.el);
  if(!node || !node.textContent.trim()){ toast("Document not available"); return; }
  var url;
  try { url = URL.createObjectURL(b64ToBlob(node.textContent.trim(), item.mime)); }
  catch(e){ toast("Could not open document"); return; }
  if(item.kind === "docx"){
    var a = document.createElement("a"); a.href = url; a.download = item.file;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
  } else {
    var w = window.open(url, "_blank");
    if(!w){ toast("Allow pop-ups to view the document"); }
    setTimeout(function(){ URL.revokeObjectURL(url); }, 60000);
  }
}

  var ln = (c.lastName || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  var fst = (c.firstName || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  if(ln && ln.length >= 2 && fn.indexOf(ln) !== -1){ return "match"; }
  if(fst && fst.length >= 3 && fn.indexOf(fst) !== -1){ return "match"; }

/* ---------- bulk resume upload ---------- */
var BULK = { items: [] };
function bulkAlnum(s){ return (s || "").toLowerCase().replace(/[^a-z0-9]/g, ""); }
function bulkScore(c, fnAlnum){
  var ln = bulkAlnum(c.lastName); var fst = bulkAlnum(c.firstName);
  if(!ln && !fst){ return 0; }
  var hasLast = ln.length >= 2 && fnAlnum.indexOf(ln) !== -1;
  var hasFirst = fst.length >= 2 && fnAlnum.indexOf(fst) !== -1;
  if(hasLast && hasFirst){ return 3; }
  if(hasLast && ln.length >= 4){ return 2; }
  if(hasFirst && fst.length >= 4){ return 1; }
  return 0;
}
function bulkMissing(){ return state.candidates.filter(function(c){ return c.status !== "Archived" && resumeStatus(c) === "missing"; }); }
function bulkActiveSorted(){ return state.candidates.filter(function(c){ return c.status !== "Archived"; }).sort(function(a, b){ return fullName(a).localeCompare(fullName(b)); }); }
function computeBulkMatches(){
  var missing = bulkMissing();
  BULK.items.forEach(function(it){
    if(it.error){ it.matchId = ""; it.score = 0; it.ambiguous = false; return; }
    var fnAlnum = bulkAlnum(it.fileName);
    var best = null; var bestScore = 0; var tie = false;
    missing.forEach(function(c){
      var s = bulkScore(c, fnAlnum);
      if(s > bestScore){ bestScore = s; best = c; tie = false; }
      else if(s === bestScore && s > 0 && best && c.id !== best.id){ tie = true; }
    });
    it.score = bestScore; it.ambiguous = tie;
    it.matchId = (best && bestScore >= 2 && !tie) ? best.id : "";
  });
}

async function bulkAttachConfirm(){

function getBenchReqs(){
  return (state.reqs || REQS || []).filter(function(r){ return r.bench === true; });
}


var BENCH_STATUS = {
  waiting:   { label:"Waiting",   icon:"\u26AA", color:"--gray",   tip:"Recruiting intake has not started." },
  running:   { label:"Running",   icon:"\u{1F7E2}", color:"--green",  tip:"TalentBench is actively recruiting for this requisition." },
  paused:    { label:"Paused",    icon:"\u{1F7E1}", color:"--yellow", tip:"Recruiting has been intentionally paused." },
  stopped:   { label:"Stopped",   icon:"\u23F9",   color:"--red",    tip:"Recruiting has been intentionally stopped by the recruiter." },
  interview: { label:"Interview", icon:"\u{1F535}", color:"--blue",   tip:"Candidates are actively interviewing." },
  filled:    { label:"Filled",    icon:"\u{1F3C1}", color:"--gold",   tip:"Position has been successfully filled." }
};
function benchStatusPill(key){
  var cfg = BENCH_STATUS[key] || BENCH_STATUS.waiting;
  var p = pill(cfg.icon + " " + cfg.label, cfg.color);
  p.title = cfg.tip;
  p.style.cssText += ";font-size:11px;white-space:nowrap;cursor:pointer";
  return p;
}
async function setBenchStatus(reqId, key){
  if(!sb){ toast("Not connected."); return; }

  await loadData();
  refresh();
}

async function saveBenchReq(editId){
  var m = document.getElementById("modal");
  function bv(k){ var e = m.querySelector("[data-bfield='" + k + "']"); return e ? e.value.trim() : ""; }
  var title = bv("title");
  var jobId = bv("jobId");
  var loc   = bv("loc");
  var hm    = bv("hm");
  var partner = bv("partner");
  if(!title){ toast("Title required"); return; }
  var row = { org:ORG, title:title, job_id:jobId, loc:loc, hiring_manager:hm, partner:partner, bench:true, urgency:"Open" };
  closeModal();
  if(editId && editId !== "new"){
    await run(sb.from("reqs").update(row).eq("id", editId), "Sourcing req updated");
  } else {
    var res = await sb.from("reqs").insert(row);
    if(res && res.error){ toast(res.error.message || "Insert failed"); return; }
    await reloadSoft();
    toast("Sourcing req added");
  }
}

async function deleteBenchReq(id){
  if(!confirm("Delete this sourcing req?")){ return; }
  closeModal();
  await run(sb.from("reqs").delete().eq("id", id), "Sourcing req deleted");
}

/* ---------- duplicate detection ---------- */
function normEmail(e){ return (e||"").trim().toLowerCase(); }
function normName(f,l){ return ((f||"").trim().toLowerCase() + "|" + (l||"").trim().toLowerCase()); }
function findDuplicate(cand, ignoreId){
  // Returns the existing candidate that duplicates `cand`, or null.
  var em = normEmail(cand.email);
  var nm = normName(cand.firstName, cand.lastName);
  for(var i=0;i<state.candidates.length;i++){
    var x = state.candidates[i];
    if(ignoreId && x.id === ignoreId){ continue; }
    if(em && normEmail(x.email) === em){ return x; }
    if(!em && nm !== "|" && normName(x.firstName, x.lastName) === nm){ return x; }
  }
  return null;
}

/* ---------- detail ---------- */
function field(label, key, val, type, opts){
  var f = el("div","fld"); f.appendChild(el("label", null, label)); var input;
  if(type === "select"){ input = el("select"); opts.forEach(function(o){ var op = el("option", null, o); op.value = o; if(o === val){ op.selected = true; } input.appendChild(op); }); }
  else if(type === "textarea"){ input = el("textarea"); input.value = val || ""; }
  else{ input = el("input"); input.type = type || "text"; input.value = val || ""; }
  input.setAttribute("data-field", key); f.appendChild(input); return f;
}
function roField(label, val){ var f = el("div","fld"); f.appendChild(el("label", null, label)); f.appendChild(el("div","roval", (val && String(val).length) ? String(val) : "-")); return f; }
function renderRich(host, text){
  host.textContent = "";
  var raw = (text == null) ? "" : String(text);
  if(!raw.trim()){ host.textContent = "-"; return; }
  var lines = raw.replace(/\r\n?/g, "\n").split("\n");
  var i = 0; var buf = [];
  function flushText(){ if(!buf.length){ return; } var d = el("div","richtext"); d.textContent = buf.join("\n"); host.appendChild(d); buf = []; }
  while(i < lines.length){
    var m = lines[i].match(/^\s*[-*\u2022]\s+(.*)$/);
    if(m){
      flushText();
      var ul = el("ul","richul");
      while(i < lines.length){ var mm = lines[i].match(/^\s*[-*\u2022]\s+(.*)$/); if(!mm){ break; } ul.appendChild(el("li", null, mm[1])); i++; }
      host.appendChild(ul); continue;
    }
    buf.push(lines[i]); i++;
  }

function grabName(text, filename){
  var res = { first:"", last:"" };
  var head = (text || "").replace(/\r/g, "").split("\n").slice(0, 8).join("\n");
  var lines = head.split(/\n|\s{2,}/).map(function(s){ return s.trim(); }).filter(Boolean);
  var bad = /resume|curriculum|vitae|\bcv\b|address|phone|e-?mail|linkedin|github|portfolio|profile|summary|objective|experience|education|http|www\.|@|\d/i;
  for(var i = 0; i < lines.length; i++){
    var ln = lines[i].replace(/[,|].*$/, "").trim();
    var words = ln.split(/\s+/);
    if(words.length >= 2 && words.length <= 4 && !bad.test(ln) && /^[A-Za-z][A-Za-z'.\-]*(\s+[A-Za-z][A-Za-z'.\-]*){1,3}$/.test(ln)){
      res.first = words[0]; res.last = words[words.length - 1]; return res;
    }
  }
  var base = (filename || "").replace(/\.[^.]+$/, "");
  base = base.replace(/[_\-]+/g, " ").replace(/\b(resume|cv|curriculum vitae|final|copy|updated?|new)\b/ig, " ").replace(/\s+/g, " ").trim();
  if(/,/.test(base)){
    var parts = base.split(",");
    if(parts.length >= 2 && parts[0].trim() && parts[1].trim()){ res.last = parts[0].trim().split(/\s+/)[0]; res.first = parts[1].trim().split(/\s+/)[0]; return res; }
  }
  var fw = base.split(/\s+/).filter(Boolean);
  if(fw.length >= 2){ res.first = fw[0]; res.last = fw[fw.length - 1]; }
  else if(fw.length === 1){ res.first = fw[0]; }
  return res;
}
function grabLocation(text){
  var t = text || "";
  var m = t.match(/([A-Z][A-Za-z.\-]+(?:\s+[A-Z][A-Za-z.\-]+){0,2}),\s*([A-Z]{2})(?:\s+\d{5}(?:-\d{4})?)?\b/);
  if(m){ return m[1].trim() + ", " + m[2]; }
  var states = "Alabama|Alaska|Arizona|Arkansas|California|Colorado|Connecticut|Delaware|Florida|Georgia|Hawaii|Idaho|Illinois|Indiana|Iowa|Kansas|Kentucky|Louisiana|Maine|Maryland|Massachusetts|Michigan|Minnesota|Mississippi|Missouri|Montana|Nebraska|Nevada|New Hampshire|New Jersey|New Mexico|New York|North Carolina|North Dakota|Ohio|Oklahoma|Oregon|Pennsylvania|Rhode Island|South Carolina|South Dakota|Tennessee|Texas|Utah|Vermont|Virginia|Washington|West Virginia|Wisconsin|Wyoming";
  var m2 = t.match(new RegExp("([A-Z][A-Za-z.\\-]+(?:\\s+[A-Z][A-Za-z.\\-]+){0,2}),\\s*(" + states + ")\\b"));
  if(m2){ return m2[1].trim() + ", " + m2[2]; }
  return "";
}
async function fromResume(file){

function parseCSV(text){
  var rows = []; var row = []; var cur = ""; var q = false;
  for(var i=0;i<text.length;i++){ var ch = text[i];
    if(q){ if(ch === '"'){ if(text[i+1] === '"'){ cur += '"'; i++; } else{ q = false; } } else{ cur += ch; } }
    else{ if(ch === '"'){ q = true; } else if(ch === ","){ row.push(cur); cur = ""; } else if(ch === "\n"){ row.push(cur); rows.push(row); row = []; cur = ""; } else if(ch === "\r"){} else{ cur += ch; } } }

}
async function importCSV(text){
  var rows = parseCSV(text).filter(function(r){ return r.join("").trim() !== ""; });
  if(rows.length < 2){ toast("No rows found"); return; }
  var head = rows[0].map(function(h){ return h.trim().toLowerCase(); });
  function idx(n){ return head.indexOf(n.toLowerCase()); }
  var map = { firstName:idx("first name"), lastName:idx("last name"), full:idx("full name"), email:idx("email"), phone:idx("phone"), location:idx("location"), title:idx("current title"), company:idx("current company"), skills:idx("skills"), source:idx("source"), status:idx("status"), priority:idx("priority"), owner:idx("recruiter owner"), disc:idx("discipline"), recv:idx("date received"), last:idx("last contacted"), next:idx("next follow up"), link:idx("resume link"), linkedin:idx("linkedin"), summary:idx("candidate summary"), notes:idx("notes") };
  if(map.summary < 0){ map.summary = idx("summary"); }
  var out = []; var skipped = 0; var seenEmail = {}; var seenName = {};
  for(var r=1;r<rows.length;r++){ var row = rows[r];
    function g(i){ return (i>=0 && row[i] !== undefined) ? row[i].trim() : ""; }
    var fn = g(map.firstName); var ln = g(map.lastName);
    if(!fn && !ln && map.full >= 0){ var sp = g(map.full).split(/\s+/); fn = sp[0] || ""; ln = sp.slice(1).join(" "); }
    var c = newBlank(); c.firstName = fn; c.lastName = ln; c.email = g(map.email); c.phone = g(map.phone); c.location = g(map.location); c.title = g(map.title); c.company = g(map.company); c.discipline = g(map.disc);

    c.dateReceived = g(map.recv) || todayISO(); c.lastContacted = g(map.last); c.nextFollowUp = g(map.next); c.resumeLink = g(map.link); c.linkedin = g(map.linkedin); c.summary = g(map.summary); c.notes = g(map.notes);
    var em = normEmail(c.email); var nm = normName(c.firstName, c.lastName);

    if(findDuplicate(c, null) || (em && seenEmail[em]) || (!em && nm !== "|" && seenName[nm])){ skipped++; continue; }
    if(em){ seenEmail[em] = 1; } else if(nm !== "|"){ seenName[nm] = 1; }
    out.push(candToRow(c));
  }
  if(out.length === 0){ toast(skipped ? ("All " + skipped + " row(s) were duplicates - nothing imported") : "No rows found"); return; }
  var msg = out.length + " candidate(s) imported" + (skipped ? (" - " + skipped + " duplicate(s) skipped") : "");

function exportDayforce(){

/* ============================================================
   DRAFT AUTO-SAVE  -- persists form data across page navigation
   Keys: "tbDraft_<type>_<id>"  (type = modal type, id = candidate/record id or "new")
   ============================================================ */
function draftKey(type, id){ return "tbDraft_" + type + "_" + (id || "new"); }
function draftSave(type, id){
  try {
    var m = document.getElementById("modal"); if(!m){ return; }
    var inputs = m.querySelectorAll("[data-field]");
    var data = {};
    for(var i=0;i<inputs.length;i++){
      var k = inputs[i].getAttribute("data-field");
      if(inputs[i].type === "checkbox"){ data[k] = inputs[i].checked; }
      else { data[k] = inputs[i].value; }
    }
    localStorage.setItem(draftKey(type, id), JSON.stringify(data));
  } catch(e){}
}
function draftRestore(type, id){
  try {
    var raw = localStorage.getItem(draftKey(type, id));
    if(!raw){ return false; }
    var data = JSON.parse(raw);
    var m = document.getElementById("modal"); if(!m){ return false; }
    var inputs = m.querySelectorAll("[data-field]");
    var restored = false;
    for(var i=0;i<inputs.length;i++){
      var k = inputs[i].getAttribute("data-field");
      if(data[k] === undefined){ continue; }
      if(inputs[i].type === "checkbox"){ inputs[i].checked = !!data[k]; }
      else { inputs[i].value = data[k]; }
      restored = true;
    }
    return restored;
  } catch(e){ return false; }
}
function draftClear(type, id){
  try { localStorage.removeItem(draftKey(type, id)); } catch(e){}
}
var _draftType = null; var _draftId = null;
function draftWireModal(type, id){
  _draftType = type; _draftId = id;
  var m = document.getElementById("modal"); if(!m){ return; }
  m.addEventListener("input", function(){ draftSave(_draftType, _draftId); });
  m.addEventListener("change", function(){ draftSave(_draftType, _draftId); });
}

  var gotor = e.target.closest("[data-gotocand],[data-gotocandname]"); if(gotor){ e.stopPropagation(); var gcid = gotor.getAttribute("data-gotocand"); var gcname = (gotor.getAttribute("data-gotocandname") || "").trim().toLowerCase(); var gc = null; if(gcid){ gc = state.candidates.filter(function(x){ return String(x.id) === String(gcid); })[0]; } if(!gc && gcname){ gc = state.candidates.filter(function(x){ return ((x.firstName||"") + " " + (x.lastName||"")).trim().toLowerCase() === gcname; })[0]; } if(gc){ openDetail(gc); } else { alert("Candidate profile not found. No matching candidate record exists for this interview."); } return; }
  var iraddr = e.target.closest("[data-iradd]"); if(iraddr){ openInterviewRequestModal(null); return; }
  var irvwr = e.target.closest("[data-irview]"); if(irvwr){ var irv = (state.interviewRequests||[]).filter(function(x){ return x.id === irvwr.getAttribute("data-irview"); })[0]; if(irv){ openInterviewRequestDetail(irv); } return; }
  var iredr = e.target.closest("[data-iredit]"); if(iredr){ var irx = (state.interviewRequests||[]).filter(function(x){ return x.id === iredr.getAttribute("data-iredit"); })[0]; if(irx){ openInterviewRequestModal(irx); } return; }
  var irdelr = e.target.closest("[data-irdel]"); if(irdelr){ deleteInterviewRequest(irdelr.getAttribute("data-irdel")); return; }
  var edr = e.target.closest("[data-reqedit]"); if(edr){ var er = REQS.filter(function(x){ return x.id === edr.getAttribute("data-reqedit"); })[0]; if(er){ openReqModal(er); } return; }
  var subr = e.target.closest("[data-submitreq]"); if(subr){ submitReq(subr.getAttribute("data-submitreq")); return; }
  var delr = e.target.closest("[data-reqdel]"); if(delr){ deleteReq(delr.getAttribute("data-reqdel")); return; }
  var vr = e.target.closest("[data-reqview]"); if(vr){ var vrId = vr.getAttribute("data-reqview"); var rr = REQS.filter(function(x){ return x.id === vrId; })[0] || (state.reqs || []).filter(function(x){ return x.id === vrId; })[0]; if(rr){ viewReq(rr); } return; }
  var bad = e.target.closest("[data-benchadd]"); if(bad){ openBenchReqModal(null); return; }
  var br = e.target.closest("[data-benchreq]"); if(br && !e.target.closest("[data-reqview]")){ renderBenchCandidates(br.getAttribute("data-benchreq")); return; }
  var tr = e.target.closest("tr[data-id]"); if(!tr){ return; } var id = tr.getAttribute("data-id"); var c = state.candidates.filter(function(x){ return x.id === id; })[0]; if(c){ openDetail(c); } });

(function(){
  var fr = document.getElementById("fromResumeBtn");
  if(!fr){ return; }
  var inp = document.createElement("input"); inp.type = "file"; inp.accept = ".pdf,.doc,.docx"; inp.style.display = "none";
  document.body.appendChild(inp);
  inp.addEventListener("change", function(){ if(inp.files && inp.files[0]){ fromResume(inp.files[0]); inp.value = ""; } });
  fr.addEventListener("click", function(){ inp.click(); });
  fr.addEventListener("dragover", function(e){ e.preventDefault(); fr.style.outline = "2px dashed var(--gold)"; });
  fr.addEventListener("dragleave", function(){ fr.style.outline = ""; });
  fr.addEventListener("drop", function(e){ e.preventDefault(); fr.style.outline = ""; if(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]){ fromResume(e.dataTransfer.files[0]); } });
})();

document.getElementById("scrim").addEventListener("click", function(e){
  if(e.target.closest("[data-close]")){ closeModal(); return; }
  if(e.target.closest("[data-save]")){ saveCandidate(); return; }
  if(e.target.closest("[data-del]")){ deleteCandidate(); return; }
  if(e.target.closest("[data-logact]")){ logActivityAction(); return; }
  if(e.target.closest("[data-bulkadd]")){ bulkFromText(); return; }
  if(e.target.closest("[data-submitcand]")){ submitCandidate(); return; }
  if(e.target.closest("[data-scorecard]")){ openScorecard(); return; }
  if(e.target.closest("[data-tareject]")){ openRejectDialog("TA"); return; }
  if(e.target.closest("[data-hmreject]")){ openRejectDialog("HM"); return; }
  if(e.target.closest("[data-reqsave]")){ saveReq(); return; }
  if(e.target.closest("[data-mgrsave]")){ saveManager(); return; }
  if(e.target.closest("[data-irsave]")){ saveInterviewRequest(); return; }
  if(e.target.closest("[data-benchsave]")){ saveBenchReq(e.target.closest("[data-benchsave]").getAttribute("data-benchsave")); return; }
  if(e.target.closest("[data-benchedit]")){ var beel = e.target.closest("[data-benchedit]"); var beer = (state.reqs||REQS||[]).filter(function(x){ return x.id === beel.getAttribute("data-benchedit"); })[0]; if(beer){ openBenchReqModal(beer); } return; }
  if(e.target.closest("[data-benchdel]")){ deleteBenchReq(e.target.closest("[data-benchdel]").getAttribute("data-benchdel")); return; }
  var ed = e.target.closest("[data-reqedit]"); if(ed){ var er = REQS.filter(function(x){ return x.id === ed.getAttribute("data-reqedit"); })[0]; if(er){ openReqModal(er); } return; }
  var pick = e.target.closest("[data-resumepick]"); if(pick){ var fi = document.getElementById("resumeFileIn"); if(fi){ fi.click(); } return; }
  var openr = e.target.closest("[data-resumeopen]"); if(openr){ openResume(openr.getAttribute("data-resumeopen")); return; }
});

document.addEventListener("input", function(e){
  if(e.target && e.target.getAttribute && e.target.getAttribute("data-field") === "reqHM"){
    var val = e.target.value.trim().toLowerCase();
    var m = MANAGERS.filter(function(x){ return x.name.toLowerCase() === val; })[0];
    if(m){
      var md = document.getElementById("modal");
      var t = md.querySelector("[data-field='reqHMTitle']"); var em = md.querySelector("[data-field='reqHMEmail']"); var ph = md.querySelector("[data-field='reqHMPhone']");
      if(t && !t.value){ t.value = m.title || ""; }
      if(em && !em.value){ em.value = m.email || ""; }
      if(ph && !ph.value){ ph.value = m.phone || ""; }
    }
  }
});
