<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentBase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root{
    --bg:#f4f5f9;--panel:#ffffff;--panel2:#f0f1f6;--line:#e2e5ef;
    --ink:#111318;--muted:#52576b;--gold:#3B5BFF;--gold-dim:#eaedff;
    --blue:#3B5BFF;--cyan:#0891b2;--teal:#0e9e7a;--yellow:#b45309;
    --orange:#c2410c;--purple:#7c3aed;--gray:#676d86;--red:#dc2626;--green:#15803d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5}
  h1,h2,h3{font-family:inherit;font-weight:700;margin:0}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .wrap{max-width:1420px;margin:0 auto;padding:0 22px}
  /* ── HEADER ── */
  header{border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 0;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-logo{width:32px;height:32px;flex-shrink:0}
  .brand-text{display:flex;flex-direction:column;gap:0px}
  .brand-text .brand-name{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.3px;line-height:1.1}
  .brand-text .brand-sub{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.2px}
  .vobadge{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .grow{flex:1}
  .userbox{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
  .search{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;min-width:200px;flex-shrink:1}
  .search input{background:transparent;border:0;color:var(--ink);width:100%;outline:none}
  .search input::placeholder{color:var(--gray)}
  .search svg{flex:0 0 auto;opacity:.5}
  /* ── universal search dropdown ── */
  .search{position:relative}
  .qdrop{position:absolute;top:calc(100% + 8px);left:0;right:0;min-width:320px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 14px 38px rgba(10,12,24,.16);z-index:650;max-height:430px;overflow:auto;display:none;padding:4px}
  .qdrop.open{display:block}
  .qdrop .qh{display:flex;align-items:center;justify-content:space-between;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.1px;color:var(--gray);padding:9px 10px 4px}
  .qdrop .qh .qgo{cursor:pointer;color:var(--blue);font-weight:700;letter-spacing:.3px;text-transform:none;font-size:11px}
  .qdrop .qh .qgo:hover{text-decoration:underline}
  .qdrop .qi{padding:7px 10px;border-radius:8px;cursor:pointer}
  .qdrop .qi:hover{background:var(--panel2)}
  .qdrop .qt{font-size:13px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
  .qdrop .qt .qtag{font-size:10px;font-weight:700;color:var(--gray);background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:1px 8px;white-space:nowrap}
  .qdrop .qs{font-size:12px;color:var(--muted);margin-top:1px}
  .qdrop .qmore,.qdrop .qempty{font-size:11px;color:var(--gray);padding:6px 10px 8px}
  /* ── BUTTONS ── */
  .btn{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;transition:all .14s;display:inline-flex;align-items:center;gap:5px}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  .btn.gold{background:var(--gold);color:#fff;border-color:var(--gold);box-shadow:0 2px 8px rgba(59,91,255,.22)}
  .btn.gold:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent}
  .btn.ghost:hover{background:var(--panel2)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger:hover{border-color:var(--red);color:var(--red)}
  .btn.block{width:100%;padding:11px;font-size:14px;justify-content:center}
  /* ── LAYOUT ── */
  .layout{display:grid;grid-template-columns:230px 1fr;gap:0;padding:18px 0 60px}
  /* ── SIDEBAR ── */
  .side{position:sticky;top:53px;align-self:start;max-height:calc(100vh - 53px);overflow-y:auto;border-right:1px solid var(--line);background:var(--panel);padding:14px 0 32px}
  .side h3{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--gray);margin:20px 0 5px;font-family:inherit;font-weight:700;padding:0 16px}
  .side h3:first-child{margin-top:8px}
  .vtab{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;background:transparent;border:0;color:var(--muted);padding:8px 16px;border-radius:0;font-size:13px;font-weight:500;transition:background .1s,color .1s;position:relative}
  .vtab:hover{background:var(--bg);color:var(--ink)}
  .vtab.active{background:var(--gold-dim);color:var(--gold);font-weight:700}
  .vtab.active::before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
  .vtab .count{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:0 7px;font-size:11px;color:var(--gray)}
  .vtab.active .count{color:var(--gold);border-color:var(--gold);background:#fff}
  .side h3.sech{margin:20px 0 5px}
  .side h3.toggle{cursor:pointer;user-select:none}
  .side h3.toggle:hover{color:var(--ink)}
  .vtab.fu-amber:not(.active){color:var(--yellow)}
  .vtab.fu-amber:not(.active)::before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--yellow);border-radius:0 3px 3px 0}
  .vtab.fu-red:not(.active){color:var(--red)}
  .vtab.fu-red:not(.active)::before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--red);border-radius:0 3px 3px 0}
  .vtab.fu-amber .count{color:var(--yellow);border-color:var(--yellow)}
  .vtab.fu-red .count{color:var(--red);border-color:var(--red)}
  .filterbox{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;margin:6px 10px 0}
  .filterbox label{display:block;font-size:11px;color:var(--gray);margin:8px 0 4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .filterbox label:first-child{margin-top:0}
  select.fil{width:100%;background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px 8px}
  /* ── MAIN ── */
  .main{min-width:0;padding:20px 24px 60px;overflow-y:auto}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .toolbar .title{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.2px}
  .toolbar .meta{color:var(--muted);font-size:12px}
  /* ── TABLES ── */
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  thead th{text-align:left;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--gray);padding:11px 14px;border-bottom:1px solid var(--line);font-weight:700;background:var(--panel2);vertical-align:bottom;white-space:nowrap}
  tbody td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  tbody tr:last-child td{border-bottom:0}
  tbody tr.click:hover td{background:var(--panel2);cursor:pointer}
  .pill{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;border:1px solid transparent;display:inline-block}
  /* ── GATE (login) ── */
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
  .gate .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:44px;width:400px;box-shadow:0 4px 28px rgba(0,0,0,.09)}
  .gate-brand{display:flex;align-items:center;gap:14px;margin-bottom:28px}
  .gate-brand-text .gate-name{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.4px;line-height:1.1}
  .gate-brand-text .gate-sub{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.2px;margin-top:3px}
  .gate label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin:14px 0 5px;text-transform:uppercase;letter-spacing:.5px}
  .gate input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--ink);font-size:14px;outline:none;transition:border-color .12s}
  .gate input:focus{border-color:var(--gold)}
  .msg{font-size:13px;margin-top:10px;min-height:18px}
  .msg.err{color:var(--red)}
  .msg.ok{color:var(--green)}
  #app{display:none}
  /* ── MODAL ── */
  .scrim{position:fixed;inset:0;background:rgba(10,12,24,.5);display:none;align-items:center;justify-content:center;z-index:500;padding:16px}
  .scrim.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:860px;max-height:calc(100vh - 32px);overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.14)}
  .modal.wide{max-width:680px}
  .mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:10}
  .mbody{padding:20px 22px}
  .mfoot{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:16px 22px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--panel)}
  .fld{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
  .fld label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .fld input,.fld select,.fld textarea{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--ink);outline:none;transition:border-color .12s}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold)}
  .fld textarea{min-height:80px;resize:vertical}
  .fld.full{grid-column:1/-1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
  .x{background:transparent;border:0;color:var(--gray);font-size:22px;line-height:1;cursor:pointer;padding:0 4px;border-radius:6px;transition:all .12s}
  .x:hover{color:var(--ink);background:var(--panel2)}
  .click{cursor:pointer;transition:background .12s}
  .click:hover{background:var(--panel2)}
  .top{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;color:var(--muted)}
  .nm{font-weight:700;color:var(--ink)}
  .sub2{color:var(--muted);font-size:13px}
  .right{display:flex;gap:10px;align-items:center}
  .big{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px}
  .hint{color:var(--gray);font-size:12px;margin:10px 0 0;line-height:1.5}
  .act{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;background:var(--panel2)}
  .drop{border:2px dashed var(--line);border-radius:10px;padding:26px;text-align:center;color:var(--muted);background:var(--panel2);transition:.15s}
  .drop:hover{border-color:var(--gold);color:var(--gold)}
  .reqgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px}
  .reqck{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--ink)}
  .hot{border-color:var(--gold)!important;color:var(--gold)!important;background:var(--gold-dim)!important}
  .due{font-size:12px;font-weight:700;color:var(--yellow)}
  .grouphdr td{background:var(--panel2);color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:11px;border-top:2px solid var(--line);padding:10px 14px}
  .richtext{white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.6}
  .richul{margin:4px 0;padding-left:20px}
  .nt{margin-top:4px}
  .roval{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:8px 10px;color:var(--ink);min-height:18px;font-size:13px}
  .wide{max-width:680px}
  .sub{color:var(--muted);font-size:12px}
  .prognotes{margin-bottom:16px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2)}
  .toast.show{opacity:1}
  .empty{text-align:center;padding:40px;color:var(--gray);font-size:14px}
  .sect{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

  /* ═══════════════════════════════════════════════════════════════
     UI 3.0 — presentation-layer modernization
     Additive only: no markup, no logic, no class renames. Every rule
     below refines the look of EXISTING selectors or adds accessibility.
     Safe to remove this block to revert 100% to the prior appearance.
     ═══════════════════════════════════════════════════════════════ */
  :root{
    --radius:10px; --radius-sm:8px; --radius-lg:14px;
    --shadow-sm:0 1px 2px rgba(16,18,34,.05), 0 1px 3px rgba(16,18,34,.05);
    --shadow-md:0 6px 16px rgba(16,18,34,.07), 0 2px 4px rgba(16,18,34,.04);
    --shadow-lg:0 16px 40px rgba(16,18,34,.14);
    --ring:0 0 0 3px rgba(59,91,255,.20);
  }
  html{scroll-behavior:smooth}
  body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;letter-spacing:-.01em}
  h1,h2,h3{letter-spacing:-.02em}
  /* Aligned, tabular numerals across data surfaces (rank #, counts, comp) */
  table,.count,.roval,.due,.toolbar .meta{font-variant-numeric:tabular-nums}
  /* Executive-scale titles + a little more breathing room */
  .toolbar{margin-bottom:20px}
  .toolbar .title{font-size:23px;letter-spacing:-.02em}
  .main{padding-top:24px}
  /* Softer, layered elevation */
  header{box-shadow:0 1px 0 var(--line), 0 1px 10px rgba(16,18,34,.04)}
  table{box-shadow:var(--shadow-sm);border-radius:var(--radius-lg)}
  .modal{box-shadow:var(--shadow-lg);border-radius:16px}
  .gate .card{box-shadow:var(--shadow-lg)}
  .filterbox{border-radius:var(--radius)}
  /* Calmer, roomier tables with a subtle branded row hover */
  thead th{padding:12px 16px;letter-spacing:.5px}
  tbody td{padding:13px 16px}
  tbody tr.click{transition:background .12s ease}
  tbody tr.click:hover td{background:var(--gold-dim)}
  /* Buttons: subtle lift, refined radius, smooth transition */
  .btn{border-radius:9px;transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease,color .12s ease,background .12s ease}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.gold{box-shadow:0 1px 2px rgba(59,91,255,.24),0 4px 12px rgba(59,91,255,.22)}
  .btn.gold:hover{box-shadow:0 2px 4px rgba(59,91,255,.28),0 8px 20px rgba(59,91,255,.26)}
  /* Inputs & search: accessible focus ring */
  .search:focus-within{border-color:var(--gold);box-shadow:var(--ring)}
  .fld input:focus,.fld select:focus,.fld textarea:focus,.gate input:focus,select.fil:focus{box-shadow:var(--ring);border-color:var(--gold)}
  select.fil{border-radius:8px;padding:7px 9px}
  /* Pills: crisper spacing */
  .pill{padding:3px 10px;letter-spacing:.2px}
  /* Keyboard accessibility: visible focus for every interactive element */
  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
  .vtab:focus-visible{outline:2px solid var(--gold);outline-offset:-2px}
  /* Top bar: kill the dead gap, let search fill, align actions to the content's right edge */
  /* App shell: wider container (less dead margin on big screens) + header content
     gutters that EXACTLY match the sidebar text (16px) and main content (24px),
     so the logo lines up with the nav and Sign Out lines up with the content. */
  .wrap{max-width:1600px}
  .topbar{padding-left:16px;padding-right:24px}
  .topbar .grow{flex:0 0 0;width:0;min-width:0}
  .topbar .search{flex:1 1 auto;max-width:560px;margin-right:auto}
  /* Empty & feedback states — consistent, intentional, premium */
  .empty{padding:52px 32px;border:1px dashed var(--line);border-radius:var(--radius-lg);background:var(--panel);color:var(--muted)}
  .empty .big{font-size:16px;color:var(--ink);margin-bottom:6px}
  .msg.err{color:var(--red);background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.22);border-radius:8px;padding:8px 11px}
  .msg.ok{color:var(--green);background:rgba(21,128,61,.09);border:1px solid rgba(21,128,61,.22);border-radius:8px;padding:8px 11px}
  .toast{border-radius:12px;box-shadow:var(--shadow-lg)}
  /* Reusable loading spinner (available for future loading states) */
  @keyframes tb-spin{to{transform:rotate(360deg)}}
  .tb-spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:tb-spin .7s linear infinite;vertical-align:middle}
  /* ═══ Candidate cards — the list is a set of recruiting dossiers, not rows ═══
     Scoped to .cardtable (the candidate list only). Preserves every row's
     data-id click-to-open, grouping, filters, search and sort. */
  .cardtable{display:block;border:0;background:transparent;box-shadow:none;border-radius:0}
  .cardtable thead{display:none}
  .cardtable tbody{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,340px),1fr));gap:12px}
  .cardtable tr.grouphdr{grid-column:1/-1}
  .cardtable tr.grouphdr td{display:block;background:transparent;border:0;color:var(--muted);font-weight:700;letter-spacing:.7px;text-transform:uppercase;font-size:11px;padding:18px 2px 2px}
  .cardtable tr.click{display:grid;grid-template-columns:minmax(0,1fr) auto;column-gap:12px;align-content:start;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm);cursor:pointer;transition:box-shadow .15s ease,transform .15s ease,border-color .15s ease}
  .cardtable tr.click:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--gold)}
  .cardtable tr.click td{border:0;padding:0;font-size:13px;color:var(--ink);min-width:0}
  .cardtable tr.click:hover td{background:transparent}
  .cardtable td:nth-child(1){grid-column:1;grid-row:1;overflow-wrap:anywhere}
  .cardtable td:nth-child(1) .nm{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .cardtable td:nth-child(1) .sub2{margin-top:2px;color:var(--muted)}
  .cardtable td:nth-child(4){grid-column:2;grid-row:1;justify-self:end;align-self:start;text-align:right}
  .cardtable td:nth-child(2){grid-column:1/-1;margin-top:11px;color:var(--ink);font-weight:600;font-size:13px}
  .cardtable td:nth-child(2) .sub2{font-weight:400;color:var(--muted);margin-top:1px}
  .cardtable td:nth-child(3),.cardtable td:nth-child(5),.cardtable td:nth-child(6),.cardtable td:nth-child(7){grid-column:1/-1;display:flex;align-items:baseline;gap:8px;margin-top:7px;color:var(--ink)}
  .cardtable td:nth-child(3){margin-top:13px;padding-top:13px;border-top:1px solid var(--line)}
  .cardtable td:nth-child(3)::before,.cardtable td:nth-child(5)::before,.cardtable td:nth-child(6)::before,.cardtable td:nth-child(7)::before{flex:0 0 76px;color:var(--gray);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding-top:1px}
  .cardtable td:nth-child(3)::before{content:"Discipline"}
  .cardtable td:nth-child(5)::before{content:"Target req"}
  .cardtable td:nth-child(6)::before{content:"Follow-up"}
  .cardtable td:nth-child(7)::before{content:"Owner"}
  .cardtable td:nth-child(5) .tag{background:var(--gold-dim);color:var(--gold);border-radius:6px;padding:2px 8px;font-weight:600;font-size:12px}
  .cardtable td:nth-child(5) .tag+.tag{margin-left:5px}
  /* Respect users who prefer reduced motion */
  /* ═══ Hiring Manager cards — executive profiles (matches candidate cards) ═══ */
  .mgrcards{display:block;border:0;background:transparent;box-shadow:none;border-radius:0}
  .mgrcards thead{display:none}

/* ============================================================================
   TalentBench Enhancement (ADDITIVE) — Requisition Priority + Sourcing Status
   - Priority badge: read-only display of the EXISTING reqs.rank value.
   - Sourcing Status: a NEW, independent field (reqs.sourcing_status). It is
     NOT the requisition status and touches nothing in the hiring lifecycle.
     Values: active | slow | paused. Read-safe default: active.
   - Both are gated by window.TB_FEATURES for OFF / ON / partial rollout.
   ========================================================================== */
var TB_FLAGS = (function(){
  var d = { priority:true, sourcingStatus:true };
  try {
    if (window.TB_FEATURES) {
      if (typeof window.TB_FEATURES.priority === "boolean") d.priority = window.TB_FEATURES.priority;
      if (typeof window.TB_FEATURES.sourcingStatus === "boolean") d.sourcingStatus = window.TB_FEATURES.sourcingStatus;
    }
  } catch(e){}
  return d;
})();
var SOURCING_STATUS = {
  active: { key:"active", label:"Active", icon:"\u{1F7E2}", color:"--green",  tip:"Source normally." },
  slow:   { key:"slow",   label:"Slow",   icon:"\u{1F7E1}", color:"--yellow", tip:"Continue sourcing, but reduce effort — enough candidates in process." },
  paused: { key:"paused", label:"Paused", icon:"\u{1F534}", color:"--red",    tip:"Stop sourcing NEW candidates. Existing candidates continue normally." }
};
/* Read-safe: any null / unknown / missing value renders as Active, never errors. */
function normSourcing(v){ v = (v==null?"":String(v)).toLowerCase().trim(); return SOURCING_STATUS[v] ? v : "active"; }
function sourcingPill(key){

var PRIORITY = ["High","Medium","Low"];
/* ── Canonical pipeline ordering ──────────────────────────────────────────
   Candidate lists cluster by funnel stage (New → … → Hired, then closed)
   instead of raw insertion order; within a stage, High priority first, then
   name. Unknown/legacy statuses (e.g. "Review") cluster together just before
   the closed statuses. Pure presentation — never mutates the source array. */
var STATUS_INDEX = {}; STATUS.forEach(function(s, i){ STATUS_INDEX[s] = i; });
var PRIORITY_RANK = { "High":0, "Medium":1, "Low":2 };
var PIPELINE_UNKNOWN_RANK = (function(){ var i = STATUS.indexOf("Offer Declined"); return (i < 0 ? STATUS.length : i) - 0.5; })();
function statusRank(s){ return (s in STATUS_INDEX) ? STATUS_INDEX[s] : PIPELINE_UNKNOWN_RANK; }
function pipelineSort(rows){
  return (rows || []).slice().sort(function(a, b){
    var ra = statusRank(a.status), rb = statusRank(b.status);
    if(ra !== rb){ return ra - rb; }
    if(!(a.status in STATUS_INDEX)){ var sa = (a.status||""), sb = (b.status||""); if(sa !== sb){ return sa.localeCompare(sb); } }
    var pa = PRIORITY_RANK[a.priority]; if(pa == null){ pa = 1; }
    var pb = PRIORITY_RANK[b.priority]; if(pb == null){ pb = 1; }
    if(pa !== pb){ return pa - pb; }
    return fullName(a).localeCompare(fullName(b));
  });
}

async function boot(){

    document.getElementById("gateForm").innerHTML = "";

    return;

  if(sess.data && sess.data.session){ await onAuthed(sess.data.session.user); }
}
async function doLogin(){

  var email = document.getElementById("loginEmail").value.trim();
  var pass = document.getElementById("loginPass").value;
  var res = await sb.auth.signInWithPassword({ email: email, password: pass });
  if(res.error){ gateMsg(res.error.message, "err"); return; }
  await onAuthed(res.data.user);
}
async function fetchProfileWithRetry(userId, attempts){
  attempts = attempts || 3;
  for(var i = 0; i < attempts; i++){
    var prof = await sb.from("profiles").select("*").eq("id", userId).single();
    if(!prof.error){ return prof; }
    var msg = (prof.error && prof.error.message) || "";
    var code = (prof.error && prof.error.code) || "";
    /* Transient: OOM or network blip -- retry after brief delay */
    var isTransient = (msg.indexOf("Failed to fetch") !== -1 || msg.indexOf("fetch") !== -1 || msg.indexOf("network") !== -1 || msg.indexOf("OOM") !== -1 || code === "PGRST301" || code === "503" || code === "504");
    console.error("[TSS] profiles fetch attempt " + (i+1) + " failed:", { userId: userId, code: code, message: msg, hint: (prof.error && prof.error.hint) || "", details: (prof.error && prof.error.details) || "", supabaseError: prof.error });
    if(!isTransient || i === attempts - 1){ return prof; }
    await new Promise(function(r){ setTimeout(r, 1200 * (i + 1)); });
  }
  return { error: { message: "Profile fetch failed after " + attempts + " attempts." }, data: null };
}
async function onAuthed(user){
  gateMsg("Loading your profile...", "");
  var prof = await fetchProfileWithRetry(user.id);
  if(prof.error || !prof.data){
    var errMsg = (prof.error && prof.error.message) || "Unknown error";
    var errCode = (prof.error && prof.error.code) || "";
    console.error("[TSS] onAuthed: profiles load failed", { userId: user.id, code: errCode, message: errMsg, error: prof.error });
    if(errMsg.indexOf("Failed to fetch") !== -1 || errMsg.indexOf("fetch") !== -1 || errMsg.indexOf("network") !== -1){
      gateMsg("Connection error loading your profile. The server may be temporarily overloaded. Please wait a moment and try signing in again. (detail: " + errMsg + ")", "err");
    } else if(errCode === "PGRST116" || errMsg.indexOf("0 rows") !== -1 || errMsg.indexOf("multiple") !== -1){
      gateMsg("Your account has no access profile yet. Ask the admin to set your role.", "err");
    } else {
      gateMsg("Could not load your access profile. Error: " + errMsg + " (code: " + errCode + ")", "err");
    }
    return;
  }
  var orgs = prof.data.orgs || [];
  if(orgs.indexOf(ORG) === -1){ gateMsg("Your account does not have access to this program.", "err"); return; }
  VIEW_ONLY = prof.data.role !== "editor";
  document.getElementById("whoami").textContent = (function(e){ var n = (e||"").split("@")[0].split(/[._-]+/).filter(Boolean).map(function(w){ return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); }).join(" "); return (n || e) + " (" + (VIEW_ONLY ? "viewer" : "editor") + ")"; })(prof.data.email || user.email);
  CURRENT_USER = { id:user.id, email:(prof.data.email || user.email), role:(prof.data.role||"viewer"), avatarUrl:(prof.data.avatar_url||""), backdropUrl:(prof.data.backdrop_url||"") };
  gateMsg("", "");
  document.getElementById("gate").style.display = "none";
  document.getElementById("app").style.display = "block";
  applyViewOnly();
  await loadData();
  wireRealtime();
  refresh();
}

function tbGreeting(){

  if(window.TB_IMPERSONATE){ who = window.TB_IMPERSONATE.name.split(" ")[0]; }
  else if(typeof CURRENT_USER !== "undefined" && CURRENT_USER && CURRENT_USER.email){ who = CURRENT_USER.email.trim().split("@")[0].split(/[._+\-]/)[0]; }

function renderLeadershipBrief(host){
  /* ═══ EXECUTIVE COMMAND CENTER (v3.0 redesign) — not a report: a health read.
     Premium, quiet, decisive. Every figure equals its drill-down. ═══ */
  var cands = state.candidates || [], irs = state.interviewRequests || [];
  var canon = window.TB_METRICS ? TB_METRICS.canonicalReqEntries(REQS).map(function(e){ return e.req; }) : REQS;
  var openReqs = canon.filter(function(r){ return window.TB_METRICS ? TB_METRICS.isOpenReq(r) : !r.bench; });
  var offers = cands.filter(function(c){ return c.status === "Offer Pending"; });
  var submitted = cands.filter(function(c){ return c.status === "Submitted"; });
  var interviewing = cands.filter(function(c){ return ["Interviewing Stage 1","Interviewing Stage 2","Interviewing Stage 3","Panel / Final Interview","Interviewing"].indexOf(c.status) !== -1; });
  var hired = cands.filter(function(c){ return c.status === "Offer Accepted - Hired"; });
  var fuAll = cands.filter(function(c){ return followUp(c).label !== ""; });
  var fuOver = cands.filter(function(c){ return followUp(c).label === "Overdue"; });
  function reqTag(r){ return r.title + " – " + r.loc; }
  function reqCandN(r){ var tag = reqTag(r); return cands.filter(function(c){ return (c.reqs||[]).indexOf(tag) !== -1 && c.status !== "Archived"; }).length; }
  var starving = openReqs.filter(function(r){ return reqCandN(r) === 0; });
  var critical = openReqs.filter(function(r){ return reqCandN(r) === 0 || /high|critical|urgent/i.test(String(r.priority || "") + " " + String(r.urgency || "")); }).slice(0, 40);
  var now = new Date(); var ws7 = new Date(now); ws7.setDate(now.getDate() - 7);
  var acts7 = (state.activities || []).filter(function(a){ var d = Date.parse(a.date || ""); return d && d >= ws7.getTime(); }).length;
  var new7 = cands.filter(function(c){ var d = Date.parse(c.dateReceived || ""); return d && d >= ws7.getTime(); }).length;
  var wkS = new Date(now); wkS.setDate(now.getDate() - now.getDay()); var wkE = new Date(wkS); wkE.setDate(wkS.getDate() + 7);
  var irsWeek = irs.filter(function(ir){ if(!ir.interviewDate){ return false; } var d = new Date(ir.interviewDate); return d >= wkS && d < wkE; });
  /* HMs waiting */
  var hmWait = {};
  submitted.forEach(function(c){ (c.reqs||[]).forEach(function(tag){ REQS.forEach(function(r){ if(reqTag(r) === tag && r.hm){ hmWait[r.hm] = (hmWait[r.hm] || 0) + 1; } }); }); });
  var hmWaitKeys = Object.keys(hmWait).sort(function(a,b){ return hmWait[b] - hmWait[a]; });
  /* Health score: coverage 40 · responsiveness 25 · pipeline motion 20 · offer flow 15 */
  var coverage = openReqs.length ? (openReqs.length - starving.length) / openReqs.length : 1;
  var responsiveness = fuAll.length ? 1 - (fuOver.length / fuAll.length) : 1;
  var motion = Math.min(1, (interviewing.length + irsWeek.length) / Math.max(1, Math.round(openReqs.length * 0.35)));
  var offerFlow = Math.min(1, (offers.length + hired.length) / Math.max(1, Math.round(openReqs.length * 0.12)));
  var score = Math.round(coverage * 40 + responsiveness * 25 + motion * 20 + offerFlow * 15);
  /* One read, three states, zero interpretation. The score survives only as a tiny
     trend footnote — executives manage problems, not GPAs. */
  var grade = score >= 80 ? ["Healthy","--green","🟢"] : score >= 40 ? ["Attention Needed","--gold","🟡"] : ["At Risk","--red","🔴"];
  document.getElementById("viewTitle").textContent = "";
  document.getElementById("viewMeta").textContent = "";

  var wrap = el("div"); wrap.style.cssText = "max-width:1020px";
  /* executive header */
  var head = el("div"); head.style.cssText = "display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin:2px 0 22px;flex-wrap:wrap";
  var hl = el("div");
  if(window.TB_WS === "executive"){ var gr = el("div", null, tbGreeting()); gr.style.cssText = "font-size:13px;font-weight:600;color:var(--muted);margin-bottom:2px"; hl.appendChild(gr); }
  var h1 = el("div", null, "Recruiting Health"); h1.style.cssText = "font-size:27px;font-weight:800;letter-spacing:-.4px;color:var(--ink)";
  hl.appendChild(h1);
  hl.appendChild(el("div","hint", tbClientDisplayName() + " · " + new Date().toLocaleDateString("en-US",{ weekday:"long", month:"long", day:"numeric" }) + " · prepared live for the staffing meeting"));
  head.appendChild(hl);
  var hs = el("div"); hs.style.cssText = "text-align:right";
  var sc = el("div", null, grade[2] + " " + grade[0].toUpperCase());
  sc.style.cssText = "font-size:19px;font-weight:800;letter-spacing:.6px;line-height:1.2;color:" + cssVar(grade[1]);
  sc.title = "One read: green = healthy, yellow = attention needed, red = at risk. Today's Priorities below are the exact reasons — and what to do.";
  hs.appendChild(sc);
  var scTiny = el("div","hint","Health Score: " + score);
  scTiny.style.cssText += ";font-size:11px";
  scTiny.title = "Trend number only — requisition coverage (40) + follow-up responsiveness (25) + interview motion (20) + offer flow (15). The status light is the read; nobody needs to decode this.";
  hs.appendChild(scTiny);
  head.appendChild(hs);
  wrap.appendChild(head);
  /* ── Today's Priorities — first thing on the page: what is broken, what to do.
     Every row opens the exact records. The status light above is the "are we
     healthy?"; this list is the "where are we bleeding?" ── */
  function goView(v){ return function(){ ui.view = v; refresh(); }; }
  var stalledIRs = irs.filter(function(ir){ if(ir.status !== "Requested"){ return false; } var d = Date.parse(ir.createdAt || ""); return d && (Date.now() - d) > 5 * 86400000; });
  var bottlenecks = [];
  if(starving.length){ bottlenecks.push([starving.length + " open requisition" + (starving.length === 1 ? "" : "s") + " with zero candidates in play", "--red", goView("autoslate"), "Opens AutoSlate — the fastest way to put candidates on these requisitions"]); }
  if(fuOver.length){ bottlenecks.push([fuOver.length + " candidate" + (fuOver.length === 1 ? "" : "s") + " overdue for follow-up — at risk of going cold", "--yellow", goView("followup"), "Opens the follow-up worklist with days-overdue per candidate"]); }

  if(offers.length){ bottlenecks.push([offers.length + " offer" + (offers.length === 1 ? "" : "s") + " awaiting candidate decision", "--gold", goView("offerpending"), "Opens the offers in motion"]); }
  if(stalledIRs.length){ bottlenecks.push([stalledIRs.length + " interview request" + (stalledIRs.length === 1 ? "" : "s") + " unscheduled for more than 5 days", "--purple", goView("interviewrequests"), "Opens the interview request list"]); }
  var pr = exSection("Today's Priorities", null);
  if(!bottlenecks.length){

    allGood.style.cssText = "font-size:14px;font-weight:700;color:" + cssVar("--green");
    pr.appendChild(allGood);
  } else {
    bottlenecks.slice(0, 5).forEach(function(b){ exRow(pr, b[0], b[1], b[2], b[3]); });
    var rest = el("div","hint","Everything else is on track.");
    rest.style.marginTop = "6px"; pr.appendChild(rest);

function renderFollowUpWorklist(host){
  // Read-only triage worklist over state.candidates. Reuses followUp(), rowFor(),

    if(!c.nextFollowUp){ noFu.push(c); return; }
    var lab = followUp(c).label;
    if(lab === "Overdue"){ overdue.push(c); }

      td.appendChild(clr);
    } else {

    }

function hmStats(name){
  var key = (name || "").trim().toLowerCase();
  var reqs = REQS.filter(function(r){ return (r.hm || "").trim().toLowerCase() === key; });
  if(window.TB_METRICS){ reqs = TB_METRICS.canonicalReqEntries(reqs).map(function(e){ return e.req; }); }
  var active = reqs.filter(function(r){ return window.TB_METRICS ? TB_METRICS.isActiveReq(r) : !/(filled|closed|cancell?ed|archived)/.test((r.reqStatus||"").toLowerCase()); });
  var lb = {};
  reqs.forEach(function(r){ [(r.title||"") + " – " + (r.loc||""), (r.title||"") + " - " + (r.loc||"")].forEach(function(l){ lb[l] = 1; }); });
  var cands = (state.candidates || []).filter(function(c){ return (c.reqs || []).some(function(l){ return lb[l]; }); });
  var activeC = cands.filter(function(c){ return window.TB_METRICS ? TB_METRICS.isActiveCand(c) : (c.status !== "Archived" && c.status !== "Offer Accepted - Hired"); });
  var overdue = false;

    overdue: overdue

}

  var notes = state.notes.filter(function(n){ return (n.context || "priolist") === context; });
  var wrap = el("div"); wrap.style.cssText = "margin-top:14px;border-top:1px solid var(--line);padding-top:12px";
  var hdr = el("div"); hdr.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:8px";
  var ttl = el("div", null, "Team Notes"); ttl.style.cssText = "font-weight:700;color:var(--gold);font-size:13px"; hdr.appendChild(ttl);
  hdr.appendChild(el("div","sub2", notes.length + " posted"));
  wrap.appendChild(hdr);

  var feed = el("div"); feed.style.cssText = "max-height:240px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;padding:4px 6px;background:var(--bg)";
  if(!notes.length){
    var em = el("div","sub2","No notes yet. Be the first to post one for the group."); em.style.cssText = "padding:14px 8px;text-align:center;color:var(--muted)"; feed.appendChild(em);
  } else {
    var ordered = notes.slice().sort(function(a,b){ return (a.createdAt||"").localeCompare(b.createdAt||""); });
    ordered.forEach(function(n){ feed.appendChild(buildNoteRow(n)); });
  }
  wrap.appendChild(feed);

  var comp = el("div"); comp.style.cssText = "margin-top:10px";
  var ta = el("textarea"); ta.id = "noteCompose"; ta.placeholder = "Add a note for the group..."; ta.value = NOTES_COMPOSE;
  ta.style.cssText = "width:100%;min-height:54px;resize:vertical;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font:inherit;font-size:13px";
  ta.addEventListener("input", function(){ NOTES_COMPOSE = ta.value; });
  ta.addEventListener("keydown", function(e){ if((e.metaKey || e.ctrlKey) && e.key === "Enter"){ e.preventDefault(); addProgramNote(context); } });
  comp.appendChild(ta);
  var row = el("div"); row.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-top:6px;gap:8px";
  row.appendChild(el("div","sub2","Press Cmd or Ctrl + Enter to post"));
  var post = el("button","btn gold sm","Post note"); post.addEventListener("click", function(){ addProgramNote(context); }); row.appendChild(post);
  comp.appendChild(row);
  wrap.appendChild(comp);
  return wrap;
}
function buildNoteRow(n){
  var mine = !!(CURRENT_USER && n.authorId === CURRENT_USER.id);
  var row = el("div"); row.style.cssText = "padding:8px 4px;border-bottom:1px solid var(--line)";
  var meta = el("div"); meta.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap";
  var who = el("span", null, noteAuthorLabel(n.authorEmail)); who.style.cssText = "font-weight:700;color:var(--ink);font-size:12px"; who.title = n.authorEmail || ""; meta.appendChild(who);
  var when = el("span","sub2", fmtWhen(n.createdAt)); when.style.fontSize = "11px"; meta.appendChild(when);
  if(n.updatedAt && n.updatedAt !== n.createdAt){ var ed = el("span","sub2","(edited)"); ed.style.cssText = "font-size:11px;font-style:italic;color:var(--muted)"; meta.appendChild(ed); }
  row.appendChild(meta);

  if(NOTES_EDITING === n.id && mine){
    var eta = el("textarea"); eta.value = n.body; eta.style.cssText = "width:100%;min-height:50px;resize:vertical;padding:7px 9px;border:1px solid var(--gold);border-radius:7px;background:var(--bg);color:var(--ink);font:inherit;font-size:13px"; row.appendChild(eta);
    var ctl = el("div"); ctl.style.cssText = "display:flex;gap:8px;margin-top:6px";
    var save = el("button","btn gold sm","Save"); save.addEventListener("click", function(){ saveProgramNote(n.id, eta.value); }); ctl.appendChild(save);
    var cancel = el("button","btn sm ghost","Cancel"); cancel.addEventListener("click", function(){ NOTES_EDITING = null; refresh(); }); ctl.appendChild(cancel);
    row.appendChild(ctl);
  } else {
    var body = el("div", null, n.body); body.style.cssText = "font-size:13px;color:var(--ink);white-space:pre-wrap;word-break:break-word;line-height:1.5"; row.appendChild(body);
    if(mine){
      var ctl2 = el("div"); ctl2.style.cssText = "display:flex;gap:10px;margin-top:5px";
      var edit = el("button","btn sm ghost","Edit"); edit.addEventListener("click", function(){ NOTES_EDITING = n.id; refresh(); }); ctl2.appendChild(edit);
      var del = el("button","btn sm danger","Delete"); del.addEventListener("click", function(){ if(window.confirm("Delete this note? This cannot be undone.")){ deleteProgramNote(n.id); } }); ctl2.appendChild(del);
      row.appendChild(ctl2);
    }
  }
  return row;
}
async function addProgramNote(context){
  if(!sb){ toast("Not connected."); return; }
  if(!CURRENT_USER){ toast("Sign in to post a note."); return; }
  var body = (NOTES_COMPOSE || "").trim();
  if(!body){ toast("Write a note first."); return; }
  var res = await sb.from("program_notes").insert({ org:ORG, author_id:CURRENT_USER.id, author_email:CURRENT_USER.email, body:body, context:(context||"priolist") });
  if(res.error){ toast(res.error.message || "Could not post note."); return; }
  NOTES_COMPOSE = "";
  await loadNotes();
  if(ui.view === "priolist" || ui.view === "talentbench" || ui.view === "tb_teamnotes" || ui.view === "tb_notes"){ refresh(); }
  toast("Note posted.");
}
async function saveProgramNote(id, text){
  if(!sb){ return; }
  var body = (text || "").trim();
  if(!body){ toast("Note cannot be empty."); return; }
  var res = await sb.from("program_notes").update({ body:body, updated_at:new Date().toISOString() }).eq("id", id);
  if(res.error){ toast(res.error.message || "Could not save note."); return; }
  NOTES_EDITING = null;
  await loadNotes();
  if(ui.view === "priolist" || ui.view === "talentbench" || ui.view === "tb_teamnotes" || ui.view === "tb_notes"){ refresh(); }
  toast("Note updated.");
}
async function deleteProgramNote(id){
  if(!sb){ return; }
  var res = await sb.from("program_notes").delete().eq("id", id);
  if(res.error){ toast(res.error.message || "Could not delete note."); return; }
  if(NOTES_EDITING === id){ NOTES_EDITING = null; }
  await loadNotes();
  if(ui.view === "priolist" || ui.view === "talentbench" || ui.view === "tb_teamnotes" || ui.view === "tb_notes"){ refresh(); }
  toast("Note deleted.");
}

function b64ToBlob(b64, mime){
  var bin = atob(b64); var len = bin.length; var bytes = new Uint8Array(len);
  for(var i=0;i<len;i++){ bytes[i] = bin.charCodeAt(i); }
  return new Blob([bytes], { type: mime });
}
function openDoc(item){
  var node = document.getElementById(item.el);
  if(!node || !node.textContent.trim()){ toast("Document not available"); return; }
  var url;
  try { url = URL.createObjectURL(b64ToBlob(node.textContent.trim(), item.mime)); }
  catch(e){ toast("Could not open document"); return; }
  if(item.kind === "docx"){
    var a = document.createElement("a"); a.href = url; a.download = item.file;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
  } else {
    var w = window.open(url, "_blank");
    if(!w){ toast("Allow pop-ups to view the document"); }
    setTimeout(function(){ URL.revokeObjectURL(url); }, 60000);
  }
}

function resumeStatus(c){
  var fn = (c.resumeFileName || c.resumePath || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  if(!fn){ return "missing"; }
  var ln = (c.lastName || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  var fst = (c.firstName || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  if(ln && ln.length >= 2 && fn.indexOf(ln) !== -1){ return "match"; }
  if(fst && fst.length >= 3 && fn.indexOf(fst) !== -1){ return "match"; }
  return "check";
}
/* ---------- bulk resume upload ---------- */
var BULK = { items: [] };
function bulkAlnum(s){ return (s || "").toLowerCase().replace(/[^a-z0-9]/g, ""); }
function bulkScore(c, fnAlnum){
  var ln = bulkAlnum(c.lastName); var fst = bulkAlnum(c.firstName);
  if(!ln && !fst){ return 0; }
  var hasLast = ln.length >= 2 && fnAlnum.indexOf(ln) !== -1;
  var hasFirst = fst.length >= 2 && fnAlnum.indexOf(fst) !== -1;
  if(hasLast && hasFirst){ return 3; }
  if(hasLast && ln.length >= 4){ return 2; }
  if(hasFirst && fst.length >= 4){ return 1; }
  return 0;
}
function bulkMissing(){ return state.candidates.filter(function(c){ return c.status !== "Archived" && resumeStatus(c) === "missing"; }); }
function bulkActiveSorted(){ return state.candidates.filter(function(c){ return c.status !== "Archived"; }).sort(function(a, b){ return fullName(a).localeCompare(fullName(b)); }); }
function computeBulkMatches(){
  var missing = bulkMissing();
  BULK.items.forEach(function(it){
    if(it.error){ it.matchId = ""; it.score = 0; it.ambiguous = false; return; }
    var fnAlnum = bulkAlnum(it.fileName);
    var best = null; var bestScore = 0; var tie = false;
    missing.forEach(function(c){
      var s = bulkScore(c, fnAlnum);
      if(s > bestScore){ bestScore = s; best = c; tie = false; }
      else if(s === bestScore && s > 0 && best && c.id !== best.id){ tie = true; }
    });
    it.score = bestScore; it.ambiguous = tie;
    it.matchId = (best && bestScore >= 2 && !tie) ? best.id : "";
  });
}

  wrap.style.cssText = "background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px";
  var hdr = el("div","TalentBench Sourcing Analytics");
  hdr.style.cssText = "font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px";
  hdr.textContent = "TalentBench Sourcing Analytics";
  wrap.appendChild(hdr);

  var loading = el("div");
  loading.innerHTML = '<div class="tb-skel" style="height:12px;width:44%"></div><div class="tb-skel" style="height:12px;width:36%"></div>';
  loading.style.cssText = "padding:8px 0";
  wrap.appendChild(loading);
  host.appendChild(wrap);

  /* ── fetch tb_reviews ── */
  var res = await sb.from("tb_reviews")
    .select("*")
    .eq("org", ORG)
    .order("created_at", { ascending: true });

  loading.remove();
  /* user navigated away while the request was in flight — do not inject
     analytics into a different view */
  if(typeof ui !== "undefined" && ui.view !== VIEW_AT_RENDER){ wrap.remove(); return; }

  if(res.error){
    var err = el("div",null,"Could not load TalentBench data: " + (res.error.message||"unknown error"));
    err.style.cssText = "font-size:12px;color:var(--red);padding:8px 0";
    wrap.appendChild(err); return;
  }

  var rows = res.data || [];

  if(!rows.length){
    var empty = el("div",null,"No TalentBench reviews yet. Reviews will appear here once sourced candidates are accepted, rejected, or moved through the review workflow.");
    empty.style.cssText = "font-size:12px;color:var(--muted);padding:8px 0;line-height:1.5";
    wrap.appendChild(empty); return;
  }

  /* ── compute per-candidate latest status ── */
  /* For each candidate, use their LATEST review action */
  var latestByCand = {};
  rows.forEach(function(r){
    if(!latestByCand[r.candidate_id] || r.created_at > latestByCand[r.candidate_id].created_at){
      latestByCand[r.candidate_id] = r;
    }
  });
  var latestRows = Object.keys(latestByCand).map(function(k){ return latestByCand[k]; });

  var totalSubmitted  = latestRows.length;
  var totalAccepted   = latestRows.filter(function(r){ return r.new_status === "Accepted"; }).length;
  var totalRejected   = latestRows.filter(function(r){ return r.new_status === "Rejected"; }).length;
  var totalNMI        = latestRows.filter(function(r){ return r.new_status === "Needs More Information"; }).length;
  var totalIR         = latestRows.filter(function(r){ return r.new_status === "Interview Requested"; }).length;
  var acceptRate      = totalSubmitted ? Math.round((totalAccepted / totalSubmitted) * 100) : 0;

  /* ── KPI tiles ── */
  function kpi(label, value, color){
    var t = el("div","tb-kpi");
    t.style.setProperty("--kpi-c", "var(" + color + ")");
    var v = el("div","tb-kpi-v",String(value));
    var l = el("div","tb-kpi-l",label);
    t.appendChild(v); t.appendChild(l); return t;
  }
  var kpiRow = el("div");
  kpiRow.style.cssText = "display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px";
  kpiRow.appendChild(kpi("Candidates Reviewed",  totalSubmitted, "--blue"));
  kpiRow.appendChild(kpi("Accepted",             totalAccepted,  "--green"));
  kpiRow.appendChild(kpi("Rejected",             totalRejected,  "--red"));
  kpiRow.appendChild(kpi("Needs More Info",       totalNMI,       "--orange"));
  kpiRow.appendChild(kpi("Interview Requested",  totalIR,        "--teal"));
  kpiRow.appendChild(kpi("Acceptance Rate",      acceptRate + "%","--gold"));
  wrap.appendChild(kpiRow);

  /* ── By Recruiter scorecard ── */
  var recHdr = el("div",null,"By Recruiter");
  recHdr.style.cssText = "font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);margin-bottom:8px";
  wrap.appendChild(recHdr);

  /* Group by reviewer_email — use reviewer as proxy for recruiter for now */
  /* Also group submitted candidates by the recruiter who submitted them   */
  /* We approximate: tb_reviews first action per candidate = submission    */
  var firstByCand = {};
  rows.forEach(function(r){
    if(!firstByCand[r.candidate_id]){
      firstByCand[r.candidate_id] = r; /* earliest = submission */
    }
  });

  /* Build per-reviewer stats */
  var reviewerMap = {};
  Object.keys(latestByCand).forEach(function(candId){
    var latest = latestByCand[candId];
    var first  = firstByCand[candId];
    var who = first ? first.reviewer_email : latest.reviewer_email;
    if(!reviewerMap[who]){ reviewerMap[who] = { submitted:0, accepted:0, rejected:0, nmi:0, ir:0 }; }
    reviewerMap[who].submitted++;
    if(latest.new_status === "Accepted")                  reviewerMap[who].accepted++;
    else if(latest.new_status === "Rejected")             reviewerMap[who].rejected++;
    else if(latest.new_status === "Needs More Information") reviewerMap[who].nmi++;
    else if(latest.new_status === "Interview Requested")  reviewerMap[who].ir++;
  });

  var recTable = el("div");
  recTable.style.cssText = "display:flex;flex-direction:column;gap:5px;margin-bottom:16px";

  /* Header row */
  var recHead = el("div");
  recHead.style.cssText = "display:grid;grid-template-columns:1fr 60px 60px 60px 60px 70px;gap:0 8px;padding:5px 10px;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em";
  ["Reviewer","Submitted","Accepted","Rejected","NMI","Accept %"].forEach(function(h){
    recHead.appendChild(el("div",null,h));
  });
  recTable.appendChild(recHead);

  Object.keys(reviewerMap).sort().forEach(function(email){
    var s = reviewerMap[email];
    var rate = s.submitted ? Math.round((s.accepted/s.submitted)*100) : 0;
    var shortEmail = email.split("@")[0];
    var row = el("div");
    row.style.cssText = "display:grid;grid-template-columns:1fr 60px 60px 60px 60px 70px;gap:0 8px;padding:7px 10px;background:var(--bg);border:1px solid var(--line);border-radius:7px;font-size:12px;align-items:center";
    var nameEl = el("div",null,shortEmail); nameEl.style.cssText = "font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"; nameEl.title = email;
    var subEl  = el("div",null,String(s.submitted));  subEl.style.cssText  = "color:var(--blue);font-weight:700;text-align:center";
    var accEl  = el("div",null,String(s.accepted));   accEl.style.cssText  = "color:var(--green);font-weight:700;text-align:center";
    var rejEl  = el("div",null,String(s.rejected));   rejEl.style.cssText  = "color:var(--red);font-weight:700;text-align:center";
    var nmiEl  = el("div",null,String(s.nmi));        nmiEl.style.cssText  = "color:var(--orange);font-weight:700;text-align:center";
    var rateEl = el("div",null,rate + "%");
    rateEl.style.cssText = "font-weight:700;text-align:center;color:" + (rate >= 70 ? "var(--green)" : rate >= 40 ? "var(--gold)" : "var(--red)");
    [nameEl,subEl,accEl,rejEl,nmiEl,rateEl].forEach(function(e){ row.appendChild(e); });
    recTable.appendChild(row);
  });
  wrap.appendChild(recTable);

  /* ── By Requisition breakdown ── */
  var reqHdrEl = el("div",null,"By Requisition");
  reqHdrEl.style.cssText = "font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);margin-bottom:8px";
  wrap.appendChild(reqHdrEl);

  /* Group latest status by req_id */
  var reqMap = {};
  Object.keys(latestByCand).forEach(function(candId){
    var latest = latestByCand[candId];
    var first  = firstByCand[candId];
    var reqId  = (first && first.req_id) ? first.req_id : "unassigned";
    if(!reqMap[reqId]){ reqMap[reqId] = { submitted:0, accepted:0, rejected:0, nmi:0, ir:0 }; }
    reqMap[reqId].submitted++;
    if(latest.new_status === "Accepted")                    reqMap[reqId].accepted++;
    else if(latest.new_status === "Rejected")               reqMap[reqId].rejected++;
    else if(latest.new_status === "Needs More Information") reqMap[reqId].nmi++;
    else if(latest.new_status === "Interview Requested")    reqMap[reqId].ir++;
  });

  /* Resolve req IDs to titles */
  var reqTable = el("div");
  reqTable.style.cssText = "display:flex;flex-direction:column;gap:5px";

  var reqHead = el("div");
  reqHead.style.cssText = "display:grid;grid-template-columns:1fr 60px 60px 60px 70px;gap:0 8px;padding:5px 10px;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em";
  ["Requisition","Submitted","Accepted","Rejected","Accept %"].forEach(function(h){
    reqHead.appendChild(el("div",null,h));
  });
  reqTable.appendChild(reqHead);

  Object.keys(reqMap).sort(function(a,b){
    return reqMap[b].submitted - reqMap[a].submitted;
  }).forEach(function(reqId){
    var s = reqMap[reqId];
    var rate = s.submitted ? Math.round((s.accepted/s.submitted)*100) : 0;
    /* Try to resolve req title from REQS */
    var reqObj = REQS_AT_RENDER.filter(function(r){ return r.id === reqId; })[0]; /* scoped snapshot, not the (restored) global */
    var reqLabel = reqObj ? (reqObj.title || reqId) : (reqId === "unassigned" ? "Unassigned" : reqId.slice(0,8)+"…");
    var row = el("div");
    row.style.cssText = "display:grid;grid-template-columns:1fr 60px 60px 60px 70px;gap:0 8px;padding:7px 10px;background:var(--bg);border:1px solid var(--line);border-radius:7px;font-size:12px;align-items:center";
    var nameEl = el("div",null,reqLabel); nameEl.style.cssText = "font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"; nameEl.title = reqLabel;
    var subEl  = el("div",null,String(s.submitted)); subEl.style.cssText  = "color:var(--blue);font-weight:700;text-align:center";
    var accEl  = el("div",null,String(s.accepted));  accEl.style.cssText  = "color:var(--green);font-weight:700;text-align:center";
    var rejEl  = el("div",null,String(s.rejected));  rejEl.style.cssText  = "color:var(--red);font-weight:700;text-align:center";
    var rateEl = el("div",null,rate + "%");
    rateEl.style.cssText = "font-weight:700;text-align:center;color:" + (rate >= 70 ? "var(--green)" : rate >= 40 ? "var(--gold)" : "var(--red)");
    [nameEl,subEl,accEl,rejEl,rateEl].forEach(function(e){ row.appendChild(e); });
    reqTable.appendChild(row);
  });
  wrap.appendChild(reqTable);

  /* ── Rejection reasons breakdown ── */
  var rejRows = rows.filter(function(r){ return r.action === "Rejected" && r.reason; });
  if(rejRows.length){
    var rejHdr = el("div",null,"Rejection Reasons");
    rejHdr.style.cssText = "font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);margin:16px 0 8px";
    wrap.appendChild(rejHdr);
    var reasonMap = {};
    rejRows.forEach(function(r){ reasonMap[r.reason] = (reasonMap[r.reason]||0) + 1; });
    var chips = el("div"); chips.style.cssText = "display:flex;flex-wrap:wrap;gap:6px";
    Object.keys(reasonMap).sort(function(a,b){ return reasonMap[b]-reasonMap[a]; }).forEach(function(k){
      var chip = el("div"); chip.style.cssText = "font-size:11px;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:4px 10px;color:var(--ink)";
      chip.textContent = k + ": " + reasonMap[k];
      chips.appendChild(chip);
    });
    wrap.appendChild(chips);
  }

  /* ── footnote ── */
  var note = el("div",null,"Acceptance rate = Accepted \xf7 total reviewed candidates (latest status). Data updates in real time from TalentBench review actions.");
  note.style.cssText = "font-size:11px;color:var(--muted);margin-top:14px;line-height:1.5";
  wrap.appendChild(note);
}

function renderDashboard(host){
  host.innerHTML = "";
  var cs = state.candidates || [];
  var acts = state.activities || [];
  function card(titleText){

    return c;
  }
  function tileRow(){ var r = el("div"); r.style.cssText = "display:flex;gap:10px;flex-wrap:wrap"; return r; }
  function tile(label, value, colorVar, onClick){

      t.style.cursor = "pointer";
      t.title = "View candidates at this stage";

    }
    var v = el("div", null, String(value)); v.style.cssText = "font-size:22px;font-weight:700;color:var(--ink);line-height:1";
    var l = el("div", null, label); l.style.cssText = "font-size:11px;color:var(--muted);margin-top:5px;line-height:1.25";
    t.appendChild(v); t.appendChild(l); return t;
  }
  function openStageModal(stage, candidates){
    var mo = document.getElementById("modal"); mo.innerHTML = "";
    var mhead = el("div","mhead");
    mhead.appendChild(el("h2", null, stage));
    var mx = el("button","x","\u00d7"); mx.setAttribute("data-close","1"); mhead.appendChild(mx); mo.appendChild(mhead);
    var mbody = el("div","mbody");
    var sub = el("div", null, candidates.length + " candidate" + (candidates.length !== 1 ? "s" : "")); sub.style.cssText = "font-size:12px;color:var(--muted);margin-bottom:14px"; mbody.appendChild(sub);
    if(candidates.length === 0){
      var empty = el("div", null, "No candidates at this stage."); empty.style.cssText = "font-size:13px;color:var(--muted);padding:20px 0;text-align:center"; mbody.appendChild(empty);
    } else {

        var crow = el("div"); crow.style.cssText = "display:flex;align-items:center;justify-content:space-between;padding:9px 10px;margin-bottom:6px;background:var(--bg);border:1px solid var(--line);border-radius:7px;cursor:pointer";
        crow.onmouseenter = function(){ this.style.borderColor = "var(--blue)"; };
        crow.onmouseleave = function(){ this.style.borderColor = "var(--line)"; };
        var cname = el("div", null, (cand.firstName || "") + " " + (cand.lastName || "")); cname.style.cssText = "font-size:13px;font-weight:600;color:var(--ink)";
        var cinfo = el("div", null, (cand.title || "") + (cand.company ? "  \u00b7  " + cand.company : "")); cinfo.style.cssText = "font-size:11px;color:var(--muted);margin-top:2px";
        var cleft = el("div"); cleft.appendChild(cname); cleft.appendChild(cinfo);

        crow.appendChild(cleft); crow.appendChild(cpill);
        (function(candidate){ crow.onclick = function(){ closeModal(); openDetail(candidate); }; })(cand);
        mbody.appendChild(crow);
      });
    }
    mo.appendChild(mbody);
    document.getElementById("scrim").classList.add("open");
  }
  function countStatus(st){ var n = 0; for(var i = 0; i < cs.length; i++){ if(cs[i].status === st){ n++; } } return n; }
  function idxOf(st){ return PIPE_STAGES.indexOf(st); }
  function reached(st){ var gi = idxOf(st); var n = 0; for(var i = 0; i < cs.length; i++){ var k = idxOf(cs[i].status); if(k !== -1 && k >= gi){ n++; } } return n; }

  var intro = el("div", null, "Live snapshot from current candidate data and activity. Speed and turnaround metrics turn on once stage_history is recording transitions.");
  intro.style.cssText = "color:var(--muted);font-size:13px;margin-bottom:16px"; host.appendChild(intro);

  var c1 = card("Funnel   (current count at each stage)");
  var r1 = tileRow();
  PIPE_STAGES.forEach(function(s){
    (function(stage){
      var stageCands = cs.filter(function(c){ return c.status === stage; });
      r1.appendChild(tile(PIPE_LABEL[stage] || stage, countStatus(stage), STATUS_COLOR[stage] || "--gray", function(){ openStageModal(stage, stageCands); }));
    })(s);
  });
  c1.appendChild(r1);
  var offLab = el("div", null, "Off pipeline"); offLab.style.cssText = "font-size:10px;color:var(--muted);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.06em"; c1.appendChild(offLab);
  var r1b = tileRow();
  ["On Hold","TA Rejected","HM Rejected","Archived"].forEach(function(s){
    (function(stage){
      var stageCands = cs.filter(function(c){ return c.status === stage; });
      r1b.appendChild(tile(stage, countStatus(stage), STATUS_COLOR[stage] || "--gray", function(){ openStageModal(stage, stageCands); }));
    })(s);

  c1.appendChild(r1b); host.appendChild(c1);

  var activeBase = 0; for(var i = 0; i < cs.length; i++){ if(idxOf(cs[i].status) !== -1){ activeBase++; } }
  function pct(n){ return activeBase ? Math.round((n / activeBase) * 100) + "%" : "0%"; }

  c2.appendChild(r2);
  var note2 = el("div", null, "This is a point in time view. True stage to stage conversion over time needs stage_history."); note2.style.cssText = "font-size:11px;color:var(--muted);margin-top:10px"; c2.appendChild(note2);

    row.onmouseenter = function(){ this.style.borderColor = "var(--blue)"; };
    row.onmouseleave = function(){ this.style.borderColor = "var(--line)"; };

    var rt = el("div"); rt.style.cssText = "display:flex;align-items:center;gap:8px;flex:0 0 auto";
    if(rc.n === 0){
      var fl = el("span", null, "needs sourcing"); fl.style.cssText = "font-size:10px;font-weight:700;color:var(--bg);background:var(--gold);padding:2px 8px;border-radius:10px";
      rt.appendChild(fl);
    } else {
      var cnt = el("span", null, String(rc.n)); cnt.style.cssText = "font-weight:700;color:var(--gold);font-size:13px;cursor:pointer;text-decoration:underline";
      cnt.title = "View tagged candidates";
      (function(rc2){
        cnt.onclick = function(e){
          e.stopPropagation();
          var tagged = cs.filter(function(c){ return c.status !== "Archived" && (c.reqs || []).indexOf(rc2.label) !== -1; });
          var mo = document.getElementById("modal"); mo.innerHTML = "";

          mhead.appendChild(el("h2", null, rc2.label));
          var mx = el("button","x","\u00d7"); mx.setAttribute("data-close","1"); mhead.appendChild(mx); mo.appendChild(mhead);
          var mbody = el("div","mbody");
          var sub = el("div", null, tagged.length + " candidate" + (tagged.length !== 1 ? "s" : "") + " tagged"); sub.style.cssText = "font-size:12px;color:var(--muted);margin-bottom:14px"; mbody.appendChild(sub);
          pipelineSort(tagged).forEach(function(cand){
            var crow = el("div"); crow.style.cssText = "display:flex;align-items:center;justify-content:space-between;padding:9px 10px;margin-bottom:6px;background:var(--bg);border:1px solid var(--line);border-radius:7px;cursor:pointer";
            crow.onmouseenter = function(){ this.style.borderColor = "var(--blue)"; };
            crow.onmouseleave = function(){ this.style.borderColor = "var(--line)"; };
            var cname = el("div", null, (cand.firstName || "") + " " + (cand.lastName || "")); cname.style.cssText = "font-size:13px;font-weight:600;color:var(--ink)";
            var cinfo = el("div", null, (cand.title || "") + (cand.company ? "  \u00b7  " + cand.company : "")); cinfo.style.cssText = "font-size:11px;color:var(--muted);margin-top:2px";
            var cleft = el("div"); cleft.appendChild(cname); cleft.appendChild(cinfo);

  var c4 = card("By recruiter   (active candidates and submissions)");
  var rowsR = OWNERS.map(function(o){
    var own = cs.filter(function(c){ return c.owner === o && c.status !== "Archived"; });
    var sub = own.filter(function(c){ var k = idxOf(c.status); return k !== -1 && k >= idxOf("Submitted"); }).length;
    return { o:o, total:own.length, sub:sub };
  }).filter(function(x){ return x.total > 0; }).sort(function(a, b){ return b.total - a.total; });

/* ============================================================
   TALENTBENCH -- Sourcing Partner Board
   Bench reqs live in Supabase reqs table with bench=true.
   Partner field identifies the sourcing partner.
   Supports add / edit / delete. Generic -- not partner-specific.
   Supabase reqs table requires: bench boolean, partner text
   ============================================================ */

function getBenchReqs(){
  /* Central selector: TalentBench Reqs = bench=true AND still active
     (not filled/closed/cancelled/archived). Unique by req ID. */
  /* DEDUPE FIRST, then classify (see renderReqs) — keeps a conflicted req in
     exactly one workflow view. */
  var base = (state.reqs || REQS || []);
  if(window.TB_METRICS){ base = TB_METRICS.canonicalReqEntries(base).map(function(e){ return e.req; }); }
  return base.filter(function(r){ return window.TB_METRICS ? TB_METRICS.isBenchReq(r) : r.bench === true; });
}

  waiting:   { label:"Waiting",   icon:"\u26AA", color:"--gray",   tip:"Recruiting intake has not started." },

/* ============================================================
   TALENTBENCH REVIEW — Phase 2
   All functions prefixed tbr_ to avoid collisions.
   Writes to: candidates.tb_status, tb_reviews (audit table)
   Reads from: state.candidates (tb_status already in rowToCand)
   ============================================================ */

var TBR_STATUSES = ['Submitted','Under Review','Needs More Information','Accepted','Rejected','Interview Requested','Closed'];
var TBR_REASONS  = ['Skills mismatch','Compensation','Location','Clearance','Duplicate','Experience','Hiring Manager Feedback','Other'];

/* Check if current user can review */
function tbrCanReview(){
  if(!CURRENT_USER || !CURRENT_USER.role) return false;
  return CURRENT_USER.role === 'editor' || CURRENT_USER.role === 'tb_reviewer';
}

/* Is candidate in any TalentBench req? */
function tbrIsBenchCand(c){
  if(!c || !c.reqs || !c.reqs.length) return false;
  var benchLabels = getBenchReqs().map(function(r){ return (r.title||'') + ' \u2013 ' + (r.loc||''); });
  var benchLabelsAlt = getBenchReqs().map(function(r){ return (r.title||'') + ' - ' + (r.loc||''); });
  return c.reqs.some(function(label){ return benchLabels.indexOf(label) !== -1 || benchLabelsAlt.indexOf(label) !== -1; });
}

/* Status pill for TalentBench review status */
function tbrStatusPill(status){
  var colors = {
    'Submitted':             '--blue',
    'Under Review':          '--yellow',
    'Needs More Information':'--orange',
    'Accepted':              '--green',
    'Rejected':              '--red',
    'Interview Requested':   '--teal',
    'Closed':                '--gray'
  };
  var colorVar = colors[status] || '--gray';
  var p = el('span','pill', status || 'No Status');
  var col = cssVar(colorVar);
  p.style.color = col;
  p.style.background = col + '22';
  p.style.border = '1px solid ' + col + '55';
  return p;
}

/* Load tb_reviews for a candidate */
async function tbrLoadHistory(candidateId){
  var res = await sb.from('tb_reviews')
    .select('*')
    .eq('candidate_id', candidateId)
    .order('created_at', { ascending: false });
  if(res.error){ console.error('tbr load:', res.error); return []; }
  return res.data || [];
}

/* Write a review action */
async function tbrWriteReview(candidateId, candidateName, action, prevStatus, newStatus, reason, comments, reqId){
  var insertRes = await sb.from('tb_reviews').insert({
    org:            ORG,
    candidate_id:   candidateId,
    candidate_name: candidateName,
    req_id:         reqId || null,
    reviewer_id:    CURRENT_USER.id,
    reviewer_email: CURRENT_USER.email,
    action:         action,
    prev_status:    prevStatus || null,
    new_status:     newStatus,
    reason:         reason || null,
    comments:       comments || null
  });
  if(insertRes.error){ toast('Review save failed: ' + (insertRes.error.message || 'unknown error')); return false; }

  /* Update tb_status on candidate */
  var updateRes = await sb.from('candidates').update({ tb_status: newStatus }).eq('id', candidateId);
  if(updateRes.error){ toast('Status update failed: ' + (updateRes.error.message || 'unknown error')); return false; }

  /* Update local state */
  var cIdx = state.candidates.findIndex(function(x){ return x.id === candidateId; });
  if(cIdx !== -1){ state.candidates[cIdx].tbStatus = newStatus; }

  return true;
}

/* Action dialog — inline below the buttons */
function tbrOpenActionDialog(c, action, newStatus, parentSection){
  /* Remove any existing dialog */
  var existing = parentSection.querySelector('[data-tbr-dialog]');
  if(existing){ existing.remove(); }

  var needsReason   = (action === 'Rejected');
  var needsComments = (action === 'Needs More Information' || action === 'Rejected');

  var dialog = el('div');
  dialog.setAttribute('data-tbr-dialog','1');
  dialog.style.cssText = 'background:var(--panel);border:1.5px solid var(--gold);border-radius:10px;padding:16px;margin-bottom:14px;';

  var dlgTitle = el('div', null, action);
  dlgTitle.style.cssText = 'font-size:13px;font-weight:700;color:var(--ink);margin-bottom:12px;';
  dialog.appendChild(dlgTitle);

  var reasonSel = null;
  if(needsReason){
    var reasonFld = el('div','fld full');
    var rl = el('label', null, 'Reason *');
    reasonSel = document.createElement('select');
    reasonSel.style.cssText = 'width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--ink);';
    var emptyOpt = el('option', null, '— Select a reason —'); emptyOpt.value = ''; reasonSel.appendChild(emptyOpt);
    TBR_REASONS.forEach(function(r){ var o = el('option',null,r); o.value=r; reasonSel.appendChild(o); });
    reasonFld.appendChild(rl); reasonFld.appendChild(reasonSel);
    dialog.appendChild(reasonFld);
  }

  var commentsTa = null;
  var commentsFld = el('div','fld full');
  var cl = el('label', null, needsComments ? 'Comments' + (needsReason ? ' (required if Other)' : ' *') : 'Comments (optional)');
  commentsTa = document.createElement('textarea');
  commentsTa.style.cssText = 'width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--ink);min-height:70px;resize:vertical;font-family:inherit;font-size:13px;';
  commentsTa.placeholder = needsComments ? 'Explain your decision\u2026' : 'Optional notes\u2026';
  commentsFld.appendChild(cl); commentsFld.appendChild(commentsTa);
  dialog.appendChild(commentsFld);

  var dlgBtns = el('div');
  dlgBtns.style.cssText = 'display:flex;gap:8px;margin-top:8px;';

  var confirmBtn = el('button','btn gold','Confirm ' + action); confirmBtn.type='button';
  var cancelBtn  = el('button','btn ghost','Cancel');            cancelBtn.type='button';

  cancelBtn.addEventListener('click', function(){ dialog.remove(); });

  confirmBtn.addEventListener('click', async function(){
    var reason   = reasonSel   ? reasonSel.value.trim()   : null;
    var comments = commentsTa  ? commentsTa.value.trim()  : null;

    /* Validate */
    if(needsReason && !reason){
      toast('Please select a rejection reason'); return;
    }
    if(reason === 'Other' && !comments){
      toast('Comments are required when reason is Other'); return;
    }
    if(action === 'Needs More Information' && !comments){
      toast('Please explain what additional information is needed'); return;
    }

    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Saving\u2026';

    /* Find req_id if candidate is tagged to a bench req */
    var benchReqs = getBenchReqs();
    var matchedReq = null;
    if(c.reqs && c.reqs.length && benchReqs.length){
      benchReqs.forEach(function(r){
        var lbl    = (r.title||'') + ' \u2013 ' + (r.loc||'');
        var lblAlt = (r.title||'') + ' - '       + (r.loc||'');
        if(c.reqs.indexOf(lbl) !== -1 || c.reqs.indexOf(lblAlt) !== -1){ matchedReq = r; }
      });
    }

    var ok = await tbrWriteReview(
      c.id,
      fullName(c),
      action,
      c.tbStatus || null,
      newStatus,
      reason   || null,
      comments || null,
      matchedReq ? matchedReq.id : null
    );

    if(ok){
      toast(action + ' saved');
      dialog.remove();
      /* Update the candidate object in memory and re-render the section */
      c.tbStatus = newStatus;
      var existingSection = parentSection;
      /* Re-render history in place */
      var histWrap = existingSection.querySelector('[data-tbr-history]');
      /* Refresh full modal */
      closeModal();
      var updatedCand = (state.candidates || []).find(function(x){ return x.id === c.id; });
      if(updatedCand){ setTimeout(function(){ openDetail(updatedCand); }, 100); }
    } else {
      confirmBtn.disabled = false;
      confirmBtn.textContent = 'Confirm ' + action;
    }
  });

  dlgBtns.appendChild(cancelBtn);
  dlgBtns.appendChild(confirmBtn);
  dialog.appendChild(dlgBtns);

  /* Insert dialog at top of parent section, after the action buttons */
  var actionBtns = parentSection.querySelector('[style*="flex-wrap"]');
  if(actionBtns && actionBtns.nextSibling){
    parentSection.insertBefore(dialog, actionBtns.nextSibling);
  } else {
    parentSection.appendChild(dialog);
  }
}

/* ---------- duplicate detection ---------- */
function normEmail(e){ return (e||"").trim().toLowerCase(); }
function normName(f,l){ return ((f||"").trim().toLowerCase() + "|" + (l||"").trim().toLowerCase()); }
function findDuplicate(cand, ignoreId){
  // Returns the existing candidate that duplicates `cand`, or null.
  var em = normEmail(cand.email);
  var nm = normName(cand.firstName, cand.lastName);
  for(var i=0;i<state.candidates.length;i++){
    var x = state.candidates[i];
    if(ignoreId && x.id === ignoreId){ continue; }
    if(em && normEmail(x.email) === em){ return x; }
    if(!em && nm !== "|" && normName(x.firstName, x.lastName) === nm){ return x; }
  }
  return null;
}

function field(label, key, val, type, opts){
  var f = el("div","fld"); f.appendChild(el("label", null, label)); var input;
  if(type === "select"){ input = el("select"); opts.forEach(function(o){ var op = el("option", null, o); op.value = o; if(o === val){ op.selected = true; } input.appendChild(op); }); }
  else if(type === "textarea"){ input = el("textarea"); input.value = val || ""; }
  else{ input = el("input"); input.type = type || "text"; input.value = val || ""; }
  input.setAttribute("data-field", key); f.appendChild(input); return f;
}

function renderRich(host, text){
  host.textContent = "";
  var raw = (text == null) ? "" : String(text);
  if(!raw.trim()){ host.textContent = "-"; return; }
  var lines = raw.replace(/\r\n?/g, "\n").split("\n");
  var i = 0; var buf = [];
  function flushText(){ if(!buf.length){ return; } var d = el("div","richtext"); d.textContent = buf.join("\n"); host.appendChild(d); buf = []; }
  while(i < lines.length){
    var m = lines[i].match(/^\s*[-*\u2022]\s+(.*)$/);
    if(m){
      flushText();
      var ul = el("ul","richul");
      while(i < lines.length){ var mm = lines[i].match(/^\s*[-*\u2022]\s+(.*)$/); if(!mm){ break; } ul.appendChild(el("li", null, mm[1])); i++; }
      host.appendChild(ul); continue;
    }
    buf.push(lines[i]); i++;
  }
  flushText();
}

/* Read word/header*.xml + word/footer*.xml straight out of the .docx zip.
   Most resume templates put name/email/phone in the Word HEADER, which
   mammoth (body-only) never sees - this recovers it. No new libraries needed. */
async function extractDocxHeaderText(arrayBuffer){
  try{
    var bytes = new Uint8Array(arrayBuffer);
    var eocd = -1;
    for(var i = bytes.length - 22; i >= Math.max(0, bytes.length - 65558); i--){
      if(bytes[i] === 0x50 && bytes[i+1] === 0x4b && bytes[i+2] === 0x05 && bytes[i+3] === 0x06){ eocd = i; break; }
    }
    if(eocd < 0){ return ""; }
    var dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
    var count = dv.getUint16(eocd + 10, true);
    var p = dv.getUint32(eocd + 16, true);
    var out = "";
    for(var n = 0; n < count; n++){
      if(dv.getUint32(p, true) !== 0x02014b50){ break; }
      var method = dv.getUint16(p + 10, true);
      var compSize = dv.getUint32(p + 20, true);
      var nameLen = dv.getUint16(p + 28, true);
      var extraLen = dv.getUint16(p + 30, true);
      var commentLen = dv.getUint16(p + 32, true);
      var lfhOff = dv.getUint32(p + 42, true);
      var fname = new TextDecoder().decode(bytes.subarray(p + 46, p + 46 + nameLen));
      if(/^word\/(header|footer)\d*\.xml$/.test(fname) && compSize > 0){
        var lfNameLen = dv.getUint16(lfhOff + 26, true);
        var lfExtraLen = dv.getUint16(lfhOff + 28, true);
        var dataStart = lfhOff + 30 + lfNameLen + lfExtraLen;
        var comp = bytes.subarray(dataStart, dataStart + compSize);
        var xml = "";
        if(method === 0){ xml = new TextDecoder().decode(comp); }
        else if(method === 8 && typeof DecompressionStream !== "undefined"){
          try{
            var ds = new DecompressionStream("deflate-raw");
            xml = await new Response(new Blob([comp]).stream().pipeThrough(ds)).text();
          }catch(e2){ xml = ""; }
        }
        if(xml){
          /* join runs within a paragraph with no separator (Word splits words
             across runs), separate paragraphs/tabs with spaces */
          var paras = xml.split(/<\/w:p>/);
          var line = paras.map(function(pxml){
            var texts = pxml.replace(/<w:tab[^>]*\/>/g, "<w:t> </w:t>").match(/<w:t[^>]*>[^<]*<\/w:t>/g) || [];
            return texts.map(function(t){ return t.replace(/<[^>]+>/g, ""); }).join("");
          }).filter(function(s){ return s.trim(); }).join("\n").trim();
          if(line){ out += line + "\n"; }
        }
      }
      p += 46 + nameLen + extraLen + commentLen;
    }
    return out;
  }catch(e){ return ""; }
}

async function extractText(file){
  var name = file.name.toLowerCase();
  if(/\.pdf$/.test(name) && window.pdfjsLib){

  return "";
}
function grabName(text, filename){
  var res = { first:"", last:"" };
  var head = (text || "").replace(/\r/g, "").split("\n").slice(0, 8).join("\n");
  var lines = head.split(/\n|\s{2,}/).map(function(s){ return s.trim(); }).filter(Boolean);
  var bad = /resume|curriculum|vitae|\bcv\b|address|phone|e-?mail|linkedin|github|portfolio|profile|summary|objective|experience|education|http|www\.|@|\d/i;
  for(var i = 0; i < lines.length; i++){
    var ln = lines[i].replace(/[,|].*$/, "").trim();
    var words = ln.split(/\s+/);
    if(words.length >= 2 && words.length <= 4 && !bad.test(ln) && /^[A-Za-z][A-Za-z'.\-]*(\s+[A-Za-z][A-Za-z'.\-]*){1,3}$/.test(ln)){

  base = base.replace(/[_\-]+/g, " ").replace(/\b(resume|cv|curriculum vitae|final|copy|updated?|new)\b/ig, " ").replace(/\s+/g, " ").trim();
  if(/,/.test(base)){
    var parts = base.split(",");

  }
  var fw = base.split(/\s+/).filter(Boolean);
  if(fw.length >= 2){ res.first = fw[0]; res.last = fw[fw.length - 1]; }
  else if(fw.length === 1){ res.first = fw[0]; }
  return res;
}

}
